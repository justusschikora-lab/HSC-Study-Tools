<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="darkreader-lock" />
<title>HSC Hub · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">H</div>
      <div>
        <div class="brand-name">HSC&nbsp;Hub</div>
        <div class="brand-sub">Class of 2026</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-label">Menu</div>
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="timer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4M12 14l3-3M5 14a7 7 0 1 0 14 0 7 7 0 0 0-14 0z"/></svg>
        Study timer
      </button>
      <button class="nav-item" data-view="subjects">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5z"/></svg>
        Subjects
      </button>
      <button class="nav-item" data-view="schedule">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
        Schedule
      </button>
      <button class="nav-item" data-view="goals">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
        Goals
      </button>
    </nav>
    <div class="side-timer" id="sideTimerWrap"></div>

    <div class="side-foot">
      <div class="streak-chip" id="sideStreak"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <h1>Dashboard</h1>
        <div class="date" id="topDate"></div>
      </div>
      <div class="topbar-right">
        <div class="theme-wrap" id="themeWrap"></div>
        <button class="cust-btn" onclick="openCustomise()">⚙️ Customise</button>
        <div class="avatar">JS</div>
      </div>
    </header>

    <main class="content">

      <!-- ============ DASHBOARD ============ -->
      <section class="view active" id="view-dashboard">
        <div class="dash">
          <section class="card dash-banner" id="dashBanner"></section>

          <div class="dash-hero">
            <div class="hero-head">
              <span class="hero-title">Your subjects</span>
              <span class="hero-hint">Pick a subject to start a session</span>
            </div>
            <div class="subjects-grid hero-subjects" id="dashSubjects"></div>
          </div>

          <div class="dash-foot">
            <section class="card" id="goals"></section>
            <section class="card" id="focus"></section>
          </div>
        </div>
      </section>

      <!-- ============ STUDY TIMER ============ -->
      <section class="view" id="view-timer" hidden>
        <div class="view-pad">
          <div class="timer-layout">
            <section class="card" id="timerCard"></section>
            <div class="timer-side">
              <section class="card" id="timerToday"></section>
              <section class="card" id="timerBreakdown"></section>
            </div>
          </div>
          <div class="grid" style="margin-top:var(--gap)">
            <section class="card col-12" id="timerLog"></section>
          </div>
        </div>
      </section>

      <!-- ============ SUBJECTS ============ -->
      <section class="view" id="view-subjects" hidden>
        <div class="view-pad">
          <div class="subj-tabs" id="subjTabs"></div>
          <section class="card subj-detail" id="subjDetail"></section>
          <div class="section-title">All subjects</div>
          <div class="subjects-grid" id="subjects"></div>
        </div>
      </section>

      <!-- ============ SCHEDULE ============ -->
      <section class="view" id="view-schedule" hidden>
        <div class="view-pad">
          <div class="grid">
            <section class="card col-7" id="schedule"></section>
            <div class="col-5 sched-rail">
              <section class="card" id="weighting"></section>
              <section class="card" id="depth"></section>
            </div>
          </div>
        </div>
      </section>

      <!-- ============ GOALS ============ -->
      <section class="view" id="view-goals" hidden>
        <div class="view-pad">
          <div class="grid">
            <section class="card col-4" id="goalsFull"></section>
            <section class="card col-8" id="graph"></section>
          </div>
          <div class="grid" style="margin-top:var(--gap)">
            <section class="card col-6" id="subjTime"></section>
            <section class="card col-6" id="achievements"></section>
          </div>
          <div class="grid" style="margin-top:var(--gap)">
            <section class="card col-12" id="heatmap"></section>
          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<!-- FULLSCREEN FOCUS OVERLAY -->
<div class="fo" id="fo">
  <div class="fo-esc" onclick="exitFocus()">✕ esc</div>
  <div class="fo-icon" id="foIcon">📚</div>
  <div class="fo-subj" id="foSubj">English Advanced</div>
  <div class="fo-time" id="foTime">00:00:00</div>
  <div class="fo-gl" id="foGoal">0:00 / 3:00:00 today</div>
  <div class="fo-gb"><i id="foBar" style="width:0%"></i></div>
  <div class="fo-btns">
    <button class="fo-btn fo-pause" id="foPause" onclick="timerPause()">⏸ Pause</button>
    <button class="fo-btn fo-stop" onclick="timerStop()">⏹ Stop & Save</button>
  </div>
</div>

<!-- CUSTOMISE OVERLAY -->
<div class="cust-overlay" id="custOverlay" onclick="closeCustomise(event)">
  <div class="cust-panel" id="custPanel">
    <div class="cust-head">
      ⚙️ Customise
      <button class="cust-close" onclick="closeCustomise()">✕</button>
    </div>
    <div class="cust-body" id="custBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
