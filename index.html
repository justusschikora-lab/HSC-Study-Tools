<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HSC Study Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080f0a;color:#e6f0e8;font-family:"IBM Plex Sans",system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 20px}
h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-.01em}
p{color:#7a9e80;margin-bottom:40px;font-size:15px}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
a{text-decoration:none}
.card{background:#101a12;border:1px solid #1a2e1e;border-radius:16px;padding:32px 40px;width:220px;transition:.15s}
.card:hover{border-color:#22c55e;transform:translateY(-2px)}
.icon{font-size:36px;margin-bottom:14px}
.label{font-size:18px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#7a9e80}
</style>
</head>
<body>
<div class="wrap">
  <h1>HSC Study Tools</h1>
  <p>Balgowlah Boys · 2026</p>
  <div class="cards">
    <a href="/biology/">
      <div class="card">
        <div class="icon">🧬</div>
        <div class="label">Biology</div>
        <div class="sub">Modules 1–8</div>
      </div>
    </a>
    <a href="/chemistry/">
      <div class="card">
        <div class="icon">⚗️</div>
        <div class="label">Chemistry</div>
        <div class="sub">Modules 5–8</div>
      </div>
    </a>
    <a href="/english/">
      <div class="card" style="border-color:#251d35;background:#120f1a">
        <div class="icon">📚</div>
        <div class="label" style="color:#ede8f5">English Advanced</div>
        <div class="sub" style="color:#8a7a9e">Modules CM A B C</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
