<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HSC Dashboard · 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
/* ===== THEMES ===== */
:root{
  --bg:#07070f;--glow1:rgba(168,85,247,.07);--glow2:rgba(34,197,94,.05);--glow3:rgba(59,130,246,.04);
  --surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.16);
  --text:#f0f0ff;--muted:rgba(240,240,255,.45);--muted2:rgba(240,240,255,.22);
  --bio:#22c55e;--biob:rgba(34,197,94,.1);--bioborder:rgba(34,197,94,.25);
  --chem:#f59e0b;--chemb:rgba(245,158,11,.1);--chemborder:rgba(245,158,11,.25);
  --eng:#a855f7;--engb:rgba(168,85,247,.1);--engborder:rgba(168,85,247,.25);
  --math:#3b82f6;--mathb:rgba(59,130,246,.1);--mathborder:rgba(59,130,246,.25);
  --ger:#e8a020;--gerb:rgba(232,160,32,.1);--gerborder:rgba(232,160,32,.25);
  --red:#ef4444;--redb:rgba(239,68,68,.1);
  --radius:18px;--rsm:12px;--hero-txt:#fff;
}
[data-theme="light"]{
  --bg:#f4f2ff;--glow1:rgba(168,85,247,.06);--glow2:rgba(34,197,94,.04);--glow3:rgba(59,130,246,.04);
  --surface:rgba(255,255,255,.92);--surface2:rgba(255,255,255,.99);
  --border:rgba(80,60,120,.1);--border2:rgba(80,60,120,.18);
  --text:#160f2a;--muted:rgba(22,15,42,.5);--muted2:rgba(22,15,42,.28);
  --hero-txt:#2d1b69;
}
[data-theme="midnight"]{
  --bg:#00091a;--glow1:rgba(56,189,248,.07);--glow2:rgba(99,102,241,.05);--glow3:rgba(14,165,233,.04);
  --surface:rgba(56,189,248,.04);--surface2:rgba(56,189,248,.07);
  --border:rgba(56,189,248,.1);--border2:rgba(56,189,248,.18);
  --text:#e0f2fe;--muted:rgba(224,242,254,.45);--muted2:rgba(224,242,254,.22);
  --eng:#38bdf8;--engb:rgba(56,189,248,.1);--engborder:rgba(56,189,248,.25);
  --hero-txt:#fff;
}
[data-theme="forest"]{
  --bg:#010a05;--glow1:rgba(34,197,94,.07);--glow2:rgba(16,185,129,.05);--glow3:rgba(101,163,13,.04);
  --surface:rgba(34,197,94,.04);--surface2:rgba(34,197,94,.07);
  --border:rgba(34,197,94,.1);--border2:rgba(34,197,94,.18);
  --text:#ecfdf5;--muted:rgba(236,253,245,.45);--muted2:rgba(236,253,245,.22);
  --eng:#10b981;--engb:rgba(16,185,129,.1);--engborder:rgba(16,185,129,.25);
  --hero-txt:#fff;
}
[data-theme="ember"]{
  --bg:#0a0400;--glow1:rgba(251,146,60,.07);--glow2:rgba(245,158,11,.05);--glow3:rgba(239,68,68,.04);
  --surface:rgba(251,146,60,.04);--surface2:rgba(251,146,60,.07);
  --border:rgba(251,146,60,.12);--border2:rgba(251,146,60,.2);
  --text:#fff7ed;--muted:rgba(255,247,237,.45);--muted2:rgba(255,247,237,.22);
  --eng:#fb923c;--engb:rgba(251,146,60,.1);--engborder:rgba(251,146,60,.25);
  --hero-txt:#fff;
}
body{
  background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;line-height:1.5;
  background-image:radial-gradient(ellipse 70% 50% at 15% 0%,var(--glow1),transparent 60%),radial-gradient(ellipse 55% 45% at 85% 100%,var(--glow2),transparent 60%),radial-gradient(ellipse 40% 50% at 50% 40%,var(--glow3),transparent 70%);
  background-attachment:fixed;
}
h1,h2,h3{font-family:'Bricolage Grotesque',system-ui,sans-serif;font-weight:700}
a{color:inherit;text-decoration:none}
.wrap{max-width:1380px;margin:0 auto;padding:22px 24px 70px}

/* HEADER */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:26px;flex-wrap:wrap}
.hdr-brand{font-size:21px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.02em;flex:1}
.hdr-brand span{background:linear-gradient(90deg,var(--eng),var(--math));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hbtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;backdrop-filter:blur(10px)}
.hbtn:hover{color:var(--text);border-color:var(--border2)}

/* BENTO GRID */
.bento{display:grid;gap:14px;grid-template-columns:280px 1fr 280px}
@media(max-width:1150px){.bento{grid-template-columns:1fr 1.4fr}}
@media(max-width:720px){.bento{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s}
.card-title{font-size:13px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .ic{font-size:15px;opacity:.8}

/* HERO (centre column, spans 2 rows) */
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:22px 20px 20px;grid-column:2;grid-row:1/3;border-color:rgba(168,85,247,.2);box-shadow:0 0 60px rgba(168,85,247,.06)}
.hero-eye{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.hero-count{font-size:76px;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;line-height:1;letter-spacing:-.04em;color:var(--hero-txt);margin-bottom:2px}
/* theme picker */
.theme-picker{position:absolute;top:44px;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;z-index:200;min-width:160px;box-shadow:0 12px 40px rgba(0,0,0,.4);backdrop-filter:blur(20px)}
.theme-picker.hidden{display:none}
.theme-opt{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;transition:.12s;color:var(--text)}
.theme-opt:hover{background:var(--border)}
.theme-opt.active{background:var(--border2)}
.theme-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.hero-unit{font-size:16px;color:var(--muted);font-weight:500;margin-bottom:6px}
.hero-datestr{font-size:12px;color:var(--muted2);margin-bottom:20px}
.streak-pill{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:6px 14px;margin-bottom:14px}
.streak-n{font-size:20px;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;line-height:1}
.streak-lbl{font-size:11.5px;color:var(--muted)}
.yr-prog{width:100%;margin-bottom:20px}
.yr-top{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.pbar{height:7px;background:var(--surface2);border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.pbar i{display:block;height:100%;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.hdiv{width:100%;height:1px;background:var(--border);margin:0 0 12px}
.focus-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;text-align:left;width:100%}
.focus-btn{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px;cursor:pointer;transition:.15s;text-align:left}
.focus-btn:hover{border-color:var(--border2);background:rgba(255,255,255,.1)}
.focus-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.focus-name{font-weight:600;font-size:13.5px;flex:1}
.focus-arr{color:var(--muted);font-size:11px}
.date-row{margin-top:14px;width:100%}
.date-row label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;text-align:left}
.date-row input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:7px 10px;font-size:13px;font-family:inherit}
.date-row input:focus{outline:none;border-color:var(--eng)}

/* SUBJECTS ROW */
.subj-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:1100px){.subj-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.subj-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.subj-row{grid-template-columns:1fr}}
.subj-card{display:flex;flex-direction:column;gap:11px;cursor:pointer;transition:transform .18s,box-shadow .18s}
.subj-card:hover{transform:translateY(-3px)}
.subj-top{display:flex;align-items:flex-start;gap:11px}
.subj-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.subj-name{font-size:15px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;line-height:1.2}
.subj-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.subj-links{display:flex;flex-direction:column;gap:3px}
.sl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);padding:4px 7px;border-radius:7px;transition:.12s;cursor:pointer}
.sl:hover{background:var(--surface2);color:var(--text)}
.sl .sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* BOTTOM */
.bottom-row{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:900px){.bottom-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.bottom-row{grid-template-columns:1fr}}

/* TODO */
.todo-add{display:flex;gap:8px;margin-bottom:10px}
.todo-add input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 11px;font-size:13px;font-family:inherit}
.todo-add input:focus{outline:none;border-color:var(--eng)}
.todo-add input::placeholder{color:var(--muted2)}
.todo-add button{background:var(--eng);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14px;cursor:pointer;font-weight:700}
.todo-add button:hover{background:#9333ea}
.tsubj-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tsbtn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.12s}
.tsbtn.on{color:#fff;border-color:transparent}
.todo-list{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow-y:auto}
.todo-item{display:flex;align-items:flex-start;gap:9px;padding:7px 10px;border-radius:10px;border:1px solid transparent;transition:.12s;font-size:13px}
.todo-item:hover{background:var(--surface2);border-color:var(--border)}
.todo-item input[type=checkbox]{accent-color:var(--eng);margin-top:2px;flex-shrink:0;cursor:pointer;width:15px;height:15px}
.ttxt{flex:1;line-height:1.4}
.todo-item.done .ttxt{text-decoration:line-through;color:var(--muted)}
.tdel{color:var(--muted2);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:5px;flex-shrink:0}
.tdel:hover{color:var(--red);background:var(--redb)}
.tpill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-right:5px;font-weight:600}

/* SCHEDULE */
.sched-scroll{max-height:290px;overflow-y:auto}
.sched-day{margin-bottom:10px}
.sday-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.sday-lbl span{height:1px;flex:1;background:var(--border)}
.sched-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;font-size:12.5px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sched-txt{flex:1}
.sched-dur{font-size:11px;color:var(--muted);flex-shrink:0}
.regen{width:100%;margin-top:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.regen:hover{color:var(--text);border-color:var(--border2)}

/* SESSIONS */
.sess-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.sess-item{display:flex;align-items:center;gap:10px;padding:7px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:12.5px}
.sess-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sess-info{flex:1}
.sess-date{font-size:11px;color:var(--muted);flex-shrink:0}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:22px;opacity:.6}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(13,13,26,.95);border:1px solid var(--eng);color:var(--text);padding:11px 20px;border-radius:11px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none;backdrop-filter:blur(20px)}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
.anim{animation:fadeUp .38s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim:nth-child(1){animation-delay:.05s}.anim:nth-child(2){animation-delay:.1s}.anim:nth-child(3){animation-delay:.15s}

/* TIMER CARD */
.timer-display{font-size:48px;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;line-height:1;margin:10px 0 6px;text-align:center}
.timer-subj-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tsbtn2{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:.12s}
.tsbtn2.on{color:#fff;border-color:transparent}
.timer-btns{display:flex;gap:8px;justify-content:center;margin-top:10px}
.tbtn{border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.tbtn.start{background:var(--eng);color:#fff}
.tbtn.start:hover{background:#9333ea}
.tbtn.pause{background:var(--chem);color:#000}
.tbtn.stop{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.tbtn.stop:hover{color:var(--red);border-color:var(--red)}
.goal-bar-wrap{margin-top:10px}
.goal-bar-top{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.focus-btn2{width:100%;margin-top:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.focus-btn2:hover{color:var(--text);border-color:var(--border2)}

/* FULLSCREEN FOCUS */
.focus-overlay{position:fixed;inset:0;background:#030308;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:0}
.focus-overlay.show{display:flex}
.fo-subject{font-size:16px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.15em;margin-bottom:16px}
.fo-icon{font-size:56px;margin-bottom:10px}
.fo-time{font-size:120px;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.04em;line-height:1;color:#fff;margin-bottom:8px}
.fo-goal{font-size:14px;color:rgba(255,255,255,.3);margin-bottom:32px}
.fo-goalbar{width:320px;height:6px;background:rgba(255,255,255,.1);border-radius:20px;overflow:hidden;margin-bottom:40px}
.fo-goalbar i{display:block;height:100%;border-radius:20px;transition:width .5s}
.fo-btns{display:flex;gap:14px}
.fo-btn{border:none;border-radius:14px;padding:13px 30px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;transition:.15s}
.fo-btn.pause{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.fo-btn.pause:hover{background:rgba(245,158,11,.3)}
.fo-btn.stop{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.fo-btn.stop:hover{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3)}
.fo-esc{position:absolute;top:20px;right:24px;font-size:12px;color:rgba(255,255,255,.2);cursor:pointer}
.fo-esc:hover{color:rgba(255,255,255,.5)}

/* GRAPH */
.graph-wrap{position:relative;width:100%}
canvas#studyGraph{width:100%;height:160px;display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr anim">
    <div class="hdr-brand">HSC <span>Dashboard</span></div>
    <div style="display:flex;gap:8px;position:relative">
      <button class="hbtn" id="themeBtn" onclick="toggleThemePicker()">🎨 Theme</button>
      <button class="hbtn" id="backupBtn">⇅ Backup</button>
      <div class="theme-picker hidden" id="themePicker">
        <div class="theme-opt" onclick="setTheme('dark')"><span class="theme-dot" style="background:#a855f7"></span>Dark</div>
        <div class="theme-opt" onclick="setTheme('light')"><span class="theme-dot" style="background:#9333ea;border-color:#c4b5fd"></span>Light</div>
        <div class="theme-opt" onclick="setTheme('midnight')"><span class="theme-dot" style="background:#38bdf8"></span>Midnight</div>
        <div class="theme-opt" onclick="setTheme('forest')"><span class="theme-dot" style="background:#22c55e"></span>Forest</div>
        <div class="theme-opt" onclick="setTheme('ember')"><span class="theme-dot" style="background:#fb923c"></span>Ember</div>
      </div>
    </div>
  </div>
  <div class="bento" id="bento"></div>
</div>
<div class="toast" id="toast"></div>
<div class="focus-overlay" id="focusOverlay">
  <div class="fo-esc" onclick="exitFocus()">✕ press esc to exit</div>
  <div class="fo-icon" id="foIcon">📚</div>
  <div class="fo-subject" id="foSubject">English Advanced</div>
  <div class="fo-time" id="foTime">00:00:00</div>
  <div class="fo-goal" id="foGoal">0:00 / 3:00 today</div>
  <div class="fo-goalbar"><i id="foGoalBar" style="width:0%;background:var(--eng)"></i></div>
  <div class="fo-btns">
    <button class="fo-btn pause" id="foPause" onclick="timerPause()">⏸ Pause</button>
    <button class="fo-btn stop" onclick="timerStop()">⏹ Stop &amp; Save</button>
  </div>
</div>
<script>
const KEY='hsc_dash';
const SUBJECTS=[
  {id:'eng',name:'English Advanced',short:'English',icon:'📚',color:'var(--eng)',bg:'var(--engb)',border:'var(--engborder)',url:'/english/',lsKey:'hsceng_progress',
   examDate:'2026-10-13',examLabel:'Paper 1 · 13 Oct 09:50',examDate2:'2026-10-14',examLabel2:'Paper 2 · 14 Oct 09:25',
   links:[{l:'Common Module — 1984',h:'common'},{l:'Module A — Textual Conversations',h:'moda'},{l:'Module B — T.S. Eliot',h:'modb'},{l:'Module C — Discursive',h:'modc'}]},
  {id:'math',name:'Maths Standard 2',short:'Maths',icon:'📐',color:'var(--math)',bg:'var(--mathb)',border:'var(--mathborder)',url:'/math/',lsKey:'hscmath_progress',
   examDate:'2026-10-19',examLabel:'Written · 19 Oct 09:20',
   links:[{l:'Algebra',h:'algebra'},{l:'Measurement',h:'measurement'},{l:'Financial Maths',h:'financial'},{l:'Statistics',h:'statistics'}]},
  {id:'bio',name:'Biology',short:'Bio',icon:'🧬',color:'var(--bio)',bg:'var(--biob)',border:'var(--bioborder)',url:'/biology/',lsKey:'hscbio_progress',
   examDate:'2026-10-21',examLabel:'Written · 21 Oct 09:25',
   links:[{l:'Module 5 — Heredity',h:'m5'},{l:'Module 6 — Genetic Change',h:'m6'},{l:'Module 7 — Infectious Disease',h:'m7'},{l:'Module 8 — Immune System',h:'m8'}]},
  {id:'chem',name:'Chemistry',short:'Chem',icon:'⚗️',color:'var(--chem)',bg:'var(--chemb)',border:'var(--chemborder)',url:'/chemistry/',lsKey:'hscchem_progress',

function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function subj(id){return SUBJECTS.find(s=>s.id===id)||null;}
function today(){return new Date().toISOString().slice(0,10);}
function daysLeft(){return Math.max(0,Math.ceil((new Date(S.examDate)-new Date())/86400000));}
function daysTo(dateStr){return Math.max(0,Math.ceil((new Date(dateStr)-new Date())/86400000));}
function nextExam(){

    ...SUBJECTS.map(s=>({name:s.name,short:s.short,label:s.examLabel,date:s.examDate,color:s.color})),

function getProg(s){

    const tot=s.id==='bio'?80:s.id==='chem'?80:s.id==='eng'?20:40;
    return Math.min(100,Math.round(n/tot*100));
  }catch(e){return 0;}}

function genSched(){
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const out=[];
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const isW=d.getDay()===0||d.getDay()===6;
    const s1=SUBJECTS[(i+S.schedSeed)%SUBJECTS.length];
    const s2=SUBJECTS[(i+S.schedSeed+2)%SUBJECTS.length];
    const t1=s1.links[i%s1.links.length].l.split('—')[1]?.trim()||s1.links[0].l;
    const t2=s2.links[(i+1)%s2.links.length].l.split('—')[1]?.trim()||s2.links[0].l;
    const items=isW?[{s:s1,t:t1,dur:'2h'},{s:s2,t:t2,dur:'1h'}]:[{s:s1,t:t1,dur:'1.5h'}];
    out.push({label:i===0?'Today':i===1?'Tomorrow':dow[d.getDay()],items});
  }return out;
}

let timerInterval=null;
let timerElapsed=0; // seconds accumulated before current run
let timerStart=null; // Date.now() when last started

function timerRunning(){return timerInterval!==null;}
function timerCurrent(){return timerRunning()?timerElapsed+Math.floor((Date.now()-timerStart)/1000):timerElapsed;}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function todayStudiedSec(){return S.sessions.filter(s=>s.date===today()&&s.duration).reduce((a,s)=>a+(s.duration||0),0);}

function timerStart2(){

  // update focus overlay subject

/* ==================== GRAPH ==================== */
function drawGraph(){
  const canvas=document.getElementById('studyGraph');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*window.devicePixelRatio;canvas.height=H*window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);

  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  const textCol=isDark?'rgba(240,240,255,.4)':'rgba(15,15,26,.4)';
  const gridCol=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  const goalCol=isDark?'rgba(239,68,68,.5)':'rgba(239,68,68,.6)';

  // build 14 days of data
  const days=14;
  const labels=[],data=[],colors=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    labels.push(i===0?'Today':d.toLocaleDateString('en-AU',{weekday:'short'}));
    const sess=S.sessions.filter(s=>s.date===ds&&s.duration);
    const totalSec=sess.reduce((a,s)=>a+(s.duration||0),0);
    data.push(totalSec/3600); // hours
    // dominant subject colour
    const subjCount={};
    sess.forEach(s=>{subjCount[s.subject]=(subjCount[s.subject]||0)+(s.duration||0);});
    const dom=Object.entries(subjCount).sort((a,b)=>b[1]-a[1])[0];
    const domSubj=dom?subj(dom[0]):null;
    const colorMap={'eng':'#a855f7','bio':'#22c55e','chem':'#f59e0b','math':'#3b82f6'};
    colors.push(domSubj?colorMap[domSubj.id]:'rgba(255,255,255,.15)');
  }

  const maxH=Math.max(4,Math.ceil(Math.max(...data,3)*1.2));
  const goalH=3; // 3 hour goal line
  const padL=32,padR=10,padT=14,padB=28;
  const chartW=W-padL-padR,chartH=H-padT-padB;

  ctx.clearRect(0,0,W,H);

  // grid lines
  for(let i=0;i<=4;i++){
    const y=padT+chartH-(chartH*i/4);
    ctx.strokeStyle=gridCol;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+chartW,y);ctx.stroke();
    ctx.fillStyle=textCol;ctx.font='10px IBM Plex Sans,sans-serif';ctx.textAlign='right';
    ctx.fillText((maxH*i/4).toFixed(1)+'h',padL-4,y+3.5);
  }

  // goal line
  const goalY=padT+chartH-(chartH*goalH/maxH);
  ctx.strokeStyle=goalCol;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(padL,goalY);ctx.lineTo(padL+chartW,goalY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=goalCol;ctx.font='bold 10px IBM Plex Sans,sans-serif';ctx.textAlign='left';
  ctx.fillText('3h goal',padL+4,goalY-4);

  // bars
  const barW=Math.floor(chartW/days*0.6);
  const gap=chartW/days;
  data.forEach((val,i)=>{
    const x=padL+gap*i+(gap-barW)/2;
    const barH=Math.max(2,chartH*val/maxH);
    const y=padT+chartH-barH;
    // glow
    ctx.shadowColor=colors[i];ctx.shadowBlur=val>0?8:0;
    ctx.fillStyle=colors[i];
    // rounded top
    const r=Math.min(4,barW/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+barW-r,y);
    ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);
    ctx.lineTo(x+barW,y+barH);ctx.lineTo(x,y+barH);ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
    ctx.shadowBlur=0;
    // label
    ctx.fillStyle=textCol;ctx.font='9px IBM Plex Sans,sans-serif';ctx.textAlign='center';
    ctx.fillText(labels[i],x+barW/2,H-padB+13);
    // value on top if >0
    if(val>0.05){
      ctx.fillStyle=colors[i];ctx.font='bold 9px IBM Plex Sans,sans-serif';
      ctx.fillText(val.toFixed(1),x+barW/2,y-3);
    }
  });
}

function renderTimer(){
  const s=subj(S.timerSubj)||SUBJECTS[0];
  const todaySec=todayStudiedSec()+(timerRunning()?timerCurrent():0);
  const goalPct=Math.min(100,Math.round(todaySec/S.dailyGoalSec*100));
  return`<div class="card anim">
  <div class="card-title"><span class="ic">⏱</span>Study Timer
    <span style="margin-left:auto;font-size:11px;color:var(--muted)">Goal: 3h/day</span>
  </div>
  <div class="timer-subj-sel">
    ${SUBJECTS.map(sub=>`<button id="tsb_${sub.id}" class="tsbtn2${S.timerSubj===sub.id?' on':''}" style="${S.timerSubj===sub.id?`background:${sub.color};border-color:${sub.color};color:#fff`:''}" onclick="setTimerSubj('${sub.id}')">${sub.short}</button>`).join('')}
  </div>
  <div class="timer-display" id="timerDisplay" style="color:${s.color}">${fmtTime(timerCurrent())}</div>
  <div class="goal-bar-wrap">
    <div class="goal-bar-top"><span>Today</span><span id="miniGoalLbl">${goalPct}%</span></div>
    <div class="pbar"><i id="miniGoalBar" style="width:${goalPct}%;background:${s.color}"></i></div>
  </div>
  <div class="timer-btns">
    <button class="tbtn ${timerRunning()?'pause':'start'}" id="timerStartBtn" onclick="${timerRunning()?'timerPause()':'timerStart2()'}">${timerRunning()?'⏸ Pause':'▶ Start'}</button>
    ${timerRunning()||timerElapsed>0?`<button class="tbtn stop" onclick="timerStop()">⏹ Stop</button>`:''}
  </div>
  <button class="focus-btn2" onclick="enterFocus()">⛶ Enter Focus Mode</button>
</div>`;}

function renderGraph(){
  return`<div class="card anim" style="grid-column:1/-1">
  <div class="card-title"><span class="ic">📊</span>Study Time — Last 14 Days
    <span style="margin-left:auto;font-size:11px;color:var(--muted)">
      ${SUBJECTS.map(s=>`<span style="color:${s.color};margin-left:8px">● ${s.short}</span>`).join('')}
    </span>
  </div>
  <div class="graph-wrap"><canvas id="studyGraph" height="160"></canvas></div>
</div>`;}

function go(id){const s=subj(id);if(s){logSession(id,'General');window.location=s.url;}}
function goSec(id,h){const s=subj(id);if(s){logSession(id,h);window.location=s.url+'#'+h;}}
function addTodo(){const inp=document.getElementById('tIn');const t=inp.value.trim();if(!t)return;S.todos.push({text:t,done:false,subject:S.todoSubj||'',created:new Date().toISOString()});inp.value='';save();render();}
function toggleTodo(i){S.todos[i].done=!S.todos[i].done;save();render();}
function delTodo(i){S.todos.splice(i,1);save();render();}
function setTS(v){S.todoSubj=v;save();render();}
function setDate(v){S.examDate=v;save();render();toast('Exam date updated');}
function regenSched(){S.schedSeed=Math.floor(Math.random()*100);save();render();toast('Schedule regenerated');}
function clearHist(){if(confirm('Clear all session history?')){S.sessions=[];save();render();}}

function toggleThemePicker(){const p=document.getElementById('themePicker');p.classList.toggle('hidden');}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);S.theme=t;save();
  document.getElementById('themePicker').classList.add('hidden');
  requestAnimationFrame(drawGraph);
  // update active state
  document.querySelectorAll('.theme-opt').forEach((el,i)=>{
    const themes=['dark','light','midnight','forest','ember'];
    el.classList.toggle('active',themes[i]===t);
  });
}
document.addEventListener('click',e=>{
  const p=document.getElementById('themePicker');
  if(p&&!p.classList.contains('hidden')&&!p.contains(e.target)&&e.target.id!=='themeBtn')p.classList.add('hidden');
});

function bind(){
  document.getElementById('backupBtn').onclick=function(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(S));a.download='hsc-dashboard-backup.json';a.click();};
}

document.documentElement.setAttribute('data-theme',S.theme||'dark');
markStreak();
render();
</script>
