<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Instagram</title>
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="icon" href="icon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
  :root {
    --bg: #0c0f14;
    --panel: #1a1d24;
    --btn: #2b2f35;
    --text: #ffffff;
    --subtext: #a8a8a8;
    --link: #85a0f9;
    --accent: #5b51d8;
    --red: #ff3040;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  #phone-frame {
    max-width: 430px;
    height: 100%;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #scroller {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
    min-height: 0;
    padding-top: max(6px, env(safe-area-inset-top));
  }

  #pull-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 0;
    overflow: hidden;
    transition: height 0.15s ease-out;
  }
  #pull-indicator svg {
    width: 22px; height: 22px;
    animation: spin 0.7s linear infinite;
    opacity: 0; transition: opacity 0.1s;
  }
  #pull-indicator.show svg { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Header ---------- */
  header.topbar {
    display: flex;
    align-items: center;
    padding: 4px 16px 12px;
  }
  header.topbar .plus { flex-shrink: 0; }
  header.topbar .userblock {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 0;
  }
  header.topbar .username {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  header.topbar .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    margin-left: 2px;
  }
  header.topbar .icons {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  /* ---------- Profile ---------- */
  .profile-top {
    display: flex;
    align-items: center;
    padding: 8px 18px 0;
    gap: 26px;
  }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    object-fit: cover;
    background: #333 center/cover no-repeat;
  }
  .avatar-wrap .add-story {
    position: absolute;
    bottom: 0px; right: 0px;
    width: 27px; height: 27px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    border: 3px solid var(--bg);
  }
  .note-bubble {
    position: absolute;
    bottom: 84px; left: 2px;
    background: #363638;
    color: #f0f0f0;
    font-size: 12.5px;
    line-height: 1.2;
    padding: 8px 13px;
    border-radius: 16px;
    max-width: 128px;
    text-align: center;
    z-index: 3;
  }
  .note-bubble::after {
    content: "";
    position: absolute;
    bottom: -6px; left: 40px;
    width: 10px; height: 10px;
    background: #363638;
    border-radius: 50%;
  }
  .note-bubble::before {
    content: "";
    position: absolute;
    bottom: -13px; left: 36px;
    width: 5px; height: 5px;
    background: #363638;
    border-radius: 50%;
  }
  .info-col { flex: 1; min-width: 0; }
  .info-col .name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .stats {
    display: flex;
    justify-content: space-between;
    padding-right: 6px;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 19px; font-weight: 700; line-height: 1.15; }
  .stat .label { font-size: 14.5px; color: var(--text); margin-top: 1px; }

  /* ---------- Bio ---------- */
  .bio {
    padding: 12px 18px 0;
    font-size: 14.5px;
    line-height: 1.35;
  }
  .bio .link { color: var(--link); }

  .banners-btn {
    margin: 14px 18px 0;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid #303030;
    color: var(--subtext);
    border-radius: 9px;
    padding: 8px 15px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
  }

  /* ---------- Action buttons ---------- */
  .action-row {
    display: flex;
    gap: 6px;
    padding: 14px 16px 0;
  }
  .btn {
    flex: 1;
    background: var(--btn);
    color: var(--text);
    border: none;
    border-radius: 9px;
    padding: 9px 0;
    font-size: 14.5px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn.icon-only { flex: 0 0 46px; }

  /* ---------- Highlights ---------- */
  .highlights-row {
    display: flex;
    gap: 20px;
    padding: 18px 18px 20px;
    overflow-x: auto;
  }
  .highlights-row::-webkit-scrollbar { display: none; }
  .highlight {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
  }
  .highlight .circle {
    width: 66px; height: 66px;
    border-radius: 50%;
    border: 1px solid #363636;
    display: flex; align-items: center; justify-content: center;
  }
  .highlight .circle.filled {
    border: 1px solid #4a4a4a;
    background-size: cover;
    background-position: center;
    padding: 3px;
    background-clip: content-box;
  }
  .highlight .name { font-size: 12.5px; color: var(--text); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- Tabs ---------- */
  .tab-row {
    display: flex;
    border-top: 0.5px solid #262626;
  }
  .tab {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 12px 0;
    border-bottom: 1px solid transparent;
  }
  .tab.active { border-bottom: 1px solid var(--text); }
  .tab svg { opacity: 0.55; }
  .tab.active svg { opacity: 1; }

  /* ---------- Empty state ---------- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 20px 40px;
  }
  .empty-state img {
    width: 200px;
    height: auto;
    display: block;
    margin-bottom: 18px;
  }
  .empty-state .label {
    font-size: 23px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .empty-state .sublabel {
    font-size: 15px;
    color: var(--subtext);
    margin-top: 8px;
    margin-bottom: 18px;
  }
  .empty-state .create-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 11px;
    padding: 12px 40px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: 50px;
    border-top: 0.5px solid #262626;
    background: var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bottom-nav .nav-item .badge {
    position: absolute;
    top: -5px; right: -10px;
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 16px; height: 16px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
    border: 1.5px solid var(--bg);
  }
  .bottom-nav .nav-avatar-wrap { position: relative; }
  .bottom-nav .nav-avatar {
    width: 27px; height: 27px;
    border-radius: 50%;
    background: #333 center/cover no-repeat;
    border: 1px solid #555;
  }
  .bottom-nav .nav-avatar-wrap .dot {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--red);
    border: 1.5px solid var(--bg);
  }

  /* ---------- Modal ---------- */
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
    padding: 16px;
  }
  #modal.hidden { display: none; }
  #modal-content {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    max-width: 340px; width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  #modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--subtext); font-weight: 500; }
  .form-group input, .form-group textarea {
    background: var(--bg);
    border: 1px solid #363636;
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 66px; line-height: 1.4; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #0095f6; }
  .form-buttons { display: flex; gap: 10px; margin-top: 20px; }
  .form-buttons button {
    flex: 1; padding: 11px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .form-buttons .btn-primary { background: #0095f6; color: #fff; }
  .form-buttons .btn-secondary { background: var(--btn); color: var(--text); }

  .avatar-picker-row { display: flex; align-items: center; gap: 12px; }
  .avatar-preview-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #333 center/cover no-repeat;
    border: 1px solid #363636;
    flex-shrink: 0;
  }
  .choose-photo-btn {
    background: var(--btn);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }

  /* ---------- Cropper (shared: avatar + highlights) ---------- */
  #cropper {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 11000;
    display: flex;
    flex-direction: column;
    padding: max(14px, env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));
  }
  #cropper.hidden { display: none; }
  #cropper .crop-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  #cropper .crop-head .title { font-size: 16px; font-weight: 700; }
  #cropper .crop-head button {
    background: none; border: none; color: var(--text);
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    padding: 4px;
  }
  #cropper .crop-head button.use { color: #0095f6; }
  #cropper .crop-hint { font-size: 13px; color: var(--subtext); text-align: center; margin-bottom: 10px; }
  #crop-stage {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }
  #crop-wrap { position: relative; display: inline-block; max-width: 100%; max-height: 100%; }
  #crop-img { display: block; max-width: 100%; max-height: 60vh; -webkit-user-drag: none; user-select: none; pointer-events: none; }
  #crop-circle {
    position: absolute;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    cursor: grab;
    touch-action: none;
  }
  #crop-circle:active { cursor: grabbing; }
  #cropper .crop-controls { margin-top: 16px; }
  #cropper .crop-controls label { font-size: 13px; color: var(--subtext); display: block; margin-bottom: 8px; }
  #crop-size { width: 100%; accent-color: #0095f6; }
</style>
</head>
<body>

<div id="modal" class="hidden">
  <div id="modal-content">
    <h2>Edit Profile</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="e.g. jane.doe">
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="displayname" placeholder="e.g. Jane Doe">
    </div>
    <div class="form-group">
      <label>Note bubble (leave blank to hide)</label>
      <input type="text" id="note" placeholder="e.g. Inspo needed...">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea id="bio" rows="3" placeholder="e.g.&#10;living my best life&#10;@somelink"></textarea>
    </div>
    <div class="form-group">
      <label>Posts</label>
      <input type="number" id="posts" min="0">
    </div>
    <div class="form-group">
      <label>Followers</label>
      <input type="number" id="followers" min="0">
    </div>
    <div class="form-group">
      <label>Following</label>
      <input type="number" id="following" min="0">
    </div>
    <div class="form-group">
      <label>Avatar</label>
      <div class="avatar-picker-row">
        <div id="avatar-preview" class="avatar-preview-circle"></div>
        <button type="button" class="choose-photo-btn" onclick="openAvatarPicker()">Choose photo</button>
      </div>
    </div>
    <div class="form-group">
      <label>DM badge</label>
      <input type="number" id="dm-badge" min="0">
    </div>
    <div class="form-buttons">
      <button class="btn-secondary" onclick="cancelModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProfileFromModal()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="photo-picker" accept="image/*" style="display:none">

<div id="cropper" class="hidden">
  <div class="crop-head">
    <button onclick="cancelCrop()">Cancel</button>
    <span class="title" id="crop-title">Crop photo</span>
    <button class="use" onclick="confirmCrop()">Use</button>
  </div>
  <div class="crop-hint" id="crop-hint-text">Drag the circle over the photo</div>
  <div id="crop-stage">
    <div id="crop-wrap">
      <img id="crop-img" src="" alt="">
      <div id="crop-circle"></div>
    </div>
  </div>
  <div class="crop-controls">
    <label>Size</label>
    <input type="range" id="crop-size" min="20" max="100" value="55">
  </div>
</div>

<div id="phone-frame">
<div id="scroller">
  <div id="pull-indicator">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 100"/></svg>
  </div>

  <header class="topbar">
    <svg class="plus" width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="1.9" stroke-linecap="round"/></svg>
    <div class="userblock">
      <svg width="15" height="17" viewBox="0 0 24 24" fill="none"><rect x="4.5" y="10.5" width="15" height="10.5" rx="2.5" stroke="white" stroke-width="1.9"/><path d="M8 10.5V7.5a4 4 0 017.5-2" stroke="white" stroke-width="1.9" stroke-linecap="round"/></svg>
      <span class="username"></span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9.5l6 6 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="dot"></div>
    </div>
    <div class="icons">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 6.5h18M3 12h18M3 17.5h18" stroke="white" stroke-width="1.9" stroke-linecap="round"/></svg>
    </div>
  </header>

  <div class="profile-top">
    <div class="avatar-wrap">
      <div class="note-bubble" id="note-bubble" style="display:none"></div>
      <div class="avatar" id="avatar"></div>
      <div class="add-story"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="black" stroke-width="2.6" stroke-linecap="round"/></svg></div>
    </div>
    <div class="info-col">
      <div class="name"></div>
      <div class="stats">
        <div class="stat"><div class="num">0</div><div class="label">posts</div></div>
        <div class="stat"><div class="num">0</div><div class="label">followers</div></div>
        <div class="stat"><div class="num">0</div><div class="label">following</div></div>
      </div>
    </div>
  </div>

  <div class="bio" style="display:none"></div>

  <button class="banners-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#a8a8a8" stroke-width="2.4" stroke-linecap="round"/></svg> Add banners</button>

  <div class="action-row">
    <button class="btn" onclick="showModal()">Edit profile</button>
    <button class="btn">Share profile</button>
    <button class="btn icon-only"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M15 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8.5" cy="7" r="4" stroke="white" stroke-width="1.9"/><path d="M19 8v6M22 11h-6" stroke="white" stroke-width="1.9" stroke-linecap="round"/></svg></button>
  </div>

  <div class="highlights-row" id="highlights-row">
    <div class="highlight" onclick="openHighlightPicker()">
      <div class="circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
      <div class="name">New</div>
    </div>
  </div>

  <div class="tab-row">
    <div class="tab active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="2.5" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="9.3" y="2.5" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="16.1" y="2.5" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="2.5" y="9.3" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="9.3" y="9.3" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="16.1" y="9.3" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="2.5" y="16.1" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="9.3" y="16.1" width="5.4" height="5.4" rx="1.2" fill="white"/><rect x="16.1" y="16.1" width="5.4" height="5.4" rx="1.2" fill="white"/></svg></div>
    <div class="tab"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2.2" y="2.2" width="19.6" height="19.6" rx="4.5" stroke="white" stroke-width="1.6"/><path d="M2.5 8h19M9 2.5L12 8M15 2.5L18 8" stroke="white" stroke-width="1.6"/><path d="M10 12l5 3-5 3v-6z" fill="white"/></svg></div>
    <div class="tab"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M17 2.5l4 3.5-4 3.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="white" stroke-width="1.6" stroke-linecap="round"/><path d="M7 21.5l-4-3.5 4-3.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
    <div class="tab"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 20c0-3.3 3.6-5.5 8-5.5s8 2.2 8 5.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.6"/><rect x="1.5" y="1.5" width="21" height="21" rx="5" stroke="white" stroke-width="1.6"/></svg></div>
  </div>

  <div class="empty-state">
    <img src="illustration.jpg" alt="">
    <div class="label">Create your first post</div>
    <div class="sublabel">Make this space your own.</div>
    <button class="create-btn">Create</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 9.5V20a1 1 0 001 1h4v-6h3v6h4a1 1 0 001-1V9.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="nav-item"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="white" stroke-width="1.8"/><path d="M9.5 8.5l6 3.5-6 3.5v-7z" fill="white"/></svg></div>
  <div class="nav-item">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M21.5 3.5L2.8 10.2a.6.6 0 000 1.13l6.6 2.35a1 1 0 01.6.6l2.35 6.6a.6.6 0 001.13 0L21.5 3.5z" stroke="white" stroke-width="1.7" stroke-linejoin="round"/><path d="M21.5 3.5L10 14" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg>
    <span class="badge" id="dm-badge-display" style="display:none">0</span>
  </div>
  <div class="nav-item"><svg width="25" height="25" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7.5" stroke="white" stroke-width="1.8"/><path d="M21 21l-4.5-4.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
  <div class="nav-item nav-avatar-wrap">
    <div class="nav-avatar"></div>
    <div class="dot"></div>
  </div>
</div>
</div>

<script>
  const scroller = document.getElementById('scroller');
  const indicator = document.getElementById('pull-indicator');
  const modal = document.getElementById('modal');
  const THRESHOLD = 70;
  let startY = null;
  let pulling = false;

  const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23303030'/%3E%3Ccircle cx='50' cy='40' r='16' fill='%236e6e6e'/%3E%3Cpath d='M24 84c0-15 12-25 26-25s26 10 26 25z' fill='%236e6e6e'/%3E%3C/svg%3E";

  // ---------- Profile state & persistence ----------
  const profile = {
    username: '', displayName: '', note: '', bio: '',
    posts: 0, followers: 0, following: 0,
    avatarUrl: DEFAULT_AVATAR, dmBadge: 0
  };
  let pendingAvatarUrl = DEFAULT_AVATAR;

  function saveProfileToStorage() {
    localStorage.setItem('instadupe_profile', JSON.stringify(profile));
  }

  function loadProfile() {
    const saved = localStorage.getItem('instadupe_profile');
    if (saved) {
      const data = JSON.parse(saved);
      Object.assign(profile, data);
      pendingAvatarUrl = profile.avatarUrl;
    }
  }

  loadProfile();

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return num.toString();
  }

  function setAvatar(url) {
    document.querySelectorAll('.avatar, .nav-avatar').forEach(el => el.style.backgroundImage = `url("${url}")`);
  }

  function setBadge(el, val) {
    el.textContent = val;
    el.style.display = val > 0 ? 'flex' : 'none';
  }

  function renderBio(text) {
    const bioEl = document.querySelector('.bio');
    const trimmed = (text || '').trim();
    if (!trimmed) { bioEl.style.display = 'none'; bioEl.innerHTML = ''; return; }
    bioEl.style.display = '';
    bioEl.innerHTML = trimmed.split('\n').map(line => {
      const t = line.trim();
      if (!t) return '';
      const isLink = /^https?:\/\//i.test(t) || /^@/.test(t);
      const esc = escapeHtml(t);
      return isLink ? `<span class="link">${esc}</span>` : esc;
    }).join('<br>');
  }

  function applyProfileToDOM() {
    document.querySelector('.username').textContent = profile.username;
    document.querySelector('.name').textContent = profile.displayName;

    const noteEl = document.getElementById('note-bubble');
    noteEl.textContent = profile.note;
    noteEl.style.display = profile.note ? 'block' : 'none';

    renderBio(profile.bio);
    setAvatar(profile.avatarUrl);

    const statDivs = document.querySelectorAll('.stat');
    statDivs[0].querySelector('.num').textContent = formatNumber(profile.posts);
    statDivs[1].querySelector('.num').textContent = profile.followers.toLocaleString('en-US');
    statDivs[2].querySelector('.num').textContent = profile.following.toLocaleString('en-US');

    setBadge(document.getElementById('dm-badge-display'), profile.dmBadge);
  }

  function updateAvatarPreview() {
    document.getElementById('avatar-preview').style.backgroundImage = `url("${pendingAvatarUrl}")`;
  }

  function showModal() {
    document.getElementById('username').value = profile.username;
    document.getElementById('displayname').value = profile.displayName;
    document.getElementById('note').value = profile.note;
    document.getElementById('bio').value = profile.bio;
    document.getElementById('posts').value = profile.posts;
    document.getElementById('followers').value = profile.followers;
    document.getElementById('following').value = profile.following;
    document.getElementById('dm-badge').value = profile.dmBadge;
    pendingAvatarUrl = profile.avatarUrl;
    updateAvatarPreview();
    modal.classList.remove('hidden');
  }

  function cancelModal() {
    pendingAvatarUrl = profile.avatarUrl;
    modal.classList.add('hidden');
  }

  function reopenModal() { modal.classList.remove('hidden'); }

  function saveProfileFromModal() {
    profile.username = document.getElementById('username').value.trim();
    profile.displayName = document.getElementById('displayname').value.trim();
    profile.note = document.getElementById('note').value.trim();
    profile.bio = document.getElementById('bio').value;
    profile.posts = parseInt(document.getElementById('posts').value) || 0;
    profile.followers = parseInt(document.getElementById('followers').value) || 0;
    profile.following = parseInt(document.getElementById('following').value) || 0;
    profile.dmBadge = parseInt(document.getElementById('dm-badge').value) || 0;
    profile.avatarUrl = pendingAvatarUrl;

    applyProfileToDOM();
    saveProfileToStorage();
    modal.classList.add('hidden');
  }

  applyProfileToDOM();
  loadHighlightsFromStorage();

  // ---------- Shared cropper (avatar photo + highlight photo) ----------
  const cropperEl = document.getElementById('cropper');
  const cropImg = document.getElementById('crop-img');
  const cropCircle = document.getElementById('crop-circle');
  const cropSizeInput = document.getElementById('crop-size');
  const photoPicker = document.getElementById('photo-picker');
  const cropTitleEl = document.getElementById('crop-title');
  const cropHintEl = document.getElementById('crop-hint-text');
  let ccx = 0, ccy = 0, cd = 0;
  let cropMode = 'avatar';

  function openAvatarPicker() {
    cropMode = 'avatar';
    photoPicker.value = '';
    photoPicker.click();
  }
  function openHighlightPicker() {
    cropMode = 'highlight';
    photoPicker.value = '';
    photoPicker.click();
  }

  photoPicker.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    cropImg.src = URL.createObjectURL(file);
    if (cropMode === 'avatar') {
      cropTitleEl.textContent = 'Crop profile picture';
      cropHintEl.textContent = 'Drag the circle over the profile picture';
      modal.classList.add('hidden');
    } else {
      cropTitleEl.textContent = 'Crop highlight picture';
      cropHintEl.textContent = 'Drag the circle over the highlight picture';
    }
    cropperEl.classList.remove('hidden');
  });

  function clampCircle() {
    const w = cropImg.clientWidth, h = cropImg.clientHeight;
    cd = Math.max(30, Math.min(cd, w, h));
    ccx = Math.max(cd / 2, Math.min(ccx, w - cd / 2));
    ccy = Math.max(cd / 2, Math.min(ccy, h - cd / 2));
  }
  function layoutCircle() {
    clampCircle();
    cropCircle.style.width = cd + 'px';
    cropCircle.style.height = cd + 'px';
    cropCircle.style.left = (ccx - cd / 2) + 'px';
    cropCircle.style.top = (ccy - cd / 2) + 'px';
  }
  function sizeFromSlider() {
    const w = cropImg.clientWidth, h = cropImg.clientHeight;
    cd = (parseInt(cropSizeInput.value) / 100) * Math.min(w, h);
  }
  cropImg.addEventListener('load', () => {
    sizeFromSlider();
    ccx = cropImg.clientWidth * 0.22;
    ccy = cropImg.clientHeight * 0.18;
    layoutCircle();
  });
  cropSizeInput.addEventListener('input', () => { sizeFromSlider(); layoutCircle(); });

  let dragging = false, dsx = 0, dsy = 0, scx = 0, scy = 0;
  cropCircle.addEventListener('pointerdown', (e) => {
    dragging = true;
    cropCircle.setPointerCapture(e.pointerId);
    dsx = e.clientX; dsy = e.clientY; scx = ccx; scy = ccy;
  });
  cropCircle.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    ccx = scx + (e.clientX - dsx);
    ccy = scy + (e.clientY - dsy);
    layoutCircle();
  });
  cropCircle.addEventListener('pointerup', () => { dragging = false; });
  cropCircle.addEventListener('pointercancel', () => { dragging = false; });

  function cropToDataUrl() {
    const scale = cropImg.naturalWidth / cropImg.clientWidth;
    const sx = (ccx - cd / 2) * scale, sy = (ccy - cd / 2) * scale, sd = cd * scale;
    const out = Math.max(1, Math.round(sd));
    const canvas = document.createElement('canvas');
    canvas.width = out; canvas.height = out;
    canvas.getContext('2d').drawImage(cropImg, sx, sy, sd, sd, 0, 0, out, out);
    return canvas.toDataURL('image/jpeg', 0.92);
  }

  const highlights = [];

  function saveHighlightsToStorage() {
    const tiles = document.querySelectorAll('#highlights-row .highlight:not(:first-child)');
    const data = Array.from(tiles).map(el => ({
      imgUrl: el.querySelector('.circle').style.backgroundImage.match(/url\(["']?(.+?)["']?\)/)?.[1] || '',
      name: el.querySelector('.name').textContent
    }));
    localStorage.setItem('instadupe_highlights', JSON.stringify(data));
  }

  function loadHighlightsFromStorage() {
    const saved = localStorage.getItem('instadupe_highlights');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        data.forEach(h => addHighlightTile(h.imgUrl, h.name));
      } catch (e) {
        // ignore parse errors
      }
    }
  }

  function addHighlightTile(imgUrl, name) {
    const row = document.getElementById('highlights-row');
    const el = document.createElement('div');
    el.className = 'highlight';
    el.innerHTML = `<div class="circle filled" style="background-image:url('${imgUrl}')"></div><div class="name"></div>`;
    el.querySelector('.name').textContent = name;
    el.addEventListener('click', () => {
      if (confirm('Remove this highlight?')) {
        el.remove();
        saveHighlightsToStorage();
      }
    });
    row.appendChild(el);
  }

  function confirmCrop() {
    const dataUrl = cropToDataUrl();
    cropperEl.classList.add('hidden');
    if (cropMode === 'avatar') {
      pendingAvatarUrl = dataUrl;
      updateAvatarPreview();
      reopenModal();
    } else {
      const name = (prompt('Highlight name', 'Highlight') || '').trim().slice(0, 20) || 'Highlight';
      addHighlightTile(dataUrl, name);
      saveHighlightsToStorage();
    }
  }

  function cancelCrop() {
    cropperEl.classList.add('hidden');
    if (cropMode === 'avatar') reopenModal();
  }

  scroller.addEventListener('touchstart', (e) => {
    if (scroller.scrollTop <= 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  scroller.addEventListener('touchmove', (e) => {
    if (!pulling || startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const dist = Math.min(dy * 0.5, 90);
      indicator.style.height = dist + 'px';
      indicator.classList.toggle('show', dist > 20);
    }
  }, { passive: true });

  scroller.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const dist = parseFloat(indicator.style.height) || 0;
    if (dist > THRESHOLD * 0.5) {
      indicator.style.height = '50px';
      indicator.classList.add('show');
      setTimeout(() => { window.location.reload(); }, 700);
    } else {
      indicator.style.height = '0px';
      indicator.classList.remove('show');
    }
    startY = null;
  });
</script>

</body>
</html>
