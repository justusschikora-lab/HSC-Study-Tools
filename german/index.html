<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HSC German Continuers — Study Tool</title>
<style>
:root{
  --bg:#09080a;--surface:#130d09;--surface2:#1c1508;--accent:#e8a020;--accent2:#c47c10;
  --text:#f5e8d0;--muted:#9a8060;--line:#2e1f0a;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --blueb:#0e1836;--greenb:#0e2a14;--amberb:#261800;--redb:#2c1414;--purpleb:#1e1131;
}
html[data-theme="light"]{
  --bg:#fffbf0;--surface:#ffffff;--surface2:#fdf6e3;--accent:#b87010;--accent2:#8a5500;
  --text:#2c1800;--muted:#7a5c2a;--line:#e8d8b0;
  --blueb:#e6f0fb;--greenb:#e7f7ec;--amberb:#fdf3e1;--redb:#fbe9e9;--purpleb:#f0e8fb;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",system-ui,sans-serif;line-height:1.55}
h1,h2,h3,h4,.brand{font-family:"Bricolage Grotesque","IBM Plex Sans",system-ui,sans-serif;font-weight:700;letter-spacing:-.01em}
a{color:var(--accent)}
.app{display:flex;min-height:100vh}
.sidebar{width:252px;background:var(--surface);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto;flex-shrink:0}
.brand{font-size:18px;display:flex;align-items:center;gap:8px}
.brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#1a0800;font-weight:800;font-size:13px}
.brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:0}
.search input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px}
.search input:focus{outline:none;border-color:var(--accent)}
.navlist{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.navbtn{display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--muted);text-align:left;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;width:100%;transition:.12s}
.navbtn .ic{width:18px;text-align:center;font-size:12px;flex-shrink:0}
.navbtn:hover{background:var(--surface2);color:var(--text)}
.navbtn.active{background:linear-gradient(90deg,rgba(232,160,32,.15),transparent);color:var(--accent);font-weight:600}
.nav-sep{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 11px 2px;opacity:.6}
.exampill{margin-top:auto;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px}
.exampill label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.exampill .cd{font-size:22px;font-weight:700;color:var(--accent);font-family:"Bricolage Grotesque",sans-serif}
.exampill input{width:100%;margin-top:7px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:5px 7px;font-size:12px}
.sb-foot{display:flex;gap:6px;flex-wrap:wrap}
.sb-foot button{flex:1;font-size:11px;padding:6px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer;min-width:60px}
.sb-foot button:hover{color:var(--text);border-color:var(--accent)}
.main{flex:1;min-width:0;padding:26px 32px 90px;max-width:1100px}
.page-head{margin-bottom:18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.page-head h1{font-size:27px;margin:0 0 4px}.page-head p{color:var(--muted);margin:0;font-size:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab{font-size:13px;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:inherit}
.tab.on{background:rgba(232,160,32,.15);color:var(--accent);border-color:var(--accent)}
.block{border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13.5px;border-left:3px solid}
.block .bl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;margin-bottom:5px;opacity:.9}
.block.amber{background:var(--amberb);border-color:var(--accent)}.block.amber .bl{color:#fcd34d}
.block.blue{background:var(--blueb);border-color:var(--blue)}.block.blue .bl{color:#93c5fd}
.block.green{background:var(--greenb);border-color:var(--green)}.block.green .bl{color:#86efac}
.block.red{background:var(--redb);border-color:var(--red)}.block.red .bl{color:#fca5a5}
.block.purple{background:var(--purpleb);border-color:var(--purple)}.block.purple .bl{color:#d8b4fe}
.block.muted{background:var(--surface2);border-color:var(--muted)}
.dot{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin:0 0 10px;overflow:hidden}
.dot-h{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.dot-h:hover{background:var(--surface2)}
.dot-h .ttl{flex:1;font-weight:600;font-size:14.5px}
.dot-h .chev{color:var(--muted);transition:.2s;font-size:12px;padding-top:3px}
.dot.open .chev{transform:rotate(90deg)}
.dot-body{padding:0 15px 15px;display:none}.dot.open .dot-body{display:block}
.qa{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:9px 0;background:var(--surface2)}
.qa .qq{font-size:14px;margin-bottom:7px;font-weight:500}
.qa .ans{display:none;border-top:1px dashed var(--line);margin-top:9px;padding-top:9px;font-size:13.5px;color:#fcd34d;white-space:pre-wrap}
.qa.show .ans{display:block}
.qa .reveal{font-size:12px;background:var(--surface);border:1px solid var(--line);color:var(--accent);padding:4px 11px;border-radius:7px;cursor:pointer}
.quiz-card{background:var(--surface);border:2px solid var(--line);border-radius:18px;padding:28px;text-align:center;max-width:680px;margin:0 auto}
.quiz-card .qnum{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.quiz-card .qtext{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:22px}
.quiz-card .hint{font-size:13px;color:var(--text);margin-bottom:20px;display:none;white-space:pre-wrap;text-align:left;background:var(--surface2);border-radius:10px;padding:13px;border:1px solid var(--line)}
.quiz-card .hint.show{display:block}
.quiz-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn{background:var(--accent);color:#1a0800;border:none;border-radius:9px;padding:9px 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
.btn:hover{background:var(--accent2);color:#fff}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:6px 12px;font-size:12.5px}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
.pill.amber{color:#fcd34d;border-color:#5a3500;background:var(--amberb)}
.pill.blue{color:#93c5fd;border-color:#1e4a63;background:var(--blueb)}
.pill.green{color:#86efac;border-color:#1a4a2a;background:var(--greenb)}
.pill.red{color:#fca5a5;border-color:#5a1414;background:var(--redb)}
.pill.purple{color:#d8b4fe;border-color:#5b2d8f;background:var(--purpleb)}
.muted{color:var(--muted)}.small{font-size:12.5px}
.divider{height:1px;background:var(--line);margin:16px 0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:11px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
textarea.notes{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;resize:vertical;min-height:80px;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--accent)}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px;gap:12px}.kv:last-child{border:none}
.hidden{display:none!important}
.verb-table{width:100%;border-collapse:collapse;font-size:13px}
.verb-table th{background:var(--surface2);color:var(--muted);padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--line)}
.verb-table td{padding:8px 12px;border-bottom:1px solid var(--line)}
.verb-table tr:hover td{background:var(--surface2)}
.verb-table td:first-child{font-weight:700;color:var(--accent)}
.verb-table td:last-child{color:var(--muted);font-size:12px}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;margin-top:10px}
.vocab-item{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.vocab-item .de{font-weight:600;font-size:13.5px}
.vocab-item .en{color:var(--muted);font-size:12.5px;text-align:right;flex-shrink:0}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:12px}
.device-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px}
.device-card .dname{font-size:15px;font-weight:700;margin-bottom:1px}
.device-card .den{font-size:11px;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em}
.device-card .drow{font-size:13px;margin-bottom:7px;line-height:1.5}
.device-card .drow b{color:var(--accent);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px}
.device-card .ex{font-style:italic;background:var(--amberb);border-left:2px solid var(--accent);padding:6px 10px;border-radius:0 8px 8px 0;font-size:12.5px;margin-top:8px;color:var(--text)}
.phrase-cat{margin-bottom:20px}
.phrase-cat h3{font-size:14px;margin:0 0 10px;color:var(--accent)}
.phrase-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;align-items:flex-start}
.phrase-row:last-child{border:none}
.phrase-row .pde{flex:1;font-weight:500}
.phrase-row .pen{color:var(--muted);font-size:12.5px;flex:1}
.oral-starter{background:var(--surface2);border-left:3px solid var(--accent);padding:7px 12px;border-radius:0 8px 8px 0;font-size:13.5px;margin:5px 0}
.error-item{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px}
.error-item .etitle{font-weight:700;font-size:14px;margin-bottom:5px}
.error-item .edetail{font-size:13px;color:var(--muted);margin-bottom:7px}
.error-item .efix{font-size:13px;color:#86efac}
.error-item .efix::before{content:"✓ ";font-weight:700}
.template-box{background:var(--amberb);border:1px solid var(--line);border-radius:10px;padding:14px;font-family:"IBM Plex Mono",monospace;font-size:12.5px;white-space:pre-wrap;margin:10px 0;line-height:1.65}
</style>
</head>

<div id="ftimer" style="display:none;position:fixed;bottom:20px;right:20px;background:rgba(10,8,2,.92);border:1px solid rgba(232,160,32,.4);border-radius:14px;padding:10px 15px;backdrop-filter:blur(20px);z-index:500;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);cursor:pointer;font-family:'IBM Plex Sans',system-ui,sans-serif" onclick="window.location='../index.html'">
  <div id="ft-icon" style="font-size:16px">🇩🇪</div>
  <div><div id="ft-subj" style="font-size:10px;color:rgba(245,232,208,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px"></div><div id="ft-time" style="font-size:18px;font-weight:800;color:#e8a020;font-family:'Bricolage Grotesque',system-ui,sans-serif;letter-spacing:-.01em">00:00:00</div></div>
  <div style="font-size:10px;color:rgba(245,232,208,.3);padding-left:6px;border-left:1px solid rgba(245,232,208,.1)">↗ dash</div>
</div>
<script>
(function(){
  const TK='hsc_timer_v2';
  const SUBJ_MAP={eng:{name:'English',icon:'📚',color:'#a855f7'},bio:{name:'Biology',icon:'🧬',color:'#22c55e'},chem:{name:'Chem',icon:'⚗️',color:'#f59e0b'},math:{name:'Maths',icon:'📐',color:'#3b82f6'},ger:{name:'German',icon:'🇩🇪',color:'#e8a020'}};
  function getTS(){try{return JSON.parse(localStorage.getItem(TK))||{running:false,elapsed:0,startedAt:null};}catch(e){return{running:false,elapsed:0,startedAt:null};}}
  function timerSec(){const ts=getTS();return(ts.running&&ts.startedAt)?ts.elapsed+Math.floor((Date.now()-ts.startedAt)/1000):ts.elapsed;}
  function fmt(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
  function update(){
    const ts=getTS(),el=document.getElementById('ftimer');
    if(!el)return;
    if(!ts.running&&ts.elapsed===0){el.style.display='none';return;}
    el.style.display='flex';
    const s=SUBJ_MAP[ts.subject]||SUBJ_MAP.ger;
    document.getElementById('ft-icon').textContent=s.icon;
    document.getElementById('ft-subj').textContent=s.name;
    document.getElementById('ft-time').textContent=fmt(timerSec());
    document.getElementById('ft-time').style.color=s.color;
  }
  update();setInterval(update,1000);
})();
</script>
<script>
const LS_KEY="hscger_v1";
const DEFAULT_STATE={notes:{},examDate:"2026-10-14",theme:"dark"};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)return Object.assign({},JSON.parse(JSON.stringify(DEFAULT_STATE)),s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE));}
let saveT;function save(){clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(LS_KEY,JSON.stringify(state)),350);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ==================== NAV ==================== */
const NAV=[
  {id:"lang",label:"Text Analysis Devices",ic:"🔍"},
  {id:"grammar",label:"Grammar Reference",ic:"📖"},
  {sep:"ORAL"},
  {id:"oral",label:"Oral Exam Prep",ic:"🎙️"},
  {sep:"VOCAB & REFERENCE"},
  {id:"vocab",label:"Topic Vocab Banks",ic:"📚"},
  {id:"phrases",label:"Phrases & Connectives",ic:"💬"},
  {id:"verbs",label:"Irregular Verbs",ic:"🔄"},
  {sep:"EXAM PREP"},
  {id:"pastpapers",label:"Past Paper Qs",ic:"📋"},
  {id:"quiz",label:"Quiz Mode",ic:"⚡"},
  {id:"writing",label:"Writing Templates",ic:"✍️"},
  {id:"errors",label:"Common Errors",ic:"⚠️"},
];

let currentPage="lang";
let quizFilter='all';let quizCurrent=0;let quizOrder=[];

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=NAV.map(n=>{
    if(n.sep) return`<div class="nav-sep">${esc(n.sep)}</div>`;
    return`<button class="navbtn${n.id===currentPage?' active':''}" onclick="goto('${n.id}')"><span class="ic">${n.ic}</span>${esc(n.label)}</button>`;
  }).join('');
}

function goto(id){
  currentPage=id;buildNav();
  const m=document.getElementById('main');
  try{
    switch(id){
      case'lang':renderLang(m);break;
      case'grammar':renderGrammar(m);break;
      case'oral':renderOral(m);break;
      case'vocab':renderVocab(m);break;
      case'phrases':renderPhrases(m);break;
      case'verbs':renderVerbs(m);break;
      case'pastpapers':renderPastPapers(m);break;
      case'quiz':renderQuiz(m);break;
      case'writing':renderWriting(m);break;
      case'errors':renderErrors(m);break;
      default:renderLang(m);
    }
  }catch(e){
    m.innerHTML=`<div style="padding:30px;color:#ef4444;font-family:monospace;font-size:13px;background:#2c1414;border-radius:12px;margin:20px">
      <b>JS Error in render('${id}'):</b><br><br>${e.message}<br><br><pre style="white-space:pre-wrap;font-size:11px;opacity:.7">${e.stack||''}</pre>
    </div>`;
  }
  m.scrollTop=0;
}
function render(){goto(currentPage);}

/* ==================== DATA ==================== */

const DEVICES=[
  {de:"Rhetorische Frage",en:"Rhetorical Question",
   what:"A question posed for effect — not expecting an answer.",
   when:"Emotional conversations (Q7), persuasive texts. Signals frustration, conviction, or irony.",
   exDe:'"Warum bin ich immer Diejenige, die den Kaffee holen muss?" (2025 Q7)',
   exEn:'"Why am I always the one who has to get the coffee?" — underlines Katja\'s frustration at work.',
   how:"The rhetorical question underlines [emotion] by implying [meaning] — no answer is expected."},
  {de:"Emotive Sprache",en:"Emotive Language",
   what:"Words with strong emotional charge, chosen to evoke intense feelings in the listener/reader.",
   when:"Wherever emotional states are analysed — conversations, letters, arguments.",
   exDe:'"Ich habe die Nase voll" / "unglaublich" / "das ist mir wirklich zu viel" (2025 Q7)',
   exEn:'"I\'ve had it up to here" / "unbelievable" / "this is really too much for me" — conveys Katja\'s intense frustration.',
   how:"Identify the word/phrase → name the emotion → link to character\'s state or author\'s purpose."},
  {de:"Sarkasmus",en:"Sarcasm",
   what:"Saying the opposite of what you mean — ironic, often mocking or contemptuous.",
   when:"Conflict texts, critical reviews, when a character shows disappointment or contempt.",
   exDe:'"der liebe Oskar B." (2025 Q9d)',
   exEn:'"dear Oskar B." — used ironically; the warmth of "dear" is undercut by Renate\'s clear disappointment.',
   how:"The sarcasm in [phrase] conveys [emotion] by implying the opposite of its literal meaning."},
  {de:"Hyperbel",en:"Hyperbole",
   what:"Deliberate exaggeration for effect — not meant to be taken literally.",
   when:"Persuasive texts, emotional reactions. Shows the intensity of a feeling or opinion.",
   exDe:'"etwas so Verzauberndes, so Entzückendes" (2025 Q9d)',
   exEn:'"something so enchanting, so delightful" — the repeated superlative exaggerates Renate\'s enthusiasm for the novel.',
   how:"The hyperbole in [phrase] emphasises [emotion] to an extreme degree, conveying..."},
  {de:"Ausruf",en:"Exclamation",
   what:"An exclamation expressing strong emotion — joy, anger, surprise.",
   when:"Conversations and informal texts. Shows an immediate, unfiltered emotional reaction.",
   exDe:'"Juhu!" / "Wirklich?" (2025 Q7)',
   exEn:'"Yay!" / "Really?" — conveys Katja\'s sudden surprise and delight when Leo offers to cover her shift.',
   how:"The exclamation [word] conveys [emotion] through its sudden, emphatic nature."},
  {de:"Idiomatischer Ausdruck",en:"Idiomatic Expression",
   what:"A figurative expression that makes no literal sense — meaning is culturally embedded.",
   when:"Authentic texts and conversations. Signals native-level register and emotional nuance.",
   exDe:'"in die Luft springen" (2025 Q9d)',
   exEn:'"to jump for joy" — conveys Renate\'s enthusiastic anticipation for the new novel.',
   how:"The idiomatic expression [phrase] conveys [emotion/meaning] through its culturally embedded imagery."},
  {de:"Umgangssprache / Jugendsprache",en:"Colloquial / Youth Language",
   what:"Informal everyday language or slang — contrasts with standard written German.",
   when:"Informal conversations and SMS. Reveals the speaker\'s age, familiarity, or social status.",
   exDe:'"I bims" / "Job ist cool" / "Lass mal, Oma!" (2018 Q8)',
   exEn:'"It\'s me" (slang) / "The job is cool" / "Leave it, Grandma!" — Leo\'s youth language contrasts sharply with Oma\'s formal German, enacting the generational gap.',
   how:"The colloquial language reveals [character trait/relationship/generational contrast] by contrasting with..."},

       text:`"Joachims Begegnung mit der Vergangenheit"

  {cat:"phrase",topic:"Betonung",q:"Emphasise a key point.",a:"Vor allem / Besonders / Insbesondere…\nEs ist wichtig zu betonen, dass…\nTatsächlich…\nGerade deshalb…"},
  {cat:"device",topic:"Language Devices",q:"What is a Rhetorische Frage (Rhetorical Question)?",a:"A question posed for effect — not expecting an answer.\n\nAppears: emotional conversations (Q7), persuasive texts.\nEffect: signals frustration, conviction, or irony.\n\nExample 2025 Q7: 'Warum bin ich immer Diejenige, die den Kaffee holen muss?'\n→ 'Why am I always the one who has to get the coffee?'\n\nHow to cite: 'The rhetorical question underlines [emotion] by implying that…'"},
  {cat:"device",topic:"Language Devices",q:"What is Hyperbel (Hyperbole)?",a:"Deliberate exaggeration for effect — not meant literally.\n\nEffect: shows intensity of feeling, emphasises a point.\n\nExample 2025 Q9d: 'etwas so Verzauberndes, so Entzückendes'\n→ 'something so enchanting, so delightful' — exaggerates Renate's enthusiasm\n\nHow to cite: 'The hyperbole in [phrase] emphasises [emotion] to an extreme degree, conveying…'"},
  {cat:"device",topic:"Language Devices",q:"What is the difference between Sarkasmus and Ironie?",a:"Sarkasmus (Sarcasm): saying the OPPOSITE of what you mean, with scorn or mockery.\nIronie (Irony): broader discrepancy between what is said/meant OR expectation/reality.\n\nSarcasm example 2025 Q9d: 'der liebe Oskar B.' → 'dear Oskar B.' — used ironically, conveys disappointment\nIrony example 2022 Q9: Joachim (a native German) feels like a foreigner in Germany\n\nEffect: both reveal negative attitude or an unexpected contradiction"},
  {cat:"device",topic:"Language Devices",q:"What is Umgangssprache / Jugendsprache (Colloquial / Youth Language)?",a:"Informal everyday language or slang — contrasts with standard written German.\n\nSignificance: reveals character's age, social background, relationship, and register.\n\nExample 2018 Q8: 'I bims' (= 'It's me'), 'Job ist cool' — Leo's slang vs. Oma's formal German\n→ Shows the generational AND linguistic gap between them"},
  {cat:"device",topic:"Language Devices",q:"What is Emotive Sprache (Emotive Language)?",a:"Language chosen specifically to evoke strong emotional responses.\n\nHow to identify: look for words with a strong emotional charge — anger, joy, frustration.\n\nExample 2025 Q7: 'unglaublich' (unbelievable), 'Ich habe die Nase voll' (I've had it), 'das ist mir wirklich zu viel' (this is really too much)\n\nHow to cite: 'The emotive language [phrase] conveys [specific emotion] by…'"},
  {cat:"oral",topic:"Family",q:"Question: 'Erzähl mir von deiner Familie.' (Tell me about your family.)",a:"What to cover:\n• Who is in your family / family dynamic\n• A specific relationship: try 'Ich verstehe mich besonders gut mit… weil…' (I get along especially well with… because…)\n• How family shaped you: 'Was mich am meisten beeinflusst hat…' (What influenced me most…)\n• Comparison: 'Im Vergleich zu australischen Familien…' (Compared to Australian families…)\n\nRemember: don't just describe — add opinion and reflection."},
  {cat:"oral",topic:"Future Plans",q:"Question: 'Was möchtest du nach dem HSC machen?' (What do you want to do after the HSC?)",a:"What to cover:\n• Concrete plans: 'Ich plane, [Studium/Beruf] zu…' (I plan to…)\n• Why: 'weil mich das Thema… schon immer interessiert hat' (because this topic has always interested me)\n• German connection: 'Meine Deutschkenntnisse werden mir helfen, weil…' (My German will help me because…)\n• Hypothetical: 'Wenn ich die Chance hätte…' (If I had the chance…)\n• It's OK to be unsure: 'Ich bin noch unentschlossen, aber…' (I'm still undecided, but…)"},
  {cat:"oral",topic:"Identity",q:"Question: 'Was bedeutet es für dich, in Australien mit deutschen Wurzeln zu leben?' (What does it mean to live in Australia with German roots?)",a:"What to cover:\n• Enrichment: 'Es ist eine bereichernde Erfahrung…' (It's an enriching experience…)\n• Challenges: 'Manchmal ist es schwierig…' (Sometimes it's difficult…)\n• Concrete examples: traditions at home, language at home, visits to Germany\n• Cultural comparison: 'Was mich an der deutschen Mentalität fasziniert…' (What fascinates me about the German mentality…)\n• Identity: 'Ich identifiziere mich mit beiden, aber…' (I identify with both, but…)"},
  {cat:"oral",topic:"Technology",q:"Question: 'Welche Rolle spielen soziale Medien in deinem Leben?' (What role does social media play in your life?)",a:"What to cover:\n• How you use it: 'Ich nutze soziale Medien hauptsächlich für…' (I mainly use social media for…)\n• Positives: 'Einerseits ermöglichen sie…' (On the one hand, they enable…)\n• Negatives: 'Andererseits ist die ständige Erreichbarkeit…' (On the other hand, always being reachable…)\n• Opinion: 'Ich bin der Meinung, dass…' (I am of the opinion that…)\n• Generation comparison: 'Im Vergleich zu meinen Eltern…' (Compared to my parents…)\n\nTip: a nuanced answer scores better than pure positive OR negative."},
];

function renderQuiz(m){
  buildQuizOrder();quizCurrent=0;renderQuizCard(m);
}
function buildQuizOrder(){
  let filtered=quizFilter==='all'?QUIZ_ITEMS:QUIZ_ITEMS.filter(q=>q.cat===quizFilter);
  quizOrder=shuffleArr(filtered.map((_,i)=>i));
}
function renderQuizCard(m){
  if(!quizOrder.length){m.innerHTML=`<div class="page-head"><h1>⚡ Quiz</h1></div><div class="card">No items for this filter.</div>`;return;}
  const filtered=quizFilter==='all'?QUIZ_ITEMS:QUIZ_ITEMS.filter(q=>q.cat===quizFilter);
  const q=filtered[quizOrder[quizCurrent%quizOrder.length]];
  const catLabel={vocab:"Vocab",phrase:"Phrase",device:"Language Device",oral:"Oral Practice"}[q.cat]||q.cat;
  const catColor={vocab:"amber",phrase:"blue",device:"purple",oral:"green"}[q.cat]||"";
  m.innerHTML=`
  <div class="page-head"><div><h1>⚡ Quiz Mode</h1><p>Vocab · Phrases · Devices · Oral practice</p></div></div>
  <div style="text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <select onchange="quizFilter=this.value;renderQuiz(document.getElementById('main'))" style="font-size:13px;background:var(--surface2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 10px">
      <option value="all" ${quizFilter==='all'?'selected':''}>All categories</option>
      <option value="vocab" ${quizFilter==='vocab'?'selected':''}>Vocab</option>
      <option value="phrase" ${quizFilter==='phrase'?'selected':''}>Phrases</option>

      <option value="oral" ${quizFilter==='oral'?'selected':''}>Oral Practice</option>
    </select>
    <button class="btn ghost sm" onclick="renderQuiz(document.getElementById('main'))">🔀 Shuffle</button>
  </div>
  <div class="quiz-card">
    <div class="qnum"><span class="pill ${catColor}">${esc(catLabel)}</span> &nbsp; ${esc(q.topic)} &nbsp;·&nbsp; ${(quizCurrent%quizOrder.length)+1} / ${quizOrder.length}</div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="hint" id="qhint">${esc(q.a)}</div>
    <div class="quiz-btns">
      <button class="btn ghost" onclick="document.getElementById('qhint').classList.toggle('show');this.textContent=document.getElementById('qhint').classList.contains('show')?'Hide Answer':'Show Answer'">Show Answer</button>
      <button class="btn" onclick="quizCurrent++;renderQuizCard(document.getElementById('main'))">Next →</button>
    </div>
  </div>`;
}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ==================== COUNTDOWN ==================== */
function updateCountdown(){
  const d=document.getElementById('countdown');
  const ei=document.getElementById('examDate');
  if(!d||!ei)return;
  ei.value=state.examDate||'2026-10-14';
  const diff=Math.ceil((new Date(state.examDate)-new Date())/86400000);
  d.textContent=diff>0?diff+' days':diff===0?'Today!':'Past';
}
document.getElementById('examDate').addEventListener('change',function(){state.examDate=this.value;save();updateCountdown();});

document.getElementById('themeBtn').onclick=function(){
  const h=document.documentElement;
  const t=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',t);state.theme=t;save();
  this.textContent=t==='dark'?'☀ Theme':'🌙 Theme';

document.getElementById('ioBtn').onclick=function(){
  const menu=document.createElement('div');
  menu.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:10px;z-index:200;display:flex;gap:8px;flex-wrap:wrap';

};
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(state));
  a.download='hsc-german-backup.json';a.click();
  document.querySelectorAll('[style*="position:fixed"][style*="bottom:60px"]').forEach(e=>e.remove());
}
const imp=document.createElement('input');imp.type='file';imp.accept='.json';imp.id='importFile';imp.style.display='none';
imp.addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);state=Object.assign({},DEFAULT_STATE,d);save();render();toast('Backup restored!');}catch(err){toast('Import failed.');}};
  r.readAsText(f);
});
document.body.appendChild(imp);

  const q=this.value.toLowerCase().trim();if(!q)return;
  const pages=[
    {label:'Text Analysis Devices',id:'lang'},{label:'Grammar Reference',id:'grammar'},{label:'Oral Exam Prep',id:'oral'},

    {label:'Common Errors',id:'errors'},
  ];
  const match=pages.find(x=>x.label.toLowerCase().includes(q));
  if(match){goto(match.id);this.value='';}
});

<script>

  const TK='hsc_timer_v2';
  const COLORS={eng:'#a855f7',math:'#3b82f6',bio:'#22c55e',chem:'#f59e0b',ger:'#e8a020'};
  const NAMES={eng:'English',math:'Maths',bio:'Biology',chem:'Chemistry',ger:'German'};
  function fmt(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
  function tick(){
    let ts;try{ts=JSON.parse(localStorage.getItem(TK));}catch(e){return;}
    if(!ts)return;
    const dot=document.getElementById('ft-dot');
    const timeEl=document.getElementById('ft-time');
    const subEl=document.getElementById('ft-sub');
    if(!timeEl)return;
    const c=COLORS[ts.subject]||'#e8a020';
    dot.style.background=c;
    if(ts.running){
      dot.style.boxShadow='0 0 7px '+c;
      const sec=ts.elapsed+Math.floor((Date.now()-ts.startedAt)/1000);
      timeEl.style.color=c;
      timeEl.textContent=fmt(sec);
      subEl.textContent=(NAMES[ts.subject]||'Timer')+' running ← Dashboard';
    } else if(ts.elapsed>0){
      dot.style.boxShadow='none';
      timeEl.style.color='rgba(240,240,255,.55)';
      timeEl.textContent=fmt(ts.elapsed);
      subEl.textContent=(NAMES[ts.subject]||'Timer')+' paused ← Dashboard';
    } else {
      dot.style.boxShadow='none';
      timeEl.style.color='rgba(240,240,255,.3)';
      timeEl.textContent='00:00:00';
      subEl.textContent='← Dashboard';
    }
  }
  tick();setInterval(tick,1000);
})();
</script>
</body>
</html>
