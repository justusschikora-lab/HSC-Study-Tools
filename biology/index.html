,{id:"m8",num:8,title:"Non-infectious Disease and Disorders",year:12,sub:"Homeostasis · Negative feedback · Temperature & glucose regulation · Types of non-infectious disease · Epidemiology · Technologies for disorders",
 terms:[
  {topic:"Homeostasis",items:[["Homeostasis","Maintenance of a stable internal environment within physiological limits despite external changes"],["Negative feedback","Response that opposes and reverses the original change; restores set point"],["Positive feedback","Response that amplifies the original change (e.g. labour contractions, blood clotting)"],["Set point","The normal/optimal value for a physiological variable (e.g. 37°C core body temperature)"],["Receptor (sensor)","Detects deviation from set point and sends signal to control centre"],["Control centre","Integrates information and coordinates the response (e.g. hypothalamus)"],["Effector","Organ/tissue that carries out the corrective response"],["Endotherm","Animal that generates body heat internally via metabolism (birds, mammals)"],["Ectotherm","Animal that relies on external heat sources to regulate body temperature (reptiles, fish)"],["Vasodilation","Widening of blood vessels → increased blood flow to skin → increased heat loss"],["Vasoconstriction","Narrowing of blood vessels → reduced blood flow to skin → reduced heat loss"],["Insulin","Hormone secreted by beta cells of pancreas; lowers blood glucose by promoting uptake and glycogenesis"],["Glucagon","Hormone secreted by alpha cells of pancreas; raises blood glucose via glycogenolysis and gluconeogenesis"],["Glycogenesis","Synthesis of glycogen from glucose for storage in liver and muscle"],["Glycogenolysis","Breakdown of glycogen to glucose; raises blood glucose"],["Gluconeogenesis","Production of glucose from non-carbohydrate sources (e.g. amino acids, glycerol)"]]},
  {topic:"Non-infectious Disease",items:[["Non-infectious disease","Disease that cannot be transmitted between individuals"],["Genetic disease","Caused by mutations or chromosomal abnormalities (e.g. cystic fibrosis, Down syndrome)"],["Environmental disease","Caused by harmful environmental exposures (e.g. mesothelioma from asbestos)"],["Nutritional disease","Caused by deficiency or excess of nutrients (e.g. scurvy, rickets, type 2 diabetes)"],["Cancer","Uncontrolled cell division due to mutations in proto-oncogenes or tumour suppressor genes"],["Oncogene","Mutated proto-oncogene that promotes uncontrolled cell division"],["Tumour suppressor gene","Gene that normally limits cell division; loss of function → cancer (e.g. p53, BRCA1)"],["Carcinogen","Agent that causes cancer (e.g. UV radiation, asbestos, tobacco smoke, HPV)"]]},
  {topic:"Epidemiology",items:[["Epidemiology","Study of the distribution and determinants of disease in populations"],["Incidence","Number of NEW cases in a population over a specified time period"],["Prevalence","TOTAL number of existing cases in a population at a given time point"],["Mortality rate","Number of deaths from a disease per unit of population in a time period"],["Morbidity","Illness or disease burden; does not mean death"],["Cohort study","Follows a group over time to see who develops disease and what risk factors they had"],["Case-control study","Compares people with a disease (cases) to those without (controls) to identify risk factors"]]}
 ],
 keyDefs:[
  {term:"Negative feedback",def:"A regulatory mechanism in which a deviation from the set point triggers a response that opposes and reverses the original change, restoring the variable to its set point. The key mechanism of homeostasis."},
  {term:"Homeostasis",def:"The maintenance of a relatively constant internal environment (e.g. temperature, blood glucose, pH, water balance) within physiological limits, despite changes in the external environment."},
  {term:"Incidence vs prevalence",def:"Incidence = number of NEW cases in a population over a time period. Prevalence = TOTAL number of existing cases at a given point in time. Incidence rate = (new cases / at-risk population) × 100,000."},
  {term:"Insulin vs glucagon",def:"Insulin (beta cells): secreted when blood glucose is HIGH; promotes glucose uptake and glycogenesis → lowers blood glucose. Glucagon (alpha cells): secreted when blood glucose is LOW; promotes glycogenolysis and gluconeogenesis → raises blood glucose."}
 ],
 topics:[
  {id:"m8.1",title:"Homeostasis and Negative Feedback",tags:["Syllabus"],
   def:"<b>Homeostasis</b>: maintaining stable internal conditions despite external changes. Achieved primarily through <b>negative feedback loops</b>. Components: (1) <b>Receptor/sensor</b> — detects the change (e.g. thermoreceptors in hypothalamus detect blood temperature). (2) <b>Control centre</b> — receives signal, compares to set point, sends corrective instructions (e.g. hypothalamus). (3) <b>Effector</b> — carries out the response to reverse the change (e.g. sweat glands, skeletal muscles). The response opposes the original change → restores set point → negative feedback. Contrast: <b>positive feedback</b> amplifies the original change (e.g. oxytocin during labour — contractions stimulate more oxytocin → stronger contractions until birth; blood clotting cascade). Positive feedback drives a process to completion rather than maintaining stability.",
   eqn:"Change from set point → receptor detects → control centre signals → effectors respond → deviation corrected → feedback signal reduces response.",
   tip:"Draw the feedback loop as: stimulus → receptor → control centre → effector → response (opposes stimulus) → set point restored → feedback inhibits the response. Both temperature AND blood glucose regulation use this same loop — know both.",
   trap:"The 'receptor' in homeostasis is a SENSOR (detects the change) — not the same as a cell-surface receptor for hormones. Negative feedback is the NORM for homeostasis; positive feedback is used for specific processes that need to run to completion (birth, clotting). Don't describe negative feedback as 'negative' meaning bad — it means the response is opposite to the stimulus.",
   questions:[
    {q:"Construct a negative feedback loop to explain how the body responds to a rise in blood glucose after a meal.",a:"Stimulus: blood glucose rises above set point (~4–8 mmol/L) after meal. Receptor: glucose-sensing beta cells in islets of Langerhans (pancreas) detect the rise. Control centre: beta cells integrate the signal. Effector response: beta cells secrete insulin into the bloodstream. Insulin acts on liver, muscle and adipose cells → increased glucose uptake (via GLUT transporters), glycogenesis (glucose → glycogen stored in liver/muscle), and inhibition of glycogenolysis. Result: blood glucose falls back toward set point. Negative feedback: as blood glucose returns to normal, insulin secretion decreases — the response is dampened.",type:"HSC"}
   ]},
  {id:"m8.2",title:"Temperature Regulation — Endotherms and Ectotherms",tags:["Syllabus"],
   def:"<b>Endotherms</b> (birds, mammals): generate body heat internally through metabolic processes (especially cellular respiration in brown adipose tissue). Maintain relatively constant core temperature independent of environment. <b>Responses to cold</b>: vasoconstriction (reduces heat loss from skin); shivering (skeletal muscle rapid contraction → generates heat); piloerection (hair stands up traps insulating air layer); increased metabolic rate (brown fat thermogenesis); reduced activity. <b>Responses to heat</b>: vasodilation (increases blood flow to skin → heat radiated); sweating/panting (evaporative cooling); reduced activity. Structural: thick fur/blubber (insulation); countercurrent heat exchange in extremities (artery and vein in close proximity — warms returning blood, conserves heat). <b>Ectotherms</b> (reptiles, fish, amphibians): rely on external heat sources. Behavioural: basking (absorb solar radiation), shade-seeking (avoid overheating), burrowing (stable temperature), altering orientation. More energy-efficient (don't spend energy on thermogenesis) but less active in cold.",
   tip:"Key structural adaptation: countercurrent heat exchange in seals/penguins — arteries and veins run adjacent; warm arterial blood heats cool venous blood returning from extremities, preventing heat loss. This is a HSC-favourite structural adaptation question.",
   trap:"Ectotherm ≠ 'cold-blooded' — their blood can be warmer than a mammal's when in a hot environment. The distinction is SOURCE of heat (external vs internal). Endotherm temperature does vary slightly — it's not fixed. The terms are about STRATEGY, not absolute temperature.",
   questions:[
    {q:"Compare the strategies used by endotherms and ectotherms to maintain functional body temperatures, with reference to structural, physiological and behavioural adaptations.",a:"Endotherms: generate internal heat metabolically. Structural — thick fur/blubber for insulation; countercurrent heat exchange in limbs preserves core temperature. Physiological — shivering (muscle-generated heat); vasodilation/vasoconstriction (regulate skin blood flow and heat radiation); sweating/panting (evaporative cooling); brown fat thermogenesis. Behavioural — seeking shade, reducing activity in heat; huddling behaviour. Ectotherms: rely on external heat. Structural — dark colouring absorbs solar radiation. Behavioural — basking in sun to warm up; shade-seeking to cool down; burrowing during temperature extremes; altering body orientation relative to sun. Physiological — minimal; mainly rely on behaviour. Ectotherms are more energy-efficient but less active in cold; endotherms maintain higher activity across temperatures but require more energy.",type:"HSC"}
   ]},
  {id:"m8.3",title:"Blood Glucose Regulation",tags:["Syllabus"],
   def:"Normal blood glucose: ~4–8 mmol/L (70–140 mg/dL). Regulated by antagonistic hormones from the islets of Langerhans (pancreas). <b>High blood glucose</b> (after eating): beta cells (β) detect rise → secrete <b>insulin</b> → insulin binds receptors on liver, muscle and fat cells → (1) increased glucose uptake via GLUT4 transporters, (2) glycogenesis (glucose→glycogen stored in liver/muscle), (3) inhibition of glycogenolysis → blood glucose falls. <b>Low blood glucose</b> (fasting/exercise): alpha cells (α) detect fall → secrete <b>glucagon</b> → acts on liver → (1) glycogenolysis (glycogen → glucose released into blood), (2) gluconeogenesis (amino acids/glycerol → glucose) → blood glucose rises. <b>Diabetes mellitus</b>: Type 1 — autoimmune destruction of beta cells → no insulin → requires exogenous insulin injections. Type 2 — cells become insulin-resistant → glucose can't enter cells even with insulin; managed by diet, exercise, oral medications, and sometimes insulin.",
   eqn:"High glucose → insulin (beta cells) → uptake + glycogenesis → glucose falls.\nLow glucose → glucagon (alpha cells) → glycogenolysis + gluconeogenesis → glucose rises.",
   tip:"INSULIN lowers blood glucose (IN → brings glucose IN to cells). GLUCAGON raises blood glucose (GLUCAGOn → GLUCose AGONist — mobilises glucose). Beta cells secrete insulin; alpha cells secrete glucagon. BOTH respond to blood glucose directly — they don't need the hypothalamus.",
   trap:"Glucagon ≠ glycogen. Glucagon is the hormone. Glycogen is the storage polysaccharide. A common error: 'the liver produces glucagon' — WRONG. The alpha cells of the pancreas produce glucagon; the liver RESPONDS to glucagon by releasing glucose.",
   mnem:"ALPHA = gluCAGON (Glucagon is secreted by Alpha cells); BETA = Insulin (Beta cells, lowers blood sugar — brings it BELOW the high level).",
   questions:[
    {q:"Explain the roles of insulin and glucagon in regulating blood glucose concentration using a negative feedback model.",a:"Blood glucose rises (e.g. after a meal) → pancreatic beta cells detect the rise → secrete insulin → insulin binds receptors on liver, muscle and adipose cells, increasing glucose uptake and promoting glycogenesis (glucose stored as glycogen) → blood glucose falls toward set point. Negative feedback: falling glucose reduces insulin secretion. Blood glucose falls below set point (e.g. during fasting) → alpha cells detect the fall → secrete glucagon → glucagon acts on liver, stimulating glycogenolysis (glycogen → glucose) and gluconeogenesis → blood glucose rises toward set point. Negative feedback: rising glucose reduces glucagon secretion. The two hormones act antagonistically to maintain blood glucose between ~4–8 mmol/L.",type:"HSC"}
   ]},
  {id:"m8.4",title:"Types of Non-infectious Disease",tags:["Syllabus"],
   def:"Non-infectious diseases cannot be transmitted from person to person. Categories: <b>Genetic diseases</b>: caused by mutations or chromosomal abnormalities; may be inherited or arise de novo. E.g. cystic fibrosis (CFTR mutation, autosomal recessive — thick mucus in lungs/gut), Down syndrome (trisomy 21), haemophilia (X-linked, factor VIII gene). <b>Environmental diseases</b>: caused by harmful exposure to physical or chemical agents. E.g. mesothelioma (asbestos fibres — pleural cancer, 20–40-year latency); silicosis (silicon dust — miners); skin cancer (UV radiation); lead poisoning. <b>Nutritional diseases</b>: caused by deficiency or excess of nutrients. Deficiencies: scurvy (vitamin C — needed for collagen synthesis; bleeding gums, poor wound healing), rickets (vitamin D/calcium — soft bones), kwashiorkor (protein deficiency — oedema, muscle wasting), iron-deficiency anaemia. Excess: type 2 diabetes (excess sugar/refined carbs + obesity), cardiovascular disease (saturated fat, salt). <b>Cancer</b>: uncontrolled cell division due to accumulated somatic mutations. Proto-oncogenes mutate to oncogenes (accelerate cell cycle). Tumour suppressor genes (e.g. p53, BRCA1) mutate/are lost — cell division is no longer controlled. Triggers: carcinogens (UV, asbestos, tobacco, aflatoxin), viruses (HPV → cervical cancer), genetic predisposition. Benign tumour = localised, does not invade. Malignant = invasive, can metastasise (spread via blood/lymph).",
   tip:"HSC classify questions: always state category + cause + named example + mechanism. Cancer is technically a genetic disease (somatic mutations) but treated as its own category. Environmental and nutritional diseases often overlap (e.g. obesity involves both diet and environmental factors).",
   trap:"Non-infectious ≠ non-heritable. Cystic fibrosis is non-infectious but is heritable (germline mutation). Environmental diseases are NOT caused by pathogens — they require an environmental exposure. Cancer is caused by SOMATIC mutations — it cannot be inherited directly (but predisposition via tumour suppressor gene mutations can be inherited, e.g. BRCA1).",
   questions:[
    {q:"Classify each of the following and justify: (i) mesothelioma, (ii) scurvy, (iii) cystic fibrosis.",a:"(i) Mesothelioma: environmental disease. Caused by prolonged inhalation of asbestos fibres, which penetrate the pleural lining of the lungs, causing chronic inflammation and DNA damage over decades. It is not transmitted between individuals and requires a specific environmental exposure. (ii) Scurvy: nutritional disease. Caused by deficiency of vitamin C (ascorbic acid), which is essential for hydroxylation of proline and lysine in collagen synthesis. Without functional collagen, connective tissue breaks down — symptoms include bleeding gums, poor wound healing, fatigue, and bruising. (iii) Cystic fibrosis: genetic disease. Caused by an autosomal recessive mutation in the CFTR gene (chromosome 7), resulting in a defective chloride channel. This leads to thick, sticky mucus accumulating in the lungs and digestive tract, causing recurrent infections and impaired digestion.",type:"HSC"}
   ]},
  {id:"m8.5",title:"Epidemiology — Incidence, Prevalence and Epidemiological Studies",tags:["Syllabus"],
   def:"<b>Epidemiology</b>: study of the distribution and determinants of health and disease in populations. Key measures: <b>Incidence</b>: number of NEW cases per population per time period. Formula: (new cases / at-risk population) × 100,000 per year. <b>Prevalence</b>: TOTAL number of existing cases at a given time. Formula: (total existing cases / total population) × 100,000. <b>Mortality rate</b>: deaths from a cause / population × 100,000. <b>Morbidity</b>: illness burden (not death). <b>Types of epidemiological studies</b>: Cohort study — follows a group (cohort) over time, comparing those exposed to a risk factor to those not; observes who develops disease; can determine causation direction. Case-control study — compares people with disease (cases) to matched people without (controls); looks back for risk factor exposure; useful for rare diseases. Cross-sectional — surveys a population at one point in time; measures prevalence. Randomised controlled trial (RCT) — gold standard for treatment efficacy; participants randomly assigned to treatment or control; reduces confounding. All observational studies establish associations, not causation — confounders must be considered.",
   eqn:"Incidence rate = (new cases / at-risk population) × 100,000\nPrevalence = (existing cases / total population) × 100,000\nMortality rate = (deaths / population) × 100,000",
   tip:"Incidence = new cases (like new sales); Prevalence = total cases (like total inventory). A chronic disease (e.g. diabetes) will have HIGH prevalence but lower incidence — many people live with it, but the annual rate of new diagnoses is smaller than the total pool. Epidemiological studies identify risk factors and inform public health policy.",
   trap:"Correlation ≠ causation. Epidemiological studies show associations — they cannot alone prove causation. Confounders (e.g. smoking associated with lung cancer AND heart disease — how do you know which causes what?) must be controlled. Incidence and prevalence are frequently confused in exams — incidence is OVER TIME (new), prevalence is AT A POINT (all existing).",
   calc:"WORKED EXAMPLE — incidence and prevalence\nTown population: 80,000. In 2024: 160 new cancer diagnoses; 1,200 people living with cancer.\nIncidence rate = (160 / 80,000) × 100,000 = 200 per 100,000 per year\nPrevalence = (1,200 / 80,000) × 100,000 = 1,500 per 100,000",
   questions:[
    {q:"Distinguish between incidence and prevalence. In a city of 200,000, there are 400 new cases of type 2 diabetes diagnosed this year and 8,000 people currently living with the disease. Calculate the incidence rate and prevalence.",a:"Incidence: the number of NEW cases of a disease occurring in a defined population during a specified time period — measures the rate of new disease onset. Prevalence: the TOTAL number of existing cases of a disease in a population at a specific point in time — measures the overall disease burden. Calculations: Incidence rate = (400 / 200,000) × 100,000 = 200 per 100,000 per year. Prevalence = (8,000 / 200,000) × 100,000 = 4,000 per 100,000. The prevalence is much higher than incidence because type 2 diabetes is a chronic disease — people live with it for many years after diagnosis.",type:"HSC"}
   ]},
  {id:"m8.6",title:"Prevention of Non-infectious Disease",tags:["Syllabus"],
   def:"<b>Educational programs and campaigns</b>: raise public awareness of risk factors and behaviour change. E.g. SunSmart campaign (reduce UV exposure → prevent skin cancer); anti-smoking campaigns (reduce tobacco → prevent lung cancer, cardiovascular disease); dietary guidelines (reduce saturated fat/sugar → prevent type 2 diabetes, cardiovascular disease); breast/bowel cancer screening programs (early detection → improved outcomes). Effective for large-scale population-level prevention; low cost; do not guarantee behaviour change. <b>Genetic engineering</b>: production of drugs (recombinant insulin, growth hormone for genetic disorders); gene therapy (CRISPR-based correction of disease-causing mutations — being trialled for cystic fibrosis, sickle cell); genetic screening/counselling (identifies carriers of hereditary conditions, informs reproductive decisions). Highly targeted but expensive, ethically complex, unequal access.",
   tip:"'Evaluate' questions require weighing strengths AND weaknesses. Educational campaigns: wide reach, cost-effective, but rely on behaviour change (not guaranteed), may not reach all demographics equally, insufficient for high-risk genetic conditions. Genetic engineering: highly precise and can address root genetic causes, but expensive, limited access in low-income countries, ethical concerns (germline editing, equity).",
   trap:"Educational campaigns and genetic engineering are not mutually exclusive — the question may ask you to compare them or evaluate one specifically. Don't describe 'genetic testing' as 'genetic engineering' — testing identifies mutations; engineering modifies them.",
   questions:[
    {q:"Evaluate the effectiveness of educational campaigns as a strategy for preventing a named non-infectious disease.",a:"Disease: skin cancer (melanoma). Campaign: SunSmart (Australia — 'Slip, Slop, Slap, Seek, Slide'). Effectiveness: the incidence of melanoma in younger Australians has stabilised after decades of sustained campaigns promoting sun-protective behaviours (clothing, sunscreen, hats, shade). Strengths: cost-effective for population-level prevention; reduces risk factors across entire communities; can be delivered via multiple channels (schools, media, workplaces). Limitations: relies on voluntary behaviour change, which may not be sustained long-term; campaigns may not effectively reach high-risk groups (e.g. outdoor workers, culturally and linguistically diverse communities); individuals with hereditary predisposition (CDKN2A mutation) cannot fully compensate through behaviour change alone; effects accumulate over decades, making short-term impact difficult to measure. Conclusion: educational campaigns are a valuable and evidence-based prevention strategy for environmentally triggered non-infectious diseases, but are most effective when combined with structural changes (e.g. UV-protective building design, school policies) and genetic screening for high-risk individuals.",type:"HSC"}
   ]},
  {id:"m8.7",title:"Technologies for Disorders — Hearing, Vision and Kidney",tags:["Syllabus"],
   def:"<b>Hearing loss</b>: <b>Cochlear implant</b> — microphone captures sound → speech processor converts to digital code → transmitter sends signal across skin → internal receiver/stimulator → electrode array inserted into cochlea stimulates auditory nerve fibres directly, bypassing damaged hair cells. Effective for sensorineural hearing loss (damaged hair cells); best outcomes when implanted early (before age 3–5 for language development). <b>Bone conduction implant</b> (BAHA) — sound vibrations conducted through skull bone directly to cochlea; bypasses outer/middle ear; suits conductive hearing loss. <b>Hearing aids</b> — amplify sound; suitable for mild-moderate loss only. <b>Vision disorders</b>: <b>Spectacles/contact lenses</b> — myopia (short-sightedness) → concave/diverging lens; hyperopia (long-sightedness) → convex/converging lens; correct refractive errors by adjusting where light converges on retina. <b>Laser surgery (LASIK)</b> — laser reshapes cornea curvature permanently; effective for myopia/hyperopia/astigmatism; cannot be reversed. <b>Loss of kidney function (renal failure)</b>: <b>Haemodialysis</b> — blood removed from body, pumped through external machine with semipermeable membrane; waste products (urea, creatinine) and excess water diffuse into dialysate; cleaned blood returned. Requires 3–4 sessions/week, 3–5 hours each, usually at clinic. <b>Peritoneal dialysis</b> — dialysate fluid introduced into peritoneal cavity via catheter; peritoneal membrane acts as semipermeable filter; waste diffuses from capillaries into dialysate, which is then drained. Can be done at home, more continuous. <b>Kidney transplant</b> — only cure for renal failure; requires donor match; requires lifelong immunosuppression.",
   tip:"For each technology: know the disorder it treats, the mechanism, effectiveness AND limitations (exam loves 'evaluate' here). Cochlear implant is NOT a cure and does NOT restore normal hearing — it provides electrical stimulation of the auditory nerve. Early implantation is critical for language development.",
   trap:"Dialysis manages kidney failure but is NOT a cure — only transplant is curative. Cochlear implants work for sensorineural hearing loss (damaged hair cells or nerves) but NOT for auditory nerve damage. Spectacles correct, not cure, vision — LASIK can permanently correct refraction for most patients.",
   questions:[
    {q:"Explain the mechanism of a cochlear implant and evaluate its effectiveness for treating sensorineural hearing loss.",a:"Mechanism: (1) External microphone captures sound; (2) Speech processor converts sound to digital signals; (3) Transmitter sends signals across skin to the internal receiver/stimulator; (4) Stimulator converts signals to electrical impulses; (5) Electrode array (surgically implanted in cochlea) stimulates auditory nerve fibres at multiple points, creating the perception of sound. Bypasses non-functional cochlear hair cells entirely. Effectiveness — strengths: highly effective for profoundly deaf individuals with intact auditory nerve; children implanted before age 3–5 can develop near-normal speech and language; adults with acquired deafness also benefit significantly. Limitations: surgical risks (infection, facial nerve damage); requires extensive auditory training/speech therapy; outcome varies between individuals; does not fully restore natural hearing quality; unsuitable for auditory nerve damage; ethically contested — some in the Deaf community view it as undermining Deaf culture and identity.",type:"HSC"},

const rnd=(a,b,dp=0)=>{const v=a+Math.random()*(b-a);return dp?+v.toFixed(dp):Math.round(v);};
const DRILLS=[
 {id:"hw_from_phenotype",name:"Hardy-Weinberg — from phenotype frequency",gen:()=>{
  const q2=rnd(1,25)/100;const q=+Math.sqrt(q2).toFixed(3);const p=+(1-q).toFixed(3);
  const carrier=+(2*p*q).toFixed(3);const dom=+(p*p).toFixed(3);
  const pop=rnd(1000,50000,0);const carrN=Math.round(carrier*pop);
  return{prob:`In a population of ${pop}, the frequency of a homozygous recessive condition (aa) is ${(q2*100).toFixed(0)}% (${(q2).toFixed(4)}).\nUsing Hardy-Weinberg:\n(i) Find the frequency of the recessive allele (q)\n(ii) Find the carrier frequency (2pq)\n(iii) How many individuals in this population are expected to be carriers?`,
  sol:`(i) q² = ${q2} → q = √${q2} = ${q}\n(ii) p = 1 − q = 1 − ${q} = ${p}\n    Carrier frequency: 2pq = 2 × ${p} × ${q} = ${carrier}\n(iii) Expected carriers = ${carrier} × ${pop} = ${carrN} individuals`};}},
 {id:"monohybrid",name:"Monohybrid cross — genotype & phenotype ratios",gen:()=>{
  const pairs=[["tall (T)","short (t)","height","Tt × Tt"],["brown eyes (B)","blue eyes (b)","eye colour","Bb × Bb"],["round seed (R)","wrinkled seed (r)","seed shape","Rr × Rr"],["dark fur (D)","light fur (d)","fur colour","Dd × Dd"]];
  const p=pairs[rnd(0,pairs.length-1)];
  return{prob:`In a cross between two heterozygous organisms for ${p[2]}: ${p[3]}\nDominant phenotype = ${p[0]}; Recessive = ${p[1]}\n(i) State the possible genotypes and their expected ratio\n(ii) State the phenotype ratio\n(iii) What is the probability of producing a homozygous recessive offspring?`,
  sol:`(i) Punnett square: AA (or TT/RR etc) : Aa (Tt/Rr) : aa (tt/rr) = 1:2:1\n(ii) 3 dominant : 1 recessive\n(iii) Probability of homozygous recessive = 1/4 = 25%`};}},
 {id:"xlinked",name:"X-linked recessive cross",gen:()=>{
  const traits=[{name:"haemophilia",allele:"H",carrier:"X^H X^h",male:"X^H Y",trait:"haemophilia"},
   {name:"colour blindness",allele:"C",carrier:"X^C X^c",male:"X^C Y",trait:"colour blindness"}];
  const t=traits[rnd(0,1)];
  return{prob:`A carrier female (${t.carrier}) for X-linked ${t.name} has children with an unaffected male (${t.male}).\n(i) Draw a Punnett square and determine all possible offspring genotypes.\n(ii) What fraction of sons will be affected?\n(iii) What fraction of daughters will be carriers?`,
  sol:`Cross: ${t.carrier} × ${t.male}\nFemale gametes: X^${t.allele} and X^h (or X^c)\nMale gametes: X^${t.allele} and Y\nOffspring:\n  X^${t.allele}X^${t.allele} = normal female (25%)\n  X^${t.allele}X^h = carrier female (25%)\n  X^${t.allele}Y = normal male (25%)\n  X^hY = affected male (25%)\n(ii) 1/2 of sons (50%) will be affected\n(iii) 1/2 of daughters (50%) will be carriers`};}},
 {id:"incidence",name:"Epidemiology — incidence & prevalence calculation",gen:()=>{
  const pop=rnd(50,500)*1000;const newCases=rnd(50,2000);const total=rnd(newCases*3,newCases*20);

  return{prob:`In a city of ${pop.toLocaleString()} people:\n• ${newCases.toLocaleString()} new cases of a disease were diagnosed this year\n• ${total.toLocaleString()} people currently live with the disease\n(i) Calculate the incidence rate per 100,000 per year\n(ii) Calculate the prevalence per 100,000\n(iii) Explain why prevalence is higher than incidence for this disease.`,
  sol:`(i) Incidence rate = (${newCases} / ${pop}) × 100,000 = ${inc} per 100,000/year\n(ii) Prevalence = (${total} / ${pop}) × 100,000 = ${prev} per 100,000\n(iii) Prevalence > incidence because this is a chronic condition. People diagnosed in previous years continue to live with the disease, accumulating in the prevalence count, while incidence only counts new cases diagnosed this year.`};}},

function allTopics(mod){return mod.topics.concat(addedDotsFor(mod.id));}
function topicById(tid){for(const m of MODULES){const t=allTopics(m).find(x=>x.id===tid);if(t)return{topic:t,mod:m};}return null;}
function field(tid,name,base){const k=tid+":"+name;return(k in state.edits)?state.edits[k]:(base||"");}
function qCount(tid,baseLen){return baseLen+(state.addedQ[tid]||0);}
function allDots(){const out=[];MODULES.forEach(m=>allTopics(m).forEach(t=>out.push({t,m})));return out;}
function totalDots(){return allDots().length;}
function checkedCount(){return allDots().filter(({t})=>state.check[t.id]).length;}
function modProgress(m){const ts=allTopics(m);if(!ts.length)return 0;return Math.round(ts.filter(t=>state.check[t.id]).length/ts.length*100);}
function confOf(tid){return state.conf[tid]||"";}
function quizAccuracyOf(tid){const s=state.quizStats[tid];if(!s||(s.r+s.w)===0)return null;return s.r/(s.r+s.w);}
function isAutoWeak(tid){const a=quizAccuracyOf(tid);return a!=null&&a<0.5;}
function effConf(tid){const c=confOf(tid);if(c)return c;if(isAutoWeak(tid))return'weak';const a=quizAccuracyOf(tid);if(a!=null&&a<0.75)return'shaky';return'';}
function readiness(){const dots=allDots();if(!dots.length)return 0;
  let comp=0,conf=0;dots.forEach(({t})=>{if(state.check[t.id])comp++;const c=effConf(t.id);conf+=(c==='good'||(!c&&state.check[t.id]))?1:c==='shaky'?0.5:c==='weak'?0:0;});
  comp/=dots.length;conf/=dots.length;
  const ql=state.quizLog;const acc=ql.length?ql.reduce((s,q)=>s+q.score/q.total,0)/ql.length:0;
  const qw=ql.length?0.25:0;return Math.round((comp*(0.40+(ql.length?0:0.25))+conf*0.35+acc*qw)*100);}
function snapshotHistory(){const d=TODAY();const comp=totalDots()?Math.round(checkedCount()/totalDots()*100):0;
  const ql=state.quizLog;const acc=ql.length?Math.round(ql.reduce((s,q)=>s+q.score/q.total,0)/ql.length*100):0;
  const rec={date:d,completion:comp,quiz:acc,readiness:readiness()};
  const last=state.history[state.history.length-1];
  if(last&&last.date===d)state.history[state.history.length-1]=rec;else state.history.push(rec);save();}
function srsCards(){const cards=[];allDots().forEach(({t,m})=>{
  if(m.year===11)return;
  const title=stripTags(field(t.id,'title',t.title));
  const defv=stripTags(field(t.id,'def',t.def));
  if(defv)cards.push({id:t.id+'#def',tid:t.id,mod:m.num,front:title,back:defv,kind:'Concept'});
  const base=t.questions||[];const n=qCount(t.id,base.length);
  for(let i=0;i<n;i++){const q=stripTags(field(t.id,'q'+i,base[i]?base[i].q:''));const a=stripTags(field(t.id,'a'+i,base[i]?base[i].a:''));if(q&&a)cards.push({id:t.id+'#q'+i,tid:t.id,mod:m.num,front:q,back:a,kind:'Question'});}
});return cards;}
function srsDue(card){const r=state.srs[card.id];if(!r)return true;return r.due<=TODAY();}
function srsRate(cardId,grade){const r=state.srs[cardId]||{interval:0,reps:0};let iv;
  if(grade==='again')iv=0;else if(grade==='hard')iv=Math.max(1,Math.round((r.interval||1)*1.2));
  else if(grade==='good')iv=r.interval?Math.round(r.interval*2.3):1;else iv=r.interval?Math.round(r.interval*3.5):3;
  state.srs[cardId]={interval:iv,reps:(r.reps||0)+1,due:addDays(TODAY(),iv),last:TODAY()};save();}
function dueCount(){return srsCards().filter(srsDue).length;}
function examDays(){if(!state.examDate)return null;return Math.ceil((new Date(state.examDate)-new Date())/(1000*60*60*24));}
function refreshCountdown(){const d=examDays();const el=document.getElementById('countdown');if(el)el.textContent=(d==null)?'— days':(d<0?'Exam passed':d+' days');const ei=document.getElementById('examDate');if(ei)ei.value=state.examDate||'';}

/* --- pretty-format box content --- */
function prettyBox(raw,cls){
  if(!raw)return'';
  const ROW=(label,content)=>`<div class="prow"><span class="plbl">${label}</span><span class="pval">${content}</span></div>`;
  const BULLET=t=>`<div class="pbul"><span class="pbul-dot">▸</span><span>${t}</span></div>`;
  // CALC: each \n line is a numbered step
  if(cls==='calc'){
    const lines=raw.split('\n').filter(l=>l.trim());
    if(lines.length<2)return`<div class="pval" style="white-space:pre-wrap">${esc(raw)}</div>`;
    return`<div class="psteps">`+lines.map((l,i)=>`<div class="pstep"><span class="pstep-n">${i+1}</span><span>${esc(l)}</span></div>`).join('')+`</div>`;}
  // EQN: each \n line as a bullet row
  if(cls==='eqn'){
    const lines=raw.split('\n').filter(l=>l.trim());
    if(lines.length<2)return`<div class="pval">${raw}</div>`;
    return lines.map(l=>{
      const m=l.match(/^([^:]+):\s+(.+)/);
      return m?ROW(m[1],m[2]):BULLET(l);}).join('');}
  // DEF / TIP / TRAP / MNEM
  // Step 1: split on \n first if present
  let segments=raw.includes('\n')?raw.split('\n').filter(l=>l.trim()):[raw];
  // Step 2: within each segment, split at '. <b>' boundaries
  segments=segments.flatMap(seg=>seg.split(/\.\s+(?=<b>)/).filter(s=>s.trim()));
  // Step 3: render each segment
  return segments.map(seg=>{
    // <b>Label</b>: content  OR  <b>Label</b> — content
    // match <b>Label</b> followed by any separator (colon, em-dash, en-dash, space)
    const lm=seg.match(/^<b>([^<]{1,50})<\/b>\s*[:—–\-]?\s*([\s\S]+)/);
    if(lm)return ROW(lm[1],lm[2]);
    // no label — strip stray leading period, render as bullet
    const clean=seg.replace(/^\.\s*/,'').trim();
    if(!clean)return'';
    return BULLET(clean);
  }).join('');}

function box(tid,cls,label,name,base,editable){
  const txt=field(tid,name,base);if(!txt&&!editable)return'';
  let body;
  if(editable){

      ?`<div class="body" contenteditable data-ek="${tid}:${name}">${esc(txt)}</div>`
      :`<div contenteditable data-ek="${tid}:${name}">${txt||'<span class="muted">(empty)</span>'}</div>`;
  } else {
    body=`<div>${prettyBox(txt,cls)}</div>`;}
  return`<div class="box ${cls}${editable?' editing':''}"><span class="bx-l">${label}</span>${body}</div>`;}

/* ========================= QUIZ ========================= */
let quiz=null;
function gatherQuestions(modIds){const out=[];MODULES.filter(m=>modIds.includes(m.id)&&m.year===12).forEach(m=>{allTopics(m).forEach(t=>{const base=t.questions||[];const n=qCount(t.id,base.length);for(let i=0;i<n;i++){const bq=base[i];const q=field(t.id,'q'+i,bq?bq.q:'');const a=field(t.id,'a'+i,bq?bq.a:'');if(q&&a)out.push({q,a,type:bq?bq.type:'Custom',mod:m.num,tid:t.id});}});});return out;}
function inferMarks(type){if(type==='HSC')return[4,5,6][Math.floor(Math.random()*3)];if(type==='Syllabus')return[2,3,4][Math.floor(Math.random()*3)];return[1,2][Math.floor(Math.random()*2)];}
// strip Oxford commas from displayed text
function noOx(t){return t.replace(/,\s+(and|or)(\s)/gi,' $1$2');}
// strip parenthetical examples and "e.g. / such as / including" clauses
function stripEg(t){return t.replace(/\s*\([^)]{1,80}\)/g,'').replace(/[\s,]+(e\.g\.|for example|such as|including|like)[^;.,]*/gi,'').trim().replace(/[,;]\s*$/,'');}
// short displayable criterion: strip examples, cap at 22 words
function shortCrit(t){let s=stripEg(t);const w=s.split(' ');if(w.length>22)s=w.slice(0,22).join(' ')+'…';return noOx(s);}
// simplified sample answer: first 3 sentences, no Oxford commas
function sampleAns(t){const sents=t.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>5);const out=sents.slice(0,3).join('. ');return noOx(out.endsWith('.')?out:out+'.');}
function parseCriteria(ans,marks){
  const numbered=ans.split(/\s*\(\d+\)\s+/).filter(s=>s.trim().length>8);
  if(numbered.length>=marks)return numbered.slice(0,marks).map(t=>t.replace(/\.$/,'').trim());
  const semis=ans.split(/;\s+/).filter(s=>s.trim().length>8);
  if(semis.length>=marks)return semis.slice(0,marks).map(t=>t.replace(/\.$/,'').trim());
  const sents=ans.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>8);
  if(sents.length>=marks)return sents.slice(0,marks).map(t=>t.trim());
  const words=ans.split(' ');const chunk=Math.ceil(words.length/marks);
  return Array.from({length:marks},(_,i)=>words.slice(i*chunk,(i+1)*chunk).join(' ')).filter(Boolean);}
function enrichQuiz(items){
  return items.map((q,_,all)=>{
    const marks=inferMarks(q.type);const criteria=parseCriteria(q.a,marks);
    if(marks<=2&&Math.random()<0.28){
      // prefer same-module distractors so options are topically plausible
      const samemod=all.filter(x=>x!==q&&x.mod===q.mod);
      const pool=samemod.length>=6?samemod:all.filter(x=>x!==q);
      const correct=q.a.split(/[.;]/)[0].trim();

        .filter(s=>s.length>20&&s.length<110&&s!==correct)
        .sort(()=>Math.random()-0.5).slice(0,3);
      if(dist.length>=3){const opts=[correct,...dist].sort(()=>Math.random()-0.5);return{...q,marks,criteria,format:'mcq',mcqOpts:opts,mcqCorrect:correct};}
    }
    return{...q,marks,criteria,format:'written'};});}

/* ========================= SEARCH ========================= */
function searchIndex(){const idx=[];allDots().forEach(({t,m})=>{
  const blob=[t.title,t.def,t.tip,t.trap].map(x=>field(t.id,'',x)||'').join(' ');
  idx.push({type:'Mod '+m.num,title:stripTags(field(t.id,'title',t.title)),tid:t.id,blob:stripTags(blob).toLowerCase()});});
  GLOSSARY.forEach(([term,def])=>idx.push({type:'Term',title:term,gloss:true,blob:(term+' '+def).toLowerCase()}));return idx;}
let SEARCH_IDX=null;
function doSearch(q){const box=document.getElementById('searchRes');q=q.trim().toLowerCase();if(!q){box.classList.add('hidden');return;}
  if(!SEARCH_IDX)SEARCH_IDX=searchIndex();
  const res=SEARCH_IDX.filter(r=>r.blob.includes(q)).slice(0,12);
  box.innerHTML=res.length?res.map(r=>`<div class="r" data-sres="${r.gloss?'g:':''}${esc(r.tid||r.title)}"><span class="tag ${r.type==='Term'?'':'syl'}" style="margin-right:7px">${esc(r.type)}</span>${esc(r.title)}</div>`).join(''):'<div class="r muted">No results</div>';
  box.classList.remove('hidden');}

function openDot(tid){const found=topicById(tid);if(!found)return;go(found.mod.id);setTimeout(()=>{const el=document.getElementById('dot-'+tid);if(el){el.classList.add('open','flash');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('flash'),1600);}},80);}

function openIO(){const json=JSON.stringify(state,null,2);
  const wrap=document.createElement('div');wrap.className='modal';wrap.innerHTML=`<div class="box2"><h3 style="margin-top:0">Backup / Restore</h3><textarea id="ioText">${esc(json)}</textarea>
    <div class="row" style="margin-top:12px"><button class="btn sm" id="ioCopy">Copy</button><button class="btn sm ghost" id="ioImport">Import</button><button class="btn sm ghost" id="ioClose" style="margin-left:auto">Close</button></div></div>`;
  document.body.appendChild(wrap);wrap.addEventListener('click',e=>{if(e.target===wrap)wrap.remove();});
  document.getElementById('ioClose').onclick=()=>wrap.remove();
  document.getElementById('ioCopy').onclick=()=>{document.getElementById('ioText').select();document.execCommand('copy');toast('Copied!');};
  document.getElementById('ioImport').onclick=()=>{try{const s=JSON.parse(document.getElementById('ioText').value);state=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),s);localStorage.setItem(LS_KEY,JSON.stringify(state));SEARCH_IDX=null;wrap.remove();applyTheme();refreshCountdown();buildNav();render();toast('Imported');}catch(e){toast('Invalid JSON');}};}

function applyTheme(){document.documentElement.setAttribute('data-theme',state.theme);document.getElementById('themeBtn').textContent=state.theme==='dark'?'☀ Theme':'🌙 Theme';}

/* ========================= EVENTS ========================= */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-nav],[data-jump],[data-dot-head],[data-conf],[data-reveal],[data-toggle-edit],[data-add-dot],[data-add-q],[data-quizmod],[data-quizstart],[data-quizdone],[data-quizmcq],[data-quizmark],[data-quizagain],[data-revmod],[data-revstat],[data-drillnew],[data-drillreveal],[data-prac],[data-sres],[data-fcflip],[data-fcrate],[data-fcscope],[data-fcmod],[data-qb],[data-qbreveal],[data-qbmod],[data-ettab],[data-etreveal],[data-etnewdrill],[data-ts-toggle]');
  if(!el)return;
  if(el.dataset.nav)go(el.dataset.nav);
  else if(el.dataset.jump)openDot(el.dataset.jump);
  else if(el.dataset.tsToggle!=null){const id=el.dataset.tsToggle;const b=document.getElementById('ts-body-'+id);const h=document.getElementById('ts-'+id);if(b){const hidden=b.style.display==='none';b.style.display=hidden?'':'none';h.classList.toggle('open',hidden);}}
  else if(el.hasAttribute('data-dot-head')){if(e.target.matches('[data-check],[contenteditable]'))return;el.closest('.dot').classList.toggle('open');}
  else if(el.dataset.conf){const[tid,v]=el.dataset.conf.split('|');state.conf[tid]=(state.conf[tid]===v)?'':v;save();streakToday();render();buildNav();}
  else if(el.hasAttribute('data-reveal')){el.closest('.q').classList.add('show');el.style.display='none';}
  else if(el.hasAttribute('data-toggle-edit')){state.editMode=!state.editMode;save();SEARCH_IDX=null;render();}
  else if(el.dataset.addDot){const mid=el.dataset.addDot;state.addedDots[mid]=state.addedDots[mid]||[];state.addedDots[mid].push({id:mid+'.c'+Date.now(),title:'New dot point',tags:['Custom'],questions:[]});save();SEARCH_IDX=null;render();}
  else if(el.dataset.addQ){const tid=el.dataset.addQ;state.addedQ[tid]=(state.addedQ[tid]||0)+1;save();render();setTimeout(()=>openDot(tid),20);}
  else if(el.dataset.quizmod){const id=el.dataset.quizmod;const i=quiz.sel.indexOf(id);if(i>=0){if(quiz.sel.length>1)quiz.sel.splice(i,1);}else quiz.sel.push(id);render();}
  else if(el.hasAttribute('data-quizstart'))startQuiz();
  else if(el.hasAttribute('data-quizdone')){quiz.userAnswer=(document.getElementById('quizAnswer')||{}).value||'';quiz.submitted=true;render();}
  else if(el.dataset.quizmcq!=null){const idx=+el.dataset.quizmcq;const q=quiz.items[quiz.i];quiz.mcqSelected=q.mcqOpts[idx];quiz.mcqResult=quiz.mcqSelected===q.mcqCorrect;quiz.submitted=true;render();}
  else if(el.dataset.quizmark!=null){const earned=+el.dataset.quizmark;const it=quiz.items[quiz.i];if(it&&it.tid){const s=state.quizStats[it.tid]||{r:0,w:0};earned>=it.marks?s.r++:earned>0?s.r+=0.5:s.w++;state.quizStats[it.tid]=s;}quiz.score+=earned;quiz.answered++;quiz.i++;quiz.submitted=false;quiz.userAnswer='';quiz.mcqSelected=null;quiz.mcqResult=null;if(quiz.i>=quiz.items.length)finishQuiz();save();buildNav();render();}
  else if(el.hasAttribute('data-quizagain')){quiz=null;render();}
  else if(el.dataset.revmod){revFilter.mod=el.dataset.revmod;render();}
  else if(el.dataset.revstat){revFilter.status=el.dataset.revstat;render();}
  else if(el.hasAttribute('data-drillnew')){drill.current=DRILLS.find(d=>d.id===drill.type).gen();drill.revealed=false;render();}
  else if(el.hasAttribute('data-drillreveal')){drill.revealed=!drill.revealed;render();}
  else if(el.dataset.prac!=null){pracOpen[el.dataset.prac]=!pracOpen[el.dataset.prac];render();}
  else if(el.dataset.sres){const v=el.dataset.sres;document.getElementById('searchRes').classList.add('hidden');document.getElementById('globalSearch').value='';if(v.startsWith('g:')){glossFilter=v.slice(2).toLowerCase();go('glossary');}else openDot(v);}
  else if(el.hasAttribute('data-fcflip')){if(!fc.flipped){fc.flipped=true;render();}}
  else if(el.dataset.fcrate){const c=fc.deck[Math.min(fc.i,fc.deck.length-1)];srsRate(c.id,el.dataset.fcrate);streakToday();if(el.dataset.fcrate==='again')fc.deck.push(c);fc.i++;fc.flipped=false;if(fc.i>=fc.deck.length){fc.deck=buildDeck();fc.i=0;}buildNav();render();}
  else if(el.dataset.fcscope){fc.scope=el.dataset.fcscope;fc.deck=buildDeck();fc.i=0;fc.flipped=false;render();}
  else if(el.dataset.fcmod){fc.mod=el.dataset.fcmod;fc.deck=buildDeck();fc.i=0;fc.flipped=false;render();}
  else if(el.dataset.qb!=null){const b=document.querySelector('[data-qbbody="'+el.dataset.qb+'"]');if(b){b.classList.toggle('hidden');el.classList.toggle('open');}}
  else if(el.dataset.qbreveal!=null){const a=document.querySelector('[data-qbans="'+el.dataset.qbreveal+'"]');if(a){a.classList.remove('hidden');el.style.display='none';}}
  else if(el.dataset.qbmod){qbFilter=el.dataset.qbmod==='all'?'all':+el.dataset.qbmod;render();}
  else if(el.dataset.ettab){etTab=el.dataset.ettab;render();}
  else if(el.hasAttribute('data-etreveal')){const a=document.querySelector('[data-eterrans]');if(a){a.classList.remove('hidden');el.style.display='none';}}
  else if(el.hasAttribute('data-etnewdrill')){const yp=PRACTICALS.filter(p=>p.mod>=5);let n;do{n=yp[Math.floor(Math.random()*yp.length)];}while(n===etDrill&&yp.length>1);etDrill=n;render();}
});
document.addEventListener('click',e=>{if(!e.target.closest('.search')){const sr=document.getElementById('searchRes');if(sr)sr.classList.add('hidden');}});
function startQuiz(){let all=gatherQuestions(quiz.sel);for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  all=enrichQuiz(all.slice(0,Math.min(quiz.len,all.length)));
  quiz.items=all;quiz.i=0;quiz.score=0;quiz.answered=0;quiz.submitted=false;quiz.userAnswer='';quiz.mcqSelected=null;quiz.mcqResult=null;quiz.active=true;quiz.done=false;streakToday();render();}
function finishQuiz(){const totalMarks=quiz.items.reduce((s,x)=>s+x.marks,0);quiz.active=false;quiz.done=true;state.quizLog.push({date:TODAY(),score:quiz.score,total:totalMarks,mods:quiz.sel.map(m=>moduleById(m).num).join(',')});save();}
document.addEventListener('input',e=>{const t=e.target;
  if(t.dataset.note!=null){state.notes[t.dataset.note]=t.value;save();}
  else if(t.id==='quizLen'){quiz.len=+t.value;}
  else if(t.id==='drillType'){drill.type=t.value;drill.current=DRILLS.find(d=>d.id===drill.type).gen();drill.revealed=false;render();}
  else if(t.id==='glossSearch'){glossFilter=t.value.toLowerCase();filterGloss();}
  else if(t.id==='examDate'){state.examDate=t.value;save();refreshCountdown();render();}
  else if(t.id==='globalSearch'){doSearch(t.value);}});
document.addEventListener('change',e=>{const t=e.target;if(t.dataset.check!=null){state.check[t.dataset.check]=t.checked;save();streakToday();buildNav();}});
document.addEventListener('focusout',e=>{const el=e.target;if(el.dataset&&el.dataset.ek){let val=el.innerText.trim();if(['(empty)','(question)','(answer)'].includes(val))val='';state.edits[el.dataset.ek]=val;save();SEARCH_IDX=null;buildNav();}});
document.getElementById('themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';save();applyTheme();};
document.getElementById('ioBtn').onclick=openIO;

/* ========================= INIT ========================= */
// always pin bio exam date regardless of localStorage
if(!state.examDate||state.examDate==='2026-10-30'){state.examDate='2026-10-21';save();}
applyTheme();refreshCountdown();buildNav();render();streakToday();snapshotHistory();
</script>
