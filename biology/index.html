<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HSC Biology Y12 — Study Tool</title>
<style>
:root{
  --bg:#080f0a;--surface:#101a12;--surface2:#142018;--accent:#22c55e;--accent2:#16a34a;
  --text:#e6f0e8;--muted:#7a9e80;--line:#1a2e1e;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --blueb:#0e2336;--greenb:#0e2a14;--amberb:#2c2210;--redb:#2c1414;--purpleb:#221331;
}
html[data-theme="light"]{
  --bg:#eef5ef;--surface:#ffffff;--surface2:#edf5ee;--accent:#16a34a;--accent2:#15803d;
  --text:#0e2010;--muted:#4a7a52;--line:#cde3cf;
  --blueb:#e6f0fb;--greenb:#e7f7ec;--amberb:#fdf3e1;--redb:#fbe9e9;--purpleb:#f4e9fc;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.55}
h1,h2,h3,h4,.brand{font-family:"Bricolage Grotesque","IBM Plex Sans",system-ui,sans-serif;font-weight:700;letter-spacing:-.01em}
a{color:var(--accent)}
.app{display:flex;min-height:100vh}
.sidebar{width:252px;background:var(--surface);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto;flex-shrink:0}
.brand{font-size:18px;display:flex;align-items:center;gap:8px}
.brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#042;font-weight:800;font-size:13px}
.brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:0}
.search{display:flex;flex-direction:column;gap:4px;position:relative}
.search input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px}
.search input:focus{outline:none;border-color:var(--accent)}
.searchres{position:absolute;top:42px;left:0;right:0;background:var(--surface2);border:1px solid var(--line);border-radius:9px;max-height:320px;overflow-y:auto;z-index:30;box-shadow:0 12px 30px rgba(0,0,0,.45)}
.searchres .r{padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
.searchres .r:hover{background:var(--surface)}.searchres .r:last-child{border-bottom:none}
.navlist{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.navbtn{display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--muted);text-align:left;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;width:100%;transition:.12s}
.navbtn .ic{width:18px;text-align:center;font-size:12px}
.navbtn:hover{background:var(--surface2);color:var(--text)}
.navbtn.active{background:linear-gradient(90deg,rgba(34,197,94,.15),transparent);color:var(--accent);font-weight:600}
.navbtn .badge{margin-left:auto;font-size:10px;background:var(--surface2);color:var(--muted);padding:1px 7px;border-radius:20px}
.nav-sep{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 11px 2px;opacity:.6}
.exampill{margin-top:auto;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px}
.exampill label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.exampill .cd{font-size:22px;font-weight:700;color:var(--accent);font-family:"Bricolage Grotesque",sans-serif}
.exampill input{width:100%;margin-top:7px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:5px 7px;font-size:12px}
.sb-foot{display:flex;gap:6px;flex-wrap:wrap}
.sb-foot button{flex:1;font-size:11px;padding:6px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer;min-width:60px}
.sb-foot button:hover{color:var(--text);border-color:var(--accent)}
.main{flex:1;min-width:0;padding:26px 32px 90px;max-width:1120px}
.page-head{margin-bottom:18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.page-head h1{font-size:27px;margin:0 0 4px}.page-head p{color:var(--muted);margin:0;font-size:14px}
.page-head .spacer{flex:1}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
.bar{height:9px;background:var(--surface2);border-radius:20px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px;transition:width .4s}
.stat{display:flex;flex-direction:column;gap:6px}
.stat .big{font-size:30px;font-weight:700;font-family:"Bricolage Grotesque",sans-serif}
.stat .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.ring{--p:0;width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--p)*3.6deg),var(--surface2) 0);display:grid;place-items:center;margin:0 auto}
.ring .inner{width:108px;height:108px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.ring .inner b{font-size:28px;font-family:"Bricolage Grotesque",sans-serif;line-height:1}
.ring .inner small{color:var(--muted);font-size:11px}
.mod-h{display:flex;align-items:center;gap:12px;cursor:pointer;padding:15px 18px;background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px}
.mod-h:hover{border-color:var(--accent)}
.mod-h .num{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:grid;place-items:center;font-weight:700;color:var(--accent);font-family:"Bricolage Grotesque",sans-serif}
.mod-h h2{font-size:17px;margin:0}.mod-h .sub{color:var(--muted);font-size:12.5px}
.mod-h .chev{color:var(--muted);transition:.2s;font-size:13px}
.mod-h.open .chev{transform:rotate(90deg)}
.dot{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin:0 0 11px;overflow:hidden}
.dot.flash{border-color:var(--accent);box-shadow:0 0 0 2px rgba(34,197,94,.3)}
.dot-h{display:flex;align-items:flex-start;gap:11px;padding:14px 16px;cursor:pointer}
.dot-h:hover{background:var(--surface2)}
.dot-h .chk{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.dot-h .ttl{flex:1;font-weight:600;font-size:15px}
.dot-h .conf-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--line)}
.conf-good{background:var(--green)!important}.conf-shaky{background:var(--amber)!important}.conf-weak{background:var(--red)!important}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:10px;padding:1.5px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--line)}
.tag.hsc{color:#fda4af;border-color:#5b2330}.tag.syl{color:#7dd3fc;border-color:#1e4a63}.tag.custom{color:#d8b4fe;border-color:#3d2350}.tag.y11{color:#86efac;border-color:#1a4a2a}
.dot-body{padding:0 16px 16px;display:none}.dot.open .dot-body{display:block}
.box{border-radius:10px;padding:11px 13px;margin:9px 0;font-size:14px;border-left:3px solid}
.box .bx-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;margin-bottom:4px;opacity:.9}
.box.def{background:var(--blueb);border-color:var(--blue)}.box.def .bx-l{color:#93c5fd}
.box.eqn{background:var(--greenb);border-color:var(--green);font-family:"IBM Plex Mono",ui-monospace,monospace}.box.eqn .bx-l{color:#86efac;font-family:inherit}
.box.tip{background:var(--amberb);border-color:var(--amber)}.box.tip .bx-l{color:#fcd34d}
.box.trap{background:var(--redb);border-color:var(--red)}.box.trap .bx-l{color:#fca5a5}
.box.mnem{background:var(--purpleb);border-color:var(--purple)}.box.mnem .bx-l{color:#d8b4fe}
.box.calc{background:var(--surface2);border-color:var(--accent)}.box.calc .bx-l{color:var(--accent)}
.box.calc .body{white-space:pre-wrap;font-family:"IBM Plex Mono",monospace;font-size:13px}
.box[contenteditable]{outline:none}
.box.editing{box-shadow:inset 0 0 0 1px var(--accent)}
/* pretty-box rows */
.prow{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(128,128,128,.12);align-items:flex-start}
.prow:last-child{border-bottom:none}
.plbl{font-weight:700;font-size:12px;min-width:90px;max-width:140px;flex-shrink:0;opacity:.8;padding-top:2px;line-height:1.4;text-transform:none}
.pval{flex:1;font-size:13.5px;line-height:1.55}
.pbul{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid rgba(128,128,128,.08);font-size:13.5px;line-height:1.55;align-items:flex-start}
.pbul:last-child{border-bottom:none}
.pbul-dot{color:var(--accent);font-size:10px;flex-shrink:0;padding-top:4px;opacity:.7}
.psteps{display:flex;flex-direction:column;gap:3px}
.pstep{display:flex;gap:10px;padding:4px 0;border-bottom:1px solid rgba(128,128,128,.08);align-items:flex-start;font-family:"IBM Plex Mono",monospace;font-size:13px}
.pstep:last-child{border-bottom:none}
.pstep-n{color:var(--accent);font-weight:700;min-width:18px;flex-shrink:0;font-size:11px;padding-top:2px}
/* term table */
.term-section{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px}
.term-section h3{margin:0 0 10px;font-size:16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.term-section h3 .chev{color:var(--muted);font-size:12px;transition:.2s;margin-left:auto}
.term-section h3.open .chev{transform:rotate(90deg)}
.term-topic{margin-bottom:10px}
.term-topic-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);font-weight:700;margin-bottom:6px}
.term-table{width:100%;border-collapse:collapse;font-size:13px}
.term-table td{padding:5px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.term-table td:first-child{font-weight:600;color:var(--text);width:30%;white-space:nowrap}
.term-table td:last-child{color:var(--muted)}
.term-table tr:last-child td{border-bottom:none}
.must-mem{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:12px 14px;margin:10px 0}
.must-mem h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)}
.must-mem-item{margin-bottom:8px;font-size:13.5px}
.must-mem-item b{color:var(--accent)}
.must-mem-item:last-child{margin-bottom:0}
/* q */
.q{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:9px 0;background:var(--surface2)}
.q .qq{font-size:14px;margin-bottom:7px;font-weight:500}
.q .ans{display:none;border-top:1px dashed var(--line);margin-top:9px;padding-top:9px;font-size:13.5px;color:#bfe;white-space:pre-wrap}
.q.show .ans{display:block}
.q .reveal{font-size:12px;background:var(--surface);border:1px solid var(--line);color:var(--accent);padding:4px 11px;border-radius:7px;cursor:pointer}
.confrow{display:flex;gap:7px;align-items:center;margin:12px 0 5px;flex-wrap:wrap}
.confrow span{font-size:12px;color:var(--muted);margin-right:3px}
.cbtn{font-size:12.5px;padding:5px 13px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);cursor:pointer}
.cbtn.good.on{background:rgba(34,197,94,.18);color:#86efac;border-color:var(--green)}
.cbtn.shaky.on{background:rgba(245,158,11,.18);color:#fcd34d;border-color:var(--amber)}
.cbtn.weak.on{background:rgba(239,68,68,.18);color:#fca5a5;border-color:var(--red)}
textarea.notes{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;resize:vertical;min-height:58px;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#042;border:none;border-radius:9px;padding:9px 15px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
.btn:hover{background:var(--accent2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:6px 11px;font-size:12.5px}.btn.on{background:var(--accent);color:#042}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
select,input[type=number],input[type=text]{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:13px}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:13px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);cursor:pointer}
.chip.on{background:rgba(34,197,94,.14);color:var(--accent);border-color:var(--accent)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.muted{color:var(--muted)}.accent{color:var(--accent)}.small{font-size:12.5px}
.divider{height:1px;background:var(--line);margin:14px 0}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px}.kv:last-child{border:none}
.tablebox{width:100%;border-collapse:collapse;font-size:13px}
.tablebox th,.tablebox td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
.tablebox th{background:var(--surface2);color:var(--accent)}
.collapse-h{cursor:pointer;display:flex;align-items:center;gap:10px}
.collapse-h .chev{margin-left:auto;color:var(--muted);transition:.2s}.collapse-h.open .chev{transform:rotate(90deg)}
.hidden{display:none!important}
svg.diagram{width:100%;max-width:540px;height:auto;display:block;margin:10px 0;background:var(--bg);border:1px solid var(--line);border-radius:12px}
.diagram text{fill:var(--text);font-family:"IBM Plex Sans",sans-serif;font-size:13px}
.diagram .ax{stroke:var(--muted);stroke-width:1.5;fill:none}
.diagram .gl{stroke:var(--line);stroke-width:1}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:11px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;z-index:90;padding:20px}
.modal .box2{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:560px;width:100%;max-height:85vh;overflow:auto}
.modal textarea{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px;font-family:"IBM Plex Mono",monospace;font-size:12px}
@media(max-width:820px){.app{flex-direction:column}.sidebar{position:relative;width:100%;height:auto}.main{padding:18px 16px 60px}.ring{width:120px;height:120px}}
</style>
</head>

<div class="app">
  <aside class="sidebar">
    <div class="brand"><a href="/" style="text-decoration:none"><span class="logo" style="width:38px;height:44px;font-size:18px;flex-direction:column;gap:1px">⌂<span style="font-size:8px;font-weight:700;letter-spacing:.04em;opacity:.85">HOME</span></span></a><div>HSC Biology<small>Y11–12 · Modules 1–8</small></div></div>
    <div class="search">
      <input id="globalSearch" type="text" placeholder="🔍 Search topics & terms…" autocomplete="off"/>
      <div id="searchRes" class="searchres hidden"></div>
    </div>

<script>
const LS_KEY="hscbio_progress";
const DEFAULT_STATE={check:{},conf:{},notes:{},examDate:"2026-10-21",quizLog:[],theme:"dark",streak:[],edits:{},addedDots:{},addedQ:{},editMode:false,quizStats:{},srs:{},history:[],bookmarks:{}};
const TODAY=()=>new Date().toISOString().slice(0,10);
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const addDays=(iso,n)=>{const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)return Object.assign({},JSON.parse(JSON.stringify(DEFAULT_STATE)),s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE));}
let saveT;function save(){clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(LS_KEY,JSON.stringify(state)),350);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function stripTags(s){return String(s).replace(/<[^>]+>/g,'');}
function streakToday(){const d=new Date().toISOString().slice(0,10);if(!state.streak.includes(d)){state.streak.push(d);save();}}

/* ============================= MODULES ============================= */
const MODULES=[
/* ---- Y11 BRIEF ---- */
{id:"m1",num:1,title:"Cells as the Basis of Life",year:11,sub:"Y11 Review · Cell structure, function & biochemistry",
 terms:[
  {topic:"Cell Structure",items:[["Prokaryote","Cell lacking a membrane-bound nucleus (e.g. bacteria)"],["Eukaryote","Cell with a membrane-bound nucleus (e.g. animal, plant, fungal cells)"],["Organelle","Specialised structure within a cell performing a specific function"],["Nucleus","Controls cell activity; contains DNA"],["Mitochondria","Site of aerobic respiration; produces ATP"],["Chloroplast","Site of photosynthesis in plant cells; contains chlorophyll"],["Ribosome","Site of protein synthesis; found on rough ER and free in cytoplasm"],["Cell membrane","Selectively permeable phospholipid bilayer controlling entry/exit of substances"],["Fluid mosaic model","Model of membrane: phospholipid bilayer with embedded proteins that can move"]]},
  {topic:"Cell Function",items:[["Diffusion","Passive movement of particles from high to low concentration"],["Osmosis","Diffusion of water across a selectively permeable membrane from high to low water potential"],["Active transport","Movement of substances against concentration gradient; requires ATP"],["Endocytosis","Engulfing of particles into the cell via membrane folding"],["Exocytosis","Expulsion of substances from the cell via vesicle fusion with membrane"],["Enzyme","Biological catalyst; protein that speeds up reactions without being consumed"],["Active site","Region on enzyme that binds the specific substrate"],["Denaturation","Irreversible loss of enzyme shape/function due to heat or pH change"],["ATP","Adenosine triphosphate; the cell's energy currency"],["Photosynthesis","Conversion of CO₂ + H₂O → glucose + O₂ using light energy in chloroplasts"],["Cellular respiration","Breakdown of glucose to produce ATP; aerobic uses O₂, anaerobic does not"]]}
 ],
 keyDefs:[
  {term:"Prokaryote vs Eukaryote",def:"Prokaryotes lack a membrane-bound nucleus and organelles; DNA is circular in a nucleoid region. Eukaryotes have a membrane-bound nucleus and membrane-bound organelles."},
  {term:"Fluid mosaic model",def:"The cell membrane consists of a phospholipid bilayer in which proteins are embedded and can move laterally, giving it mosaic-like structure and fluid properties."},
  {term:"Osmosis",def:"The diffusion of water molecules across a selectively permeable membrane from a region of higher water potential to a region of lower water potential."},
  {term:"Enzyme",def:"A biological catalyst (protein) that lowers the activation energy of a specific reaction without being consumed, by binding its substrate at the active site."}
 ],
 topics:[
  {id:"m1.1",title:"Cell Structure — Prokaryotes vs Eukaryotes",tags:["Y11 Review"],
   def:"<b>Prokaryotic cells</b> (bacteria): no membrane-bound nucleus; circular DNA in nucleoid region; no membrane-bound organelles; smaller (1–10 µm); may have plasmids, flagella, pili, capsule. <b>Eukaryotic cells</b> (animals, plants, fungi): membrane-bound nucleus; linear DNA; membrane-bound organelles (mitochondria, ER, Golgi, etc.); larger (10–100 µm). Plant cells additionally have: cell wall (cellulose), chloroplasts, large central vacuole. Animal cells have: centrioles, small vacuoles.",
   eqn:"Key organelles: Nucleus → DNA storage + transcription. Ribosome → translation (protein synthesis). Mitochondria → aerobic respiration (ATP). Chloroplast → photosynthesis. ER (rough) → protein processing. Golgi → packaging + secretion. Lysosome → digestion of waste.",
   tip:"The MOST examinable Y11 link to Y12: understand prokaryote vs eukaryote structure because Module 5 contrasts prokaryotic and eukaryotic DNA organisation (circular vs linear, histones vs no histones, plasmids). Also: ribosomes = site of translation (Module 5 IQ3).",
   trap:"Mitochondria and chloroplasts have their own circular DNA and ribosomes — evidence they were once free-living prokaryotes (endosymbiotic theory). Don't say 'all cells have a cell wall' — only plants, fungi and bacteria."},
  {id:"m1.2",title:"Cell Function — Transport, Enzymes & Biochemistry",tags:["Y11 Review"],
   def:"<b>Passive transport</b> (no ATP): diffusion (concentration gradient), osmosis (water via semi-permeable membrane), facilitated diffusion (via protein channels). <b>Active transport</b> (requires ATP): moves substances against concentration gradient via carrier proteins. <b>Bulk transport</b>: endocytosis (in) and exocytosis (out) via vesicles. <b>Enzymes</b>: protein catalysts with a specific active site; substrate binds → enzyme-substrate complex → products released. Affected by temperature, pH, substrate concentration. <b>Photosynthesis</b>: 6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ (light energy). <b>Cellular respiration</b>: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP (aerobic).",
   tip:"Surface-area-to-volume ratio: as cells increase in size, SA:V decreases → diffusion becomes less efficient → multicellularity and specialised transport systems needed (links to Module 2). Temperature and enzyme activity: up to optimum → faster; above optimum → denaturation (permanent).",
   tip2:"Key Y12 link: enzyme concepts from M1 (active site, denaturation, substrate specificity) underpin understanding of how mutations in M5/M6 change protein shape → changed function.",
   trap:"Osmosis is NOT the same as diffusion — it specifically describes water movement and requires a selectively permeable membrane. Active transport and endocytosis both require ATP but are different processes (protein carrier vs vesicle)."}
 ]},
{id:"m2",num:2,title:"Organisation of Living Things",year:11,sub:"Y11 Review · Tissues, organs, transport systems",
 terms:[
  {topic:"Cell Organisation",items:[["Tissue","Group of similar cells performing a common function"],["Organ","Structure made of different tissues working together"],["Organ system","Group of organs working together for a body function"],["Cell differentiation","Process by which cells become specialised for specific functions"],["Multicellular organism","Organism made of many cells with specialised roles"]]},
  {topic:"Transport",items:[["Xylem","Plant vascular tissue that transports water and minerals upward from roots"],["Phloem","Plant vascular tissue that transports sugars (assimilates) to all parts of plant"],["Transpiration","Evaporation of water from leaves; drives water movement up xylem"],["Cohesion-tension theory","Mechanism of water movement in plants: cohesion of water + tension from transpiration"],["Stomata","Pores in leaf epidermis; regulate gas exchange and water loss"],["Alveoli","Air sacs in lungs with thin walls and large surface area for gas exchange"],["Open circulatory system","Blood/haemolymph not confined to vessels; bathes organs directly (e.g. insects)"],["Closed circulatory system","Blood confined to vessels; higher pressure and faster delivery (e.g. mammals)"]]}
 ],
 keyDefs:[
  {term:"Transpiration-cohesion-tension",def:"Water evaporates from leaves (transpiration) creating tension; cohesion between water molecules and adhesion to xylem walls pulls a continuous column of water up from roots."},
  {term:"Autotroph vs Heterotroph",def:"Autotrophs produce their own organic molecules using light (photosynthesis) or chemical energy. Heterotrophs obtain organic molecules by consuming other organisms."}
 ],
 topics:[
  {id:"m2.1",title:"Cell Organisation — Tissues, Organs, Systems",tags:["Y11 Review"],
   def:"Hierarchy: organelles → cells → tissues → organs → organ systems → organism. <b>Cell differentiation</b>: during development, cells express different genes → become specialised (e.g. muscle cells, nerve cells, red blood cells). Unicellular organisms perform all life functions in one cell. Colonial organisms (e.g. Volvox) are groups of similar cells with limited specialisation. Multicellular organisms have true tissue differentiation.",
   tip:"Y12 link: cell differentiation requires selective gene expression — directly links to Module 5 (genes + environment → phenotype) and Module 6 (how mutations affect specialised cells)."},
  {id:"m2.2",title:"Nutrient & Gas Requirements — Autotrophs vs Heterotrophs",tags:["Y11 Review"],
   def:"<b>Autotrophs</b> (plants, algae, some bacteria): produce organic molecules from CO₂ using light (photosynthesis) or chemical energy (chemosynthesis). Structures: leaves (photosynthesis), roots (water/mineral absorption), stomata (gas exchange). <b>Heterotrophs</b> (animals, fungi): consume organic molecules. Digestion: mechanical (physical breakdown) + chemical (enzymes). Absorption occurs across specialised surfaces (intestinal villi — thin, large SA, vascularised). Gas exchange: mammals — alveoli (thin walls, moist, large SA, rich blood supply); plants — stomata and lenticels.",
   tip:"SA:V and exchange surface features (thin, moist, large SA, good blood supply/transport) are a recurring theme — applies to alveoli, villi, root hair cells, and gill lamellae."},
  {id:"m2.3",title:"Transport Systems",tags:["Y11 Review"],
   def:"<b>Plants</b>: Xylem (water + minerals, root → leaves, cohesion-tension mechanism). Phloem (sugars, source → sink, pressure-flow mechanism). <b>Animals</b>: Open system (haemolymph bathes tissues directly; insects, some molluscs). Closed system (blood in vessels, higher pressure, faster; vertebrates). Mammalian cardiovascular: heart (pump), arteries (from heart), veins (to heart), capillaries (exchange). Blood composition: red blood cells (O₂ transport via haemoglobin), white blood cells (immunity), platelets (clotting), plasma (transport medium).",
   tip:"Y12 link: haemoglobin is a protein with quaternary structure (4 subunits) — directly links to Module 5 protein structure. The immune cells (WBCs) link directly to Module 7 (infectious disease — lymphocytes, phagocytes)."}
 ]},
{id:"m3",num:3,title:"Biological Diversity",year:11,sub:"Y11 Review · Adaptations, evolution, evidence",
 terms:[
  {topic:"Adaptations & Evolution",items:[["Adaptation","A heritable trait that increases an organism's fitness in its environment"],["Structural adaptation","Physical feature that increases survival (e.g. thick fur, camouflage)"],["Physiological adaptation","Internal biochemical/metabolic process aiding survival (e.g. salt glands, venom production)"],["Behavioural adaptation","Actions that increase survival (e.g. migration, hibernation, alarm calls)"],["Natural selection","Process by which heritable traits that increase fitness become more common over generations"],["Fitness","Reproductive success — ability to survive and pass on genes"],["Variation","Differences in traits between individuals of a population"],["Speciation","Formation of new species from a common ancestor, usually through reproductive isolation"],["Convergent evolution","Unrelated species independently evolve similar traits due to similar selection pressures"],["Divergent evolution","Related species evolve different traits as they adapt to different environments"],["Punctuated equilibrium","Evolution occurs in rapid bursts followed by long periods of stasis (vs gradualism)"],["Microevolution","Change in allele frequencies within a population over a short time"]]}
 ],
 keyDefs:[
  {term:"Natural selection",def:"Process by which individuals with heritable traits that increase reproductive fitness survive to reproduce more than others, causing those traits to become more frequent in the population over generations."},
  {term:"Speciation",def:"The formation of new species when populations of the same species become reproductively isolated and diverge genetically over time through natural selection and genetic drift."}
 ],
 topics:[
  {id:"m3.1",title:"Adaptations",tags:["Y11 Review"],
   def:"Adaptations increase an organism's ability to survive and reproduce in its environment. <b>Structural</b>: physical features (e.g. thick blubber in seals for insulation; long legs in desert animals to stay above hot ground; cryptic colouring for camouflage). <b>Physiological</b>: internal processes (e.g. salt-excreting glands in marine iguanas; concentrated urine in desert mammals; ectotherm metabolic rate adjustment). <b>Behavioural</b>: actions (e.g. nocturnal activity in desert animals; huddling behaviour in penguins; seasonal migration).",
   tip:"Y12 link: adaptations arise from natural selection acting on genetic variation — the mechanism is mutation (Module 6) creating new alleles, which are then selected for or against."},
  {id:"m3.2",title:"Theory of Evolution by Natural Selection",tags:["Y11 Review"],
   def:"Darwin and Wallace's theory: (1) Variation exists within populations. (2) Some variation is heritable. (3) More offspring are produced than can survive (overproduction). (4) Individuals with favourable variations survive and reproduce (differential survival/reproduction = natural selection). (5) Favourable traits become more common over generations. <b>Microevolution</b>: allele frequency change within a population. <b>Macroevolution</b>: speciation and higher-order changes over long periods. <b>Convergent evolution</b>: unrelated species evolve similar features (e.g. dolphin and shark body shape). <b>Divergent evolution</b>: related species evolve different features (e.g. Darwin's finches). <b>Punctuated equilibrium</b>: evolution in rapid bursts, not always gradual.",
   tip:"Modern example: antibiotic-resistant bacteria — random mutations create resistant variants; antibiotics act as selection pressure; resistant bacteria survive and reproduce → resistance increases in population. This is natural selection in real time."},
  {id:"m3.3",title:"Evidence for Evolution",tags:["Y11 Review"],
   def:"<b>Fossil record</b>: dated by stratigraphy and radiometric dating (e.g. carbon-14 for recent fossils; uranium-lead for older). Shows progression of forms over time. <b>Comparative anatomy</b>: homologous structures (same evolutionary origin, different function — e.g. human arm, whale flipper, bat wing) vs analogous structures (different origin, similar function — convergent evolution). <b>Comparative embryology</b>: embryos of different vertebrates show similarities early in development. <b>Biogeography</b>: distribution of species reflects evolutionary history (e.g. marsupials in Australia due to continental drift). <b>Biochemical evidence</b>: similarities in DNA sequences and protein structure reflect relatedness.",
   tip:"Y12 link: DNA sequencing (Module 5) is now the gold standard for determining evolutionary relationships and species classification — biochemical evidence has revolutionised our understanding of phylogeny."}
 ]},
{id:"m4",num:4,title:"Ecosystem Dynamics",year:11,sub:"Y11 Review · Population dynamics, past & future ecosystems",
 terms:[
  {topic:"Ecology",items:[["Ecosystem","Community of organisms plus their abiotic environment"],["Biotic factor","Living component of an ecosystem (predation, competition, symbiosis)"],["Abiotic factor","Non-living component (temperature, light, pH, water availability)"],["Population","Group of individuals of the same species in the same area at the same time"],["Community","All populations of different species living in the same area"],["Niche","The role and position of a species in its ecosystem (what it does, not just where it lives)"],["Trophic level","Position in a food chain (producer → primary consumer → secondary consumer…)"],["Predation","One organism kills and eats another; increases predator fitness, decreases prey fitness"],["Competition","Two species or individuals compete for the same limited resource"],["Symbiosis","Close, long-term interaction between two species"],["Mutualism","Both species benefit (e.g. clownfish + anemone)"],["Commensalism","One species benefits, the other is unaffected"],["Parasitism","One species benefits (parasite) at the expense of the other (host)"],["Carrying capacity","Maximum population size an environment can sustain indefinitely"],["Biodiversity","Variety of life at genetic, species and ecosystem levels"]]}
 ],
 keyDefs:[
  {term:"Niche",def:"The ecological role of a species — the sum of all resources it uses and conditions it requires; no two species can occupy exactly the same niche in the same area (competitive exclusion principle)."},
  {term:"Carrying capacity",def:"The maximum population size that an environment can support sustainably, determined by available resources (food, water, shelter, nesting sites)."}
 ],
 topics:[
  {id:"m4.1",title:"Population Dynamics",tags:["Y11 Review"],
   def:"Populations fluctuate based on biotic and abiotic factors. <b>Biotic</b>: predation (keeps prey populations in check), competition (intraspecific = same species; interspecific = different species), symbiosis, disease. <b>Abiotic</b>: temperature, rainfall, soil nutrients, light availability. Populations grow when birth rate + immigration > death rate + emigration. <b>Exponential growth</b>: unlimited resources → J-curve. <b>Logistic growth</b>: limited resources → S-curve approaching carrying capacity. <b>Sampling techniques</b>: quadrats (plants/slow animals), transects (distribution along gradient), mark-recapture (mobile animals).",
   tip:"Y12 link: population genetics (Module 5 IQ5) — population SIZE affects allele frequencies. Small populations = genetic drift is significant. Hardy-Weinberg equilibrium assumes a large population."},
  {id:"m4.2",title:"Past and Future Ecosystems",tags:["Y11 Review"],
   def:"<b>Evidence for past ecosystems</b>: fossil record, rock structure and formation (stratigraphy), ice core drilling (trapped air bubbles reveal past CO₂ and temperature), Aboriginal rock paintings (document past species distributions). <b>Radiometric dating</b>: uses decay of radioactive isotopes (e.g. ¹⁴C for <50,000 yr; uranium-lead for millions of years). <b>Gas analysis</b> of ice cores: reveals past atmospheric composition. <b>Human impacts on future ecosystems</b>: habitat destruction → extinction; introduced species → competition/predation; climate change → habitat shift; pollution → abiotic changes. <b>Ecosystem restoration</b>: revegetation of mining sites, removing introduced species, captive breeding programs.",
   tip:"Y12 link: human-induced selection pressures (Module 3/4) + genetic drift in small isolated populations (Module 6) = extinction risk. Conservation genetics (Module 5 IQ5) directly applies population genetics tools to manage at-risk species."}
 ]}

,{id:"m5",num:5,title:"Heredity",year:12,sub:"Reproduction · Mitosis/Meiosis · DNA replication · Transcription/Translation · Inheritance patterns · Population genetics",
 terms:[
  {topic:"Reproduction",items:[["Gamete","Haploid sex cell (sperm or egg) produced by meiosis"],["Zygote","Diploid cell formed by fusion of two gametes (fertilisation)"],["Blastocyst","Early embryo stage that implants into the uterus wall"],["Implantation","Attachment of the blastocyst to the endometrium ~6–10 days post-fertilisation"],["hCG","Human chorionic gonadotropin; maintains corpus luteum early in pregnancy"],["Binary fission","Asexual reproduction in prokaryotes: one cell divides into two identical cells"],["Budding","Asexual reproduction where a new organism grows from the parent body (e.g. yeast)"]]},
  {topic:"Cell Replication",items:[["Diploid (2n)","Cell containing two sets of chromosomes (one from each parent)"],["Haploid (n)","Cell containing one set of chromosomes (gametes)"],["Homologous chromosomes","Chromosome pairs carrying the same genes at the same loci but possibly different alleles"],["Sister chromatids","Identical copies of a chromosome joined at the centromere after DNA replication"],["Mitosis","Cell division producing two genetically identical diploid daughter cells"],["Meiosis","Two-stage cell division producing four genetically unique haploid gametes"],["Crossing over","Exchange of DNA segments between non-sister chromatids of homologous chromosomes in prophase I"],["Independent assortment","Random orientation of homologous pairs in meiosis I; each gamete gets a unique mix of maternal/paternal chromosomes"],["Chiasma","Point where crossing over occurs between homologous chromosomes"],["Semi-conservative replication","DNA replication producing two helices each with one original and one new strand"],["Helicase","Enzyme that unwinds the double helix by breaking hydrogen bonds"],["DNA polymerase","Enzyme that synthesises new DNA strands using a template"],["DNA ligase","Enzyme that joins Okazaki fragments on the lagging strand"]]},
  {topic:"DNA & Polypeptide Synthesis",items:[["Transcription","Synthesis of mRNA from a DNA template in the nucleus"],["Translation","Synthesis of a polypeptide from an mRNA sequence at ribosomes"],["mRNA","Messenger RNA; carries genetic code from nucleus to ribosome"],["tRNA","Transfer RNA; carries specific amino acids to the ribosome; has an anticodon"],["rRNA","Ribosomal RNA; structural and catalytic component of ribosomes"],["Codon","Triplet of mRNA bases coding for a specific amino acid"],["Anticodon","Complementary triplet on tRNA that pairs with an mRNA codon"],["Start codon","AUG; codes for methionine; begins translation"],["Stop codon","UAA, UAG or UGA; signals end of translation"],["Intron","Non-coding DNA sequence removed from pre-mRNA during splicing"],["Exon","Coding DNA sequence retained in mature mRNA"],["Polypeptide","Chain of amino acids joined by peptide bonds; folds into a functional protein"],["Denaturation","Disruption of protein secondary/tertiary structure; permanent change in shape/function"]]},
  {topic:"Genetic Variation & Inheritance",items:[["Gene","Section of DNA coding for a specific polypeptide or functional RNA"],["Allele","Alternative form of a gene at the same locus"],["Dominant","Allele expressed in the phenotype when only one copy is present"],["Recessive","Allele only expressed when two copies are present (homozygous)"],["Homozygous","Having two identical alleles for a gene"],["Heterozygous","Having two different alleles for a gene"],["Genotype","Genetic makeup of an organism for a trait"],["Phenotype","Observable physical/biochemical characteristics of an organism"],["Locus","Specific position of a gene on a chromosome"],["Codominance","Both alleles fully expressed simultaneously in the heterozygote"],["Incomplete dominance","Heterozygote shows an intermediate phenotype between the two homozygotes"],["Multiple alleles","A gene that has more than two possible allele forms in the population"],["Autosomal","Located on non-sex chromosomes; affects males and females equally"],["Sex-linked","Gene located on a sex chromosome (usually X); more commonly expressed in males for X-linked recessives"],["Pedigree","Diagram showing the inheritance of a trait across multiple generations"]]},
  {topic:"Population Genetics",items:[["DNA profiling","Technique comparing STR patterns to uniquely identify individuals"],["STR","Short tandem repeat; variable-length repeated DNA sequences used in profiling"],["SNP","Single nucleotide polymorphism; single base-pair variation in DNA sequence"],["Haplotype","Group of alleles/SNPs on the same chromosome inherited together"],["Hardy-Weinberg equilibrium","Model predicting constant allele/genotype frequencies in a non-evolving population"],["Allele frequency","Proportion of a specific allele in a gene pool"],["PCR","Polymerase chain reaction; amplifies specific DNA sequences through repeated heating/cooling cycles"],["Gel electrophoresis","Technique separating DNA/protein fragments by size using an electric field"]]}
 ],
 keyDefs:[
  {term:"Mitosis",def:"Cell division of diploid somatic cells producing two genetically identical diploid daughter cells. Purpose: growth, repair and asexual reproduction."},
  {term:"Meiosis",def:"Two successive divisions of a diploid cell producing four haploid, genetically unique gametes. Crossing over and independent assortment generate variation."},
  {term:"Crossing over",def:"Exchange of DNA segments between non-sister chromatids of homologous chromosomes at chiasmata during prophase I of meiosis, creating new combinations of alleles."},
  {term:"Semi-conservative replication",def:"DNA replication in which each new double helix contains one original (template) strand and one newly synthesised strand."},
  {term:"Transcription",def:"Synthesis of a complementary mRNA strand from a DNA template strand (read 3'→5') by RNA polymerase, in the nucleus."},
  {term:"Translation",def:"Synthesis of a polypeptide chain at ribosomes, where tRNA anticodons pair with mRNA codons to deliver specific amino acids in sequence."},
  {term:"Codominance",def:"Both alleles are fully and simultaneously expressed in the heterozygote phenotype (e.g. AB blood type; roan cattle)."},
  {term:"Incomplete dominance",def:"The heterozygote phenotype is intermediate between the two homozygous phenotypes; neither allele is fully dominant (e.g. red × white → pink snapdragons)."},
  {term:"Hardy-Weinberg equilibrium",def:"p + q = 1; p² + 2pq + q² = 1. Predicts allele and genotype frequencies remain constant if: no mutation, no selection, no gene flow, random mating, large population."}
 ],
 topics:[
  {id:"m5.1",title:"Sexual vs Asexual Reproduction",tags:["Syllabus"],
   def:"<b>Sexual reproduction</b>: involves fusion of two haploid gametes (fertilisation) from two parents → diploid offspring with genetic variation. <b>Asexual reproduction</b>: one parent, no gametes; offspring are genetically identical clones. Methods: <b>Animals</b> — external fertilisation (aquatic; gametes released into water; high gamete numbers compensate for low success; e.g. fish, frogs, coral) vs internal fertilisation (gametes meet inside body; fewer gametes; higher success; e.g. mammals, birds, reptiles). <b>Plants</b> — asexual (runners/stolons, bulbs, tubers, cuttings) vs sexual (pollen + ovule → zygote → seed). <b>Fungi</b> — budding (yeast: mitotic bud formation) and spores (Rhizopus: sporangiophores burst releasing spores by air). <b>Bacteria</b> — binary fission (chromosome replicates, cell wall constricts → 2 identical cells). <b>Protists</b> — binary fission or budding.",
   eqn:"External fertilisation: many gametes released → low survival; suitable for aquatic environments.\nInternal fertilisation: fewer gametes; higher survival; embryo protected inside body or egg.\nAsexual: all offspring can reproduce; rapid colonisation of stable environments.\nSexual: genetic variation → adaptability to environmental change.",
   tip:"Monotremes (platypus, echidna) have internal fertilisation but lay eggs — don't assume internal fertilisation always means live birth. Agricultural manipulation: artificial insemination (AI) in cattle allows one superior male to sire thousands of offspring globally; artificial pollination in plants (e.g. vanilla orchids) allows controlled hybridisation.",
   trap:"External fertilisation is NOT less efficient — it is efficient at producing many cheap offspring; individual survival just isn't the priority. Don't confuse fertilisation type (where gametes meet) with development type (where embryo develops).",
   questions:[
    {q:"Compare external and internal fertilisation in animals, outlining one advantage of each.",a:"External fertilisation: gametes released into an aqueous environment where fusion occurs. Advantage: large numbers of offspring produced at low energy cost per gamete; suitable for aquatic environments where gametes can disperse. Internal fertilisation: sperm deposited directly into female reproductive tract. Advantage: higher fertilisation success rate; embryos receive greater protection inside the body; less vulnerability to environmental conditions. Generally requires more energy per offspring but produces higher survival rates.",type:"Syllabus"},
    {q:"Evaluate the impact of artificial insemination on agricultural animal reproduction.",a:"AI allows semen from genetically superior males to be collected, preserved and transported globally, enabling one male to father thousands of offspring. Benefits: accelerates selective breeding; improves milk yield, growth rates and disease resistance in herds; maintains valuable genetics across geographic distances; reduces need to transport live animals. Limitations: reduces genetic diversity over time (many individuals share one sire); risk of heritable disease becoming widespread; welfare concerns with collection procedures; concentrated genetic bases make populations vulnerable to novel pathogens.",type:"HSC"}
   ]},
  {id:"m5.2",title:"Mitosis — Process and Significance",tags:["Syllabus"],
   def:"Mitosis is a single division producing two genetically identical diploid cells from one diploid parent. <b>Interphase</b>: DNA replicates; cell grows; organelles duplicated. <b>Prophase</b>: chromosomes condense; nuclear envelope breaks down; spindle fibres form from centrioles. <b>Metaphase</b>: chromosomes align at cell equator (metaphase plate), attached to spindle fibres at centromeres. <b>Anaphase</b>: sister chromatids separate; pulled to opposite poles. <b>Telophase</b>: nuclear envelopes reform; chromosomes decondense. <b>Cytokinesis</b>: cytoplasm divides → two identical daughter cells (2n). Significance: growth and development; tissue repair; asexual reproduction; replacement of worn cells (e.g. RBCs, skin).",
   eqn:"2n parent cell → [Prophase → Metaphase → Anaphase → Telophase] → 2 × 2n daughter cells\nAll daughter cells genetically identical to parent.",
   tip:"PMAT mnemonic: Prophase, Metaphase, Anaphase, Telophase. Remember: interphase (including S-phase DNA replication) occurs BEFORE mitosis. Mitosis only covers the nuclear division; cytokinesis is the separate cytoplasm division.",
   trap:"Mitosis does NOT introduce genetic variation — daughter cells are genetically identical. Don't confuse mitosis (2n→2n, identical) with meiosis (2n→n, variable). The HSC can ask you to describe what happens to chromosomes/chromatids at each stage — know whether you're talking about chromosomes or chromatids.",
   questions:[
    {q:"Describe the significance of mitosis in multicellular organisms.",a:"Mitosis produces genetically identical diploid daughter cells, which is essential for: (1) Growth — increasing cell number during development; (2) Repair and regeneration — replacing damaged or worn-out cells (e.g. skin, blood cells, gut lining); (3) Asexual reproduction — in unicellular organisms and plants (vegetative propagation). Genetic identity ensures all somatic cells carry the same genetic information as the original zygote.",type:"Syllabus"}
   ]},
  {id:"m5.3",title:"Meiosis and Sources of Genetic Variation",tags:["Syllabus"],
   def:"Meiosis produces four genetically unique haploid cells from one diploid cell, through two successive divisions. <b>Meiosis I (reduction division)</b>: Prophase I — chromosomes condense; homologous pairs align (synapsis); <b>crossing over</b> occurs at chiasmata between non-sister chromatids → recombinant chromosomes. Metaphase I — homologous pairs randomly align at equator (<b>independent assortment</b> — 50/50 chance each pair faces either pole). Anaphase I — homologous pairs separate (not sister chromatids). Telophase I/Cytokinesis — 2 haploid cells (each chromosome still has 2 sister chromatids). <b>Meiosis II</b> (like mitosis): sister chromatids separate → 4 haploid gametes. <b>Sources of variation</b>: (1) Crossing over (Prophase I), (2) Independent assortment (Metaphase I — 2²³ ≈ 8.4 million combinations in humans), (3) Random fertilisation (any sperm + any egg).",
   eqn:"2n parent → Meiosis I (2 × n cells) → Meiosis II (4 × n gametes), each genetically unique.\nHuman: 2²³ × 2²³ possible gamete combinations × random fertilisation.",
   tip:"Meiosis I = REDUCTION (2n→n, separates homologous pairs). Meiosis II = SEPARATION (n→n, separates sister chromatids — same as mitosis). Crossing over happens between HOMOLOGOUS chromosomes (NOT sister chromatids). The result of crossing over is new allele combinations on individual chromosomes.",
   trap:"After Meiosis I you have 2 haploid cells — but each chromosome still consists of 2 sister chromatids. The cell is haploid (one from each homologous pair) but each chromosome is still duplicated. Meiosis II then separates those sister chromatids. Don't confuse 'haploid' with 'unduplicated'.",
   mnem:"Meiosis I Remembers Relatives (Reduction — separates homologous pairs). Meiosis II Separates Sisters (sister chromatids).",
   questions:[
    {q:"Explain three mechanisms by which meiosis generates genetic variation.",a:"(1) Crossing over (Prophase I): non-sister chromatids of homologous chromosomes exchange DNA segments at chiasmata, producing recombinant chromosomes with new allele combinations not found in either parent. (2) Independent assortment (Metaphase I): homologous pairs align randomly at the equator — each pair independently faces either pole, so each gamete receives a unique combination of maternal and paternal chromosomes (2²³ ≈ 8.4 million possibilities in humans). (3) Random fertilisation: any sperm can fertilise any egg, multiplying possible genotype combinations beyond 70 trillion for human reproduction.",type:"HSC"},
    {q:"Compare mitosis and meiosis in terms of purpose, products and genetic outcome.",a:"Mitosis: one division; produces 2 diploid (2n) genetically identical cells; purpose = growth, repair, asexual reproduction; no variation introduced. Meiosis: two divisions; produces 4 haploid (n) genetically unique cells (gametes); purpose = sexual reproduction; generates variation via crossing over, independent assortment and random fertilisation.",type:"Syllabus"}
   ]},
  {id:"m5.4",title:"DNA Replication",tags:["Syllabus"],
   def:"DNA replication is <b>semi-conservative</b>: each new double helix contains one original strand and one new strand. Steps: (1) <b>Helicase</b> unwinds the double helix by breaking hydrogen bonds between base pairs. (2) <b>Primase</b> adds short RNA primers to initiate replication. (3) <b>DNA polymerase</b> reads each template strand 3'→5' and adds complementary nucleotides 5'→3'. Leading strand: synthesised continuously. Lagging strand: synthesised in Okazaki fragments (5'→3' away from fork). (4) <b>DNA ligase</b> joins Okazaki fragments. (5) Result: two identical double helices, each = 1 original + 1 new strand. <b>Base pairing rules</b>: A–T (2 hydrogen bonds); G–C (3 hydrogen bonds). RNA uses U instead of T.",
   eqn:"A pairs with T (DNA) or U (RNA)   G pairs with C\nSemi-conservative: 1 old strand + 1 new strand per daughter helix.",
   tip:"'Semi-conservative' means HALF the original is conserved in each copy. Meselson-Stahl experiment (1958) proved semi-conservative replication using nitrogen isotopes. The HSC often gives a DNA sequence and asks you to write the new strand — just apply complementary base pairing.",
   trap:"DNA polymerase can only add nucleotides in the 5'→3' direction — this creates the leading/lagging strand asymmetry. You don't need Okazaki fragment detail in most HSC questions but do know the concept. Don't confuse DNA replication (produces 2 identical DNA molecules) with transcription (produces 1 mRNA molecule).",
   questions:[
    {q:"Explain the term 'semi-conservative' as applied to DNA replication and outline the role of DNA polymerase.",a:"'Semi-conservative' means each daughter DNA molecule retains one original (parental) strand and has one newly synthesised strand. This ensures the genetic information is accurately copied. DNA polymerase synthesises the new strand by reading the template strand in the 3'→5' direction and adding complementary nucleotides to the new strand in the 5'→3' direction, following Watson-Crick base pairing rules (A–T; G–C).",type:"HSC"}
   ]},
  {id:"m5.5",title:"Transcription and Translation",tags:["Syllabus"],
   def:"<b>Central dogma</b>: DNA → (transcription) → mRNA → (translation) → polypeptide. <b>Transcription</b> (in nucleus): RNA polymerase binds promoter; unwinds template strand (read 3'→5'); synthesises complementary mRNA (5'→3') using base pairing (A→U, T→A, G→C, C→G). Pre-mRNA produced; introns spliced out; exons joined → mature mRNA. <b>Translation</b> (at ribosomes in cytoplasm): mRNA binds small ribosomal subunit. (1) <b>Initiation</b>: start codon AUG read; first tRNA (anticodon UAC, carrying Met) binds. (2) <b>Elongation</b>: ribosome moves along mRNA codon by codon; tRNA anticodons bind complementary codons; amino acids joined by peptide bonds (catalysed by rRNA = ribozyme); spent tRNA exits via E site. (3) <b>Termination</b>: stop codon (UAA/UAG/UGA) reached → polypeptide released. Ribosome has 3 tRNA binding sites: A (aminoacyl — incoming tRNA), P (peptidyl — growing chain), E (exit — spent tRNA).",
   eqn:"Template DNA (3'→5') → mRNA (5'→3'): T→A, A→U, G→C, C→G\nCodon = 3 mRNA bases = 1 amino acid\nStart: AUG (Met); Stop: UAA, UAG, UGA",
   tip:"Remember: the TEMPLATE strand is read 3'→5'; mRNA is built 5'→3'. The CODING strand (same sequence as mRNA but with T instead of U) is NOT what RNA polymerase reads. Exam tip: if given a DNA sequence, check which strand is template (it reads 3'→5' by convention, or the question will specify). mRNA = copy of coding strand (with U instead of T).",
   trap:"Don't confuse template strand (what RNA polymerase reads) and coding strand (same sequence as mRNA). In eukaryotes: introns MUST be removed from pre-mRNA before translation — if the question specifies eukaryotes, mention this splicing step. Prokaryotes lack introns and can translate mRNA as it's being transcribed.",
   calc:"WORKED EXAMPLE — transcription + translation\nDNA template: 3'-TAC-GGC-ACA-ATT-5'\nStep 1 – mRNA:  5'-AUG-CCG-UGU-UAA-3'\nStep 2 – Amino acids: AUG = Met (start); CCG = Pro; UGU = Cys; UAA = STOP\nPolypeptide: Met-Pro-Cys (3 amino acids; UAA is stop → no amino acid added)",
   questions:[
    {q:"Describe the roles of mRNA and tRNA in polypeptide synthesis.",a:"mRNA (messenger RNA): carries the genetic code from the DNA in the nucleus to the ribosomes in the cytoplasm, in the form of codons (triplets of bases). Each codon specifies a particular amino acid. tRNA (transfer RNA): transports specific amino acids to the ribosome. Each tRNA molecule has an anticodon that is complementary to a specific mRNA codon, ensuring the correct amino acid is incorporated into the growing polypeptide chain at each step.",type:"Syllabus"},
    {q:"A DNA template strand reads 3'-ATG-GTA-CGA-5'. Write the mRNA sequence and identify the first two amino acids encoded. (AUG=Met, UAC=? use complement logic; CAU=His, CGU=Arg, GCU=Ala)",a:"mRNA (5'→3'): 5'-UAC-CAU-GCU-3'. UAC = Tyr (tyrosine); CAU = His (histidine); GCU = Ala (alanine). Note: AUG would be the start codon — this sequence begins with UAC so it would need to be part of a longer sequence; first codons decoded: Tyr-His-Ala.",type:"HSC"}
   ]},
  {id:"m5.6",title:"Protein Structure and Genes vs Environment",tags:["Syllabus"],
   def:"<b>Protein structure levels</b>: Primary — linear amino acid sequence joined by peptide bonds. Secondary — local folding: α-helices or β-pleated sheets (hydrogen bonds between backbone). Tertiary — 3D shape of one polypeptide (R-group interactions: hydrogen bonds, ionic bonds, disulfide bridges, hydrophobic interactions). Quaternary — 2+ polypeptide chains forming a functional protein (e.g. haemoglobin: 4 subunits; antibodies: 4 chains). <b>Denaturation</b>: high temperature (breaks H-bonds/ionic bonds) or extreme pH (alters R-group charges) disrupts tertiary/quaternary structure → protein loses function permanently. <b>Genes AND environment affect phenotype</b>: genes determine which proteins are produced. Environment can modify gene expression or protein activity. Example: Himalayan rabbits — temperature-sensitive enzyme controls pigment deposition; cooler extremities = dark fur; warm core = white fur. Same genotype, different phenotype depending on temperature.",
   eqn:"Primary → Secondary → Tertiary → Quaternary\nDenaturation: breaks H-bonds (temp↑) or ionic bonds (pH change) → structure lost.",
   tip:"Protein function depends on 3D shape → shape depends on amino acid sequence → sequence depends on codon sequence in mRNA → mRNA sequence from DNA. Any mutation that changes an amino acid can change the protein's shape → changed function (links to Module 6 mutations).",
   trap:"Denaturation is PERMANENT — unlike inhibition. A denatured enzyme does not return to function when conditions return to normal. Don't confuse denaturation with competitive/non-competitive inhibition (which is reversible). Only HIGH temperature denatures — up to the optimum, higher temperature = faster reaction.",
   questions:[
    {q:"Explain how both genes and the environment can contribute to determining an organism's phenotype, using a named example.",a:"Genes: the DNA sequence determines which proteins (enzymes, structural proteins, signalling molecules) are produced, directly shaping an organism's biochemistry and physical traits. However, the environment can modify gene expression and protein activity, altering phenotype without changing the genotype. Example: Himalayan rabbits carry a gene encoding a temperature-sensitive enzyme (tyrosinase) involved in fur pigmentation. At lower temperatures (extremities), the enzyme is active → dark pigment deposited. At core body temperatures (warmer), the enzyme is inactive → white fur. The genotype is identical across the body, but environmental temperature changes the phenotype.",type:"HSC"}
   ]},
  {id:"m5.7",title:"DNA in Prokaryotes vs Eukaryotes",tags:["Syllabus"],
   def:"<b>Prokaryotes</b>: single, circular DNA molecule in the nucleoid region (not membrane-bound); no histone proteins; may contain additional plasmids (small, circular, self-replicating DNA carrying survival genes e.g. antibiotic resistance); rare introns. <b>Eukaryotes</b>: multiple linear chromosomes in a membrane-bound nucleus; DNA wrapped around histone proteins forming nucleosomes (chromatin); common introns; also have mitochondrial/chloroplast DNA (circular, prokaryote-like). Plasmids: allow bacteria to share genes via conjugation (horizontal gene transfer); support population continuity by spreading resistance genes rapidly.",
   eqn:"Prokaryote: circular DNA, nucleoid, plasmids, no histones.\nEukaryote: linear DNA, nucleus, histones/chromatin, introns common.",
   tip:"This topic directly precedes transcription — in eukaryotes, introns must be spliced out of pre-mRNA; in prokaryotes, translation can begin while mRNA is still being transcribed (no introns, no nuclear membrane). Plasmids in bacteria = the basis of gene cloning in Module 6 (vectors for recombinant DNA).",
   trap:"All eukaryotes have histones; prokaryotes do not (though some archaea do — not required for HSC). Mitochondrial and chloroplast DNA being circular/similar to prokaryotic DNA is evidence for endosymbiotic theory.",
   questions:[
    {q:"Compare the structure of DNA in prokaryotic and eukaryotic cells.",a:"Prokaryotes: single circular DNA molecule located in the nucleoid region (no membrane-bound nucleus); not associated with histone proteins; often supplemented by plasmids (small, circular, self-replicating extra-chromosomal DNA). Introns are rare or absent. Eukaryotes: multiple linear chromosomes housed in a membrane-bound nucleus; DNA is wound around histone proteins forming nucleosomes and chromatin; contain introns (non-coding sequences removed from pre-mRNA). Also possess small circular DNA in mitochondria and chloroplasts.",type:"Syllabus"}
   ]},
  {id:"m5.8",title:"Inheritance Patterns — Dominance, Codominance, Incomplete Dominance, Sex-linkage",tags:["Syllabus"],
   def:"<b>Autosomal dominant</b>: one copy of allele causes phenotype; appears every generation; equal in males/females. <b>Autosomal recessive</b>: two copies needed; can skip generations; carrier parents show no phenotype. <b>Incomplete dominance</b>: heterozygote shows intermediate phenotype — neither allele fully dominant. E.g. red (C^R C^R) × white (C^W C^W) → pink (C^R C^W) snapdragons. <b>Codominance</b>: both alleles fully expressed simultaneously. E.g. ABO blood type: I^A I^B → type AB (both A and B antigens present). <b>Multiple alleles</b>: gene has >2 alleles in the population; individual still has only two. E.g. ABO: I^A, I^B, i. Dominance hierarchy: I^A = I^B > i. <b>Sex-linked (X-linked)</b>: gene on X chromosome. Males (XY) have one copy → hemizygous → single recessive allele is expressed. Females (XX) need two recessive copies to express. X-linked recessive conditions: more common in males (e.g. haemophilia, red-green colour blindness).",
   eqn:"Codominance: I^A I^B = blood type AB; I^A I^A or I^A i = type A; I^B I^B or I^B i = type B; ii = type O.\nX-linked recessive: X^H X^h = carrier female (unaffected); X^h Y = affected male.",
   tip:"Pedigree identification clues: X-linked recessive: more males affected; no male-to-male transmission (father passes X to daughters only, Y to sons). Autosomal recessive: two unaffected parents have affected child. Autosomal dominant: affected in every generation. Codominance: BOTH phenotypes visible (AB blood type, roan cattle). Incomplete dominance: BLEND/intermediate (pink flower).",
   trap:"Codominance ≠ incomplete dominance. Codominance = both fully expressed (AB); incomplete = intermediate (pink). X-linked: females need TWO copies of the recessive allele to be affected (rare). A carrier female with X^H X^h is phenotypically normal. 'No male-to-male transmission' is the key indicator of X-linkage in pedigrees.",
   mnem:"Co = Co-exist (both phenotypes visible); In-complete = INtermediate blend.",
   questions:[
    {q:"Distinguish between codominance and incomplete dominance with a named example of each.",a:"Codominance: both alleles are fully and simultaneously expressed in the heterozygote — neither masks the other. Example: ABO blood type — I^A I^B produces type AB blood, with both A and B antigens present on red blood cells. Incomplete dominance: the heterozygote shows an intermediate phenotype; neither allele completely masks the other. Example: snapdragons — crossing homozygous red (C^R C^R) with homozygous white (C^W C^W) produces heterozygous pink (C^R C^W) offspring because one copy of each allele produces insufficient pigment for full red colour.",type:"HSC"},
    {q:"A carrier female (X^H X^h) for X-linked haemophilia has children with an unaffected male (X^H Y). Determine the probability of (i) a daughter being a carrier and (ii) a son being affected.",a:"Cross: X^H X^h × X^H Y. Daughters: X^H X^H (normal, 50%) and X^H X^h (carrier, 50%). Sons: X^H Y (normal, 50%) and X^h Y (affected, 50%). (i) 50% of daughters will be carriers. (ii) 50% (1 in 2) of sons will be affected.",type:"HSC"}
   ]},
  {id:"m5.9",title:"Punnett Squares, Mendel's Laws and Pedigree Analysis",tags:["Syllabus"],
   def:"<b>Mendel's Laws</b>: (1) Law of Segregation — during gamete formation, the two alleles for a gene separate so each gamete carries only one allele. (2) Law of Independent Assortment — alleles of different genes (on different chromosomes) are distributed independently into gametes. (3) Law of Dominance — in a heterozygote, the dominant allele determines the phenotype. <b>Punnett square</b>: grid showing all possible gamete combinations from a cross. Monohybrid (Aa × Aa): 1 AA : 2 Aa : 1 aa (genotype); 3 dominant : 1 recessive (phenotype). Dihybrid (AaBb × AaBb): 9:3:3:1 phenotype ratio. <b>Pedigree analysis</b> — symbols: □ = male, ○ = female, filled = affected, half-filled = carrier; horizontal line = mating; vertical line = offspring.",
   eqn:"Monohybrid Aa × Aa: genotype 1:2:1; phenotype 3:1 (if complete dominance).\nDihybrid AaBb × AaBb: 9 A_B_ : 3 A_bb : 3 aaB_ : 1 aabb.",
   tip:"Pedigree pattern recognition: autosomal dominant — appears every generation, affected parent always present. Autosomal recessive — skips generations; unaffected parents can have affected child. X-linked recessive — more males affected; no father-to-son transmission; affected males from carrier mothers. X-linked dominant — affected father → all daughters affected. Dihybrid 9:3:3:1 only applies when the two genes are on DIFFERENT chromosomes (independent assortment).",
   trap:"A dihybrid cross gives 9:3:3:1 ONLY when genes assort independently (not linked). If linked, ratio is distorted by crossing over frequency. Don't multiply raw pedigree probabilities without checking if the question asks for a conditional probability (e.g. 'given that the child is female, what is probability of being affected?').",
   calc:"WORKED EXAMPLE — dihybrid cross\nBrown eyes (B) dominant over blue (b); widow's peak (W) dominant over straight (w).\nCross: BbWw × BbWw\nP(brown) = 3/4; P(widow's peak) = 3/4\nP(brown + widow's peak) = 9/16\nP(brown + straight hairline) = 3/16\nP(blue + widow's peak) = 3/16; P(blue + straight) = 1/16",
   questions:[
    {q:"Using a Punnett square, determine the genotype and phenotype ratios for a monohybrid cross between two heterozygous individuals (Aa × Aa). Assume complete dominance.",a:"Aa × Aa: gametes A and a from each parent. Punnett square: AA, Aa, Aa, aa. Genotype ratio: 1 AA : 2 Aa : 1 aa. Phenotype ratio: 3 dominant (A_) : 1 recessive (aa). Probability of homozygous dominant = 25%; heterozygous = 50%; homozygous recessive = 25%.",type:"Syllabus"},
    {q:"In a pedigree, two unaffected parents have one affected son and three unaffected children. Identify the most likely inheritance pattern and justify your answer.",a:"Most likely: autosomal recessive. Justification: (1) Both parents are unaffected but have an affected offspring → both parents must be carriers (heterozygous Aa). (2) Males and females can be equally affected (one affected son, but daughters could also be affected) → autosomal, not X-linked. (3) If X-linked recessive, the carrier mother (X^A X^a) would produce 50% affected sons — the unaffected sons and the affected son are consistent, but the father being unaffected rules out X-linked dominant. Autosomal recessive best fits all data.",type:"HSC"}
   ]},
  {id:"m5.10",title:"DNA Technologies — PCR, Gel Electrophoresis and DNA Profiling",tags:["Syllabus"],
   def:"<b>PCR (Polymerase Chain Reaction)</b>: amplifies specific DNA sequences exponentially. Steps (repeated 30–40 cycles): (1) Denaturation (~95°C): H-bonds break, strands separate. (2) Annealing (~55°C): primers attach to target sequences on each strand. (3) Extension (~72°C): Taq DNA polymerase synthesises new strands from primers. Each cycle doubles the target DNA. Used in: forensics, medical testing (e.g. COVID-19 detection), paternity testing. <b>Gel electrophoresis</b>: separates DNA/protein fragments by size through agarose gel under electric current. Negatively charged DNA migrates toward positive electrode. Smaller fragments travel further. Factors: fragment size, gel concentration, voltage applied. <b>DNA profiling</b>: compares STR (short tandem repeat) patterns — variable-length repeated sequences. PCR amplifies STR regions → gel electrophoresis produces unique banding pattern ('genetic fingerprint'). Used in forensics, paternity testing, conservation genetics, population studies.",
   eqn:"PCR cycle: 95°C (denature) → 55°C (anneal primers) → 72°C (extend) → repeat.\nGel: small fragments → travel far; large fragments → travel short distance.",
   tip:"Taq polymerase (from Thermus aquaticus bacterium) is heat-stable — it survives the 95°C denaturation step. Each PCR cycle doubles the amount of target DNA: after 30 cycles = 2³⁰ = over 1 billion copies from a single template. DNA profiling compares multiple STR loci simultaneously — probability of two unrelated people matching all loci is astronomically low.",
   trap:"PCR does NOT sequence DNA — it amplifies specific regions. DNA sequencing (e.g. Sanger method) determines the actual base order. Gel electrophoresis separates by SIZE only — smaller = further. Two fragments at the same distance on a gel are the same size but may have different sequences. Restriction enzymes cut DNA at specific recognition sequences — the resulting fragments (RFLPs) differ between individuals and are also used in profiling.",
   questions:[
    {q:"Outline the three steps of each PCR cycle and explain why Taq polymerase is used.",a:"(1) Denaturation (~95°C): high temperature breaks hydrogen bonds between base pairs, separating the double-stranded DNA into two template strands. (2) Annealing (~55°C): short single-stranded primers complementary to the target sequence attach (anneal) to each template strand, flanking the region to be amplified. (3) Extension (~72°C): Taq DNA polymerase synthesises a new complementary strand from each primer in the 5'→3' direction. Taq polymerase is used because it is thermostable (isolated from Thermus aquaticus, a hot-spring bacterium) and remains active at the high temperatures needed for denaturation, unlike normal DNA polymerase which would be denatured.",type:"HSC"}
   ]},
  {id:"m5.11",title:"Hardy-Weinberg Principle and Population Genetics",tags:["Syllabus"],
   def:"Hardy-Weinberg (H-W) equilibrium: allele and genotype frequencies in a population remain constant across generations IF five conditions are met: (1) no mutation, (2) no natural selection, (3) no gene flow (no migration), (4) random mating, (5) large population size. <b>Equations</b>: p + q = 1 (allele frequencies, where p = dominant allele A, q = recessive allele a); p² + 2pq + q² = 1 (genotype frequencies: p² = AA, 2pq = Aa, q² = aa). <b>Application</b>: start from q² (frequency of the recessive phenotype; the only genotype you can directly observe) → find q → find p → calculate p² and 2pq. <b>Significance</b>: H-W is the null hypothesis for evolution. If observed frequencies deviate from expected, one or more conditions is violated → evolution is occurring. Used in conservation genetics to detect inbreeding, in disease epidemiology to estimate carrier frequencies, and in population studies.",
   eqn:"p + q = 1  (allele frequencies)\np² + 2pq + q² = 1  (genotype frequencies)\nq² = frequency of homozygous recessive (aa) — what you can observe phenotypically.",
   tip:"Always START from q² (recessive phenotype frequency) — it's the only genotype you can directly count from phenotype data. Then: q = √(q²); p = 1 − q; carrier frequency = 2pq; homozygous dominant = p². Remember: H-W only applies to one gene at a time.",
   trap:"p is NOT the frequency of the dominant allele in affected individuals — it's the frequency in the WHOLE gene pool. Heterozygotes (Aa) are carriers and show the dominant phenotype — don't add them to the recessive class. H-W does NOT apply when any of the five conditions are violated — in real populations, it almost always slightly deviates because evolution is always occurring to some extent.",
   calc:"WORKED EXAMPLE — Hardy-Weinberg\nCystic fibrosis (autosomal recessive) affects 1 in 2500 people.\nq² = 1/2500 = 0.0004\nq = √0.0004 = 0.02\np = 1 − 0.02 = 0.98\nCarrier frequency (2pq) = 2 × 0.98 × 0.02 = 0.0392 → ~3.9% of population are carriers.\nHomozygous dominant (p²) = 0.98² = 0.960",
   questions:[
    {q:"In a population, 9% of individuals are homozygous recessive for an autosomal trait (aa). Using Hardy-Weinberg, calculate the expected frequency of heterozygous carriers.",a:"q² = 0.09, therefore q = √0.09 = 0.3. p = 1 − 0.3 = 0.7. Carrier (Aa) frequency = 2pq = 2 × 0.7 × 0.3 = 0.42. Therefore, 42% of the population are expected to be heterozygous carriers.",type:"HSC"},
    {q:"State the five conditions required for Hardy-Weinberg equilibrium and explain the significance of the principle.",a:"Conditions: (1) No mutation — alleles not altered. (2) No natural selection — all genotypes have equal reproductive fitness. (3) No gene flow — no migration in or out of the population. (4) Random mating — all individuals equally likely to mate with any other. (5) Large population — chance fluctuations (genetic drift) are negligible. Significance: Hardy-Weinberg equilibrium acts as a null hypothesis for evolution. If a population's observed allele/genotype frequencies deviate from H-W expected values, one or more conditions has been violated, indicating that an evolutionary force is acting on the population.",type:"Syllabus"}
   ]}
 ]}
