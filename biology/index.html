,{id:"m6",num:6,title:"Genetic Change",year:12,sub:"Mutations · Mutagens · Biotechnology · Genetic technologies · Biodiversity impacts",
 terms:[
  {topic:"Mutations",items:[["Mutation","A permanent change in the DNA base sequence"],["Mutagen","An agent that increases the rate of mutation by damaging DNA or disrupting replication"],["Point mutation","Change in a single nucleotide base"],["Silent mutation","Base change that does not alter the amino acid coded (due to codon degeneracy)"],["Missense mutation","Base change causing a different amino acid to be incorporated"],["Nonsense mutation","Base change creating a premature stop codon → truncated protein"],["Frameshift mutation","Insertion or deletion of nucleotides shifting the reading frame"],["Chromosomal mutation","Large-scale change to chromosome structure or number"],["Nondisjunction","Failure of chromosomes to separate during meiosis → aneuploidy"],["Aneuploidy","Abnormal chromosome number (e.g. trisomy 21 = Down syndrome)"],["Somatic mutation","Mutation in a body cell; not heritable"],["Germ-line mutation","Mutation in a gamete or gamete-forming cell; heritable; passed to all cells of offspring"],["Coding DNA","DNA sequences transcribed and translated into proteins"],["Non-coding DNA","DNA not translated into protein; includes regulatory regions, introns, repetitive sequences"]]},
  {topic:"Gene Pool Factors",items:[["Natural selection","Differential survival and reproduction based on heritable traits → change in allele frequencies"],["Gene flow","Movement of alleles between populations via migration"],["Genetic drift","Random change in allele frequencies in small populations"],["Bottleneck effect","Severe reduction in population size → loss of alleles by chance"],["Founder effect","Small group colonises new area → reduced gene pool from original population"]]},
  {topic:"Biotechnology",items:[["Genetic engineering","Direct manipulation of an organism's genome using biotechnology"],["Recombinant DNA","DNA molecule formed by joining sequences from different organisms"],["Gene cloning","Producing multiple identical copies of a gene using a vector host"],["GMO","Genetically modified organism — DNA altered by genetic engineering"],["Transgenic organism","Organism containing a gene from another species in its genome"],["Restriction enzyme","Cuts DNA at specific recognition sequences; produces sticky ends or blunt ends"],["Sticky ends","Single-stranded DNA overhangs produced by restriction enzyme cutting; enable complementary joining"],["Plasmid","Small, circular, self-replicating DNA in bacteria; used as a vector in gene cloning"],["Vector","DNA molecule used to transfer a gene of interest into a host cell"],["Transformation","Uptake of foreign DNA (recombinant plasmid) by a host bacterium"],["SCNT","Somatic cell nuclear transfer — nucleus from somatic cell inserted into enucleated egg; basis of whole-organism cloning"],["CRISPR-Cas9","Gene-editing tool using guide RNA to direct Cas9 enzyme to cut specific DNA sequences"],["Artificial insemination","Semen from a selected male inserted into female's reproductive tract without mating"],["Artificial pollination","Manual transfer of pollen from anther to stigma to ensure fertilisation"]]},
  {topic:"Biodiversity",items:[["Genetic diversity","Variation in alleles and genotypes within a species"],["Species diversity","Number and relative abundance of different species in an ecosystem"],["Ecosystem diversity","Variety of different habitats, ecosystems and ecological processes in a region"]]}
 ],
 keyDefs:[
  {term:"Somatic vs germ-line mutation",def:"Somatic: occurs in body cells after fertilisation; not heritable; can cause cancer. Germ-line: occurs in gametes or gamete-producing cells; heritable — passed to all cells of offspring; can cause inherited disorders."},
  {term:"Missense vs nonsense vs silent mutation",def:"Silent: base change, same amino acid (no effect). Missense: base change, different amino acid (may alter protein function). Nonsense: base change creates stop codon → truncated, usually non-functional protein."},
  {term:"Gene cloning",def:"Process of producing multiple copies of a gene by inserting it into a vector (plasmid), transforming a host bacterium, and allowing the bacterium to replicate, copying the gene with each division."},
  {term:"Recombinant DNA",def:"DNA formed by joining sequences from two different organisms using restriction enzymes (to cut) and DNA ligase (to join), resulting in a hybrid DNA molecule."},
  {term:"Genetic drift",def:"Random fluctuations in allele frequencies in a population, most significant in small populations; not driven by selection. Includes bottleneck effect and founder effect."}
 ],
 topics:[
  {id:"m6.1",title:"Point Mutations — Silent, Missense, Nonsense, Frameshift",tags:["Syllabus"],
   def:"<b>Point mutations</b> affect a single nucleotide. <b>Silent (synonymous)</b>: nucleotide changed but the new codon codes for the same amino acid (due to codon degeneracy — multiple codons for one amino acid). No change in protein. <b>Missense</b>: nucleotide changed → different amino acid. Effect on protein depends on location and chemical properties of the new amino acid. If in the active site or key structural region → significant functional change. E.g. sickle cell anaemia: GAG → GTG in haemoglobin gene → Glu replaced by Val → abnormal haemoglobin shape. <b>Nonsense</b>: nucleotide changed → premature stop codon (UAA, UAG, UGA). Translation terminates early → truncated protein, usually non-functional. <b>Frameshift mutations</b> — Insertion: extra nucleotide(s) added → reading frame shifts → all downstream codons changed → usually non-functional protein. Deletion: nucleotide(s) removed → reading frame shifts → similar drastic effect downstream. Frameshifts typically cause much more disruption than point substitutions.",
   eqn:"Normal:   ATG-GAC-TTA → Met-Asp-Leu\nSilent:   ATG-GAT-TTA → Met-Asp-Leu  (GAC/GAT both = Asp)\nMissense: ATG-AAC-TTA → Met-Asn-Leu  (one amino acid changed)\nNonsense: ATG-TAG-TTA → Met-STOP      (premature stop)\nInsertion: ATG-GGA-CTT-A → reading frame shifted downstream",
   tip:"Sickle cell anaemia is the classic missense mutation example — one amino acid change (glutamate → valine) causes haemoglobin to polymerise under low O₂ → sickle-shaped RBCs. Frameshifts are the most disruptive because ALL codons downstream are affected, not just one.",
   trap:"'Silent' does not mean the mutation has no effect on the organism — it means no change in amino acid sequence. Regulatory region mutations can be silent in terms of protein sequence but still alter how much protein is made. Frameshift insertions/deletions of multiples of 3 nucleotides do NOT shift the reading frame — but they do insert/delete amino acids.",
   questions:[
    {q:"Compare the effects of a nonsense mutation and a frameshift insertion on the polypeptide produced.",a:"Nonsense mutation: a single base change creates a premature stop codon in the mRNA. Translation terminates early, producing a truncated polypeptide missing the C-terminal region. The protein is usually non-functional or has reduced function, depending on where the stop codon is introduced. Frameshift insertion: addition of one (or non-multiples of three) nucleotides shifts the reading frame for all codons downstream of the insertion. Every amino acid after the insertion point is changed, and a premature stop codon is likely to be encountered. This typically produces a severely non-functional protein. Both usually result in loss of function, but frameshifts cause more extensive disruption to the amino acid sequence.",type:"HSC"}
   ]},
  {id:"m6.2",title:"Chromosomal Mutations and Nondisjunction",tags:["Syllabus"],
   def:"<b>Chromosomal mutations</b> affect chromosome structure or number. Structural: <b>Deletion</b> — chromosome segment lost (e.g. Cri-du-chat: deletion of chr 5 short arm). <b>Duplication</b> — segment is copied extra times (unequal crossing over). <b>Inversion</b> — segment breaks out and reinserts in reverse orientation. <b>Translocation</b> — segment breaks off and attaches to a non-homologous chromosome (e.g. Philadelphia chromosome in CML: chr 9 + chr 22 translocation → BCR-ABL oncogene). <b>Nondisjunction</b>: failure of chromosomes to separate properly during meiosis → gametes with abnormal chromosome number. <b>In Meiosis I</b>: homologous pairs fail to separate → 2 gametes with extra chromosome, 2 missing one (ALL gametes abnormal). <b>In Meiosis II</b>: sister chromatids fail to separate → 2 normal gametes + 2 abnormal. <b>Examples</b>: Down syndrome (trisomy 21, +1 chr 21); Turner syndrome (monosomy X, XO); Klinefelter syndrome (XXY).",
   eqn:"Meiosis I nondisjunction: gametes = (n+1), (n+1), (n-1), (n-1)\nMeiosis II nondisjunction: gametes = (n+1), (n-1), n, n\nTrisomy 21: 2n+1 = 47 chromosomes → Down syndrome",
   tip:"Distinguish Meiosis I vs II nondisjunction for the exam: Meiosis I — all 4 gametes are abnormal (2 with extra, 2 missing). Meiosis II — only 2 of the 4 gametes are abnormal. Down syndrome is the most common viable trisomy; most other trisomies are lethal in early development.",
   trap:"Nondisjunction does not occur during mitosis affecting the entire organism — if it occurs in meiosis, the resulting zygote will have every cell abnormal. Mitotic nondisjunction in a somatic cell can cause mosaicism (some normal cells, some abnormal) but does not affect the germline.",
   questions:[
    {q:"Distinguish between nondisjunction in Meiosis I and Meiosis II in terms of the gametes produced.",a:"Meiosis I nondisjunction: homologous chromosome pairs fail to separate. Both chromosomes of a pair move to the same pole. Result: all four gametes are abnormal — two gametes contain both homologues (n+1) and two contain neither (n-1). Meiosis II nondisjunction: sister chromatids fail to separate. Result: two gametes are abnormal (one with n+1, one with n-1 chromosomes) and two gametes are normal (n). Meiosis I errors affect more gametes and can lead to conditions such as Down syndrome (trisomy 21) when the abnormal gamete is fertilised.",type:"HSC"}
   ]},
  {id:"m6.3",title:"Mutagens — Types and Mechanisms",tags:["Syllabus"],
   def:"<b>Electromagnetic radiation</b>: UV light — forms thymine dimers (adjacent thymines bond together), blocking replication and transcription; if unrepaired → mutations. X-rays and gamma rays — high energy ionising radiation; causes direct single- and double-strand DNA breaks; can also generate reactive oxygen species (ROS). <b>Chemical mutagens</b>: ROS (reactive oxygen species) — oxidise bases causing mispairing (e.g. 8-oxoguanine pairs with A instead of C). Benzo[a]pyrene (in cigarette smoke) — forms bulky DNA adducts causing replication errors; strongly associated with lung cancer. <b>Naturally occurring mutagens</b>: background radiation (cosmic rays, radon gas), viruses (e.g. HPV inserts viral DNA near proto-oncogenes, increasing cancer risk), bacterial/fungal toxins (e.g. aflatoxin from Aspergillus moulds — potent liver carcinogen; intercalates into DNA).",
   tip:"UV light → thymine dimers → melanoma if skin cells' repair mechanisms are overwhelmed. UV is a Class 1 carcinogen. Australia has highest melanoma rates globally — relevant context for 'evaluate a prevention strategy' in Module 8. HPV as a naturally occurring mutagen links to Module 7 (viral pathogens) and Module 8 (cancer as a non-infectious disease).",
   trap:"Not all mutagens cause cancer directly — they increase the probability of mutations that may affect proto-oncogenes or tumour suppressor genes. A single mutation rarely causes cancer; it requires multiple 'hits'. Mutagens increase RATE of mutation, but mutations can also occur spontaneously during normal DNA replication.",
   questions:[
    {q:"Explain the mechanism by which UV radiation acts as a mutagen.",a:"UV radiation (particularly UV-B, 280–315 nm) is absorbed by adjacent thymine bases on the same DNA strand, causing them to form covalent bonds — creating thymine dimers. These dimers distort the DNA double helix, blocking DNA polymerase during replication and RNA polymerase during transcription. If the dimers are not repaired by nucleotide excision repair mechanisms before cell division, errors in base pairing occur during replication, introducing mutations into the daughter cells. Accumulation of such mutations in key genes (e.g. tumour suppressors) can lead to skin cancer (melanoma).",type:"HSC"}
   ]},
  {id:"m6.4",title:"Somatic vs Germ-line Mutations and Coding vs Non-coding DNA",tags:["Syllabus"],
   def:"<b>Somatic mutations</b>: occur in body cells after fertilisation. NOT heritable (confined to affected tissues). Can cause cancer if they affect proto-oncogenes (mutate to oncogenes → uncontrolled cell division) or tumour suppressor genes (e.g. p53 → loss of cell cycle control). E.g. UV-induced melanoma from somatic mutation in skin cells. <b>Germ-line mutations</b>: occur in gametes or the cells that produce them. <b>Heritable</b> — present in every cell of the offspring. Contribute to genetic variation in populations. Can cause inherited disorders (e.g. cystic fibrosis from CFTR gene mutation; haemophilia from Factor VIII gene mutation). <b>Coding DNA</b>: transcribed and translated into proteins. Mutations here can directly change amino acid sequence. <b>Non-coding DNA</b>: ~98% of human genome. Includes: promoters/enhancers (regulate gene expression), introns, telomeres, centromeres, repetitive sequences (STRs — used in DNA profiling). Mutations in regulatory non-coding regions can alter WHEN and HOW MUCH a gene is expressed, with significant phenotypic effects despite not changing protein structure.",
   tip:"Assess significance of mutation: coding region mutation → may change protein structure/function directly. Non-coding regulatory mutation → may change gene expression levels (e.g. overexpression of a growth gene → cancer). Non-coding intron mutation → usually no effect unless it disrupts splicing signals. Somatic → cancer risk. Germ-line → heritable disorder + contribution to population variation.",
   trap:"Non-coding DNA is NOT 'junk DNA' — this outdated term is scientifically inaccurate. Much non-coding DNA has regulatory functions. A mutation in a non-coding regulatory region can be just as significant as a coding region mutation.",
   questions:[
    {q:"Compare somatic and germ-line mutations in terms of heritability and their effects on organisms and populations.",a:"Somatic mutations: occur in body (non-reproductive) cells during or after development. Not heritable — confined to the affected tissue and its daughter cells; not passed to offspring. Effects: can cause cancer if oncogenes are activated or tumour suppressor genes are inactivated; do not contribute to population-level genetic variation. Germ-line mutations: occur in gametes or gamete-producing cells. Heritable — passed to all cells of offspring via the zygote. Effects: can cause inherited disorders (e.g. cystic fibrosis, haemophilia); do contribute to population genetic diversity and are the raw material for evolution via natural selection.",type:"Syllabus"}
   ]},
  {id:"m6.5",title:"Factors Affecting the Gene Pool",tags:["Syllabus"],
   def:"<b>Mutation</b>: introduces new alleles into the gene pool; the ultimate source of all genetic variation. <b>Natural selection</b>: individuals with favourable alleles survive and reproduce more → beneficial alleles increase, harmful alleles decrease in frequency over generations. <b>Gene flow</b>: movement of alleles between populations via migration of individuals. Increases variation within receiving population; can homogenise previously distinct populations. <b>Genetic drift</b>: random change in allele frequencies not due to selection; most significant in small populations. <b>Bottleneck effect</b>: population drastically reduced (e.g. disease, catastrophe) → surviving individuals carry only a subset of original alleles → reduced genetic diversity. E.g. northern elephant seals (hunted to ~20 individuals; now thousands but very low genetic diversity). <b>Founder effect</b>: small group leaves to establish a new population → takes only a sample of original gene pool → allele frequencies in new population differ from original. E.g. high frequency of certain genetic disorders in Amish community (descended from ~200 founders).",
   eqn:"Gene pool change: Δallele frequency = effect of mutation + selection + gene flow + drift.\nBottleneck: population A (many alleles) → disaster → survivors (few alleles) → recovery (low diversity).",
   tip:"Natural selection is DIRECTIONAL (adapts population to environment); genetic drift is RANDOM (no fitness benefit). Drift is important in small populations; selection dominates in large populations. Conservation biology must consider all these factors — small isolated populations suffer genetic drift AND inbreeding depression.",
   trap:"Genetic drift is NOT natural selection — drift is random and not based on fitness. An allele can be lost by drift even if it is beneficial (just bad luck in a small population). Gene flow is generally considered a homogenising force — it tends to reduce genetic differences between populations.",
   questions:[
    {q:"Explain the bottleneck effect and its consequences for a population's genetic diversity.",a:"The bottleneck effect occurs when a population is severely and rapidly reduced in size by a random event (e.g. disease, natural disaster, hunting). The surviving individuals carry only a fraction of the alleles present in the original population — many alleles are lost simply by chance. When the population recovers in size, it will have reduced genetic diversity compared to the original, because only alleles present in the survivors can be passed on. This reduced diversity lowers the population's ability to adapt to new selection pressures (e.g. new diseases, climate change) and may increase the expression of recessive disorders through inbreeding. Example: northern elephant seals hunted to ~20 individuals in the 19th century — now recovered to thousands, but with very low genetic variation.",type:"HSC"}
   ]},
  {id:"m6.6",title:"Biotechnology — Applications, Artificial Insemination and Pollination",tags:["Syllabus"],
   def:"<b>Levels of biodiversity</b>: Genetic (allele variation within a species), Species (variety of species in an ecosystem), Ecosystem (range of habitats and ecological processes). <b>Artificial insemination (AI)</b>: semen collected from genetically superior male, processed/stored, inserted into female's reproductive tract. One donor can sire thousands of offspring globally. E.g. dairy and beef cattle, horses, endangered species conservation. <b>Artificial pollination (AP)</b>: manual transfer of pollen from anther to stigma. Ensures cross-pollination; enables controlled hybridisation. E.g. vanilla orchid hand-pollination (Melipona bee absent outside Mexico); hybrid seed production in agriculture. Both technologies allow selective breeding acceleration while reducing need for live animal transport. Risks: reduced genetic diversity if few donors used; increased susceptibility to disease if widely used genotype encounters a novel pathogen.",
   tip:"AI + AP both contribute to selective breeding — they give humans control over which alleles are combined. This connects to evaluation questions: benefits (improved traits, disease resistance in crops, increased yields, conservation of endangered species genetics) vs risks (reduced diversity, ethical concerns, corporate seed patents).",
   trap:"AI and AP increase reproductive EFFICIENCY, not genetic diversity — they often reduce it by concentrating particular genotypes. Don't confuse artificial insemination with in vitro fertilisation (IVF) — in AI, fertilisation still occurs inside the female body.",
   questions:[
    {q:"Evaluate the use of artificial insemination in animal agriculture.",a:"AI allows semen from a single genetically superior male to be stored, transported globally, and used to fertilise many females, accelerating selective breeding for desirable traits (milk yield, growth rate, disease resistance). Advantages: rapid genetic improvement of herds; allows use of deceased or geographically distant males; enables conservation of elite genetics; reduces disease transmission risks associated with live animal transport. Limitations: overuse of a small number of sires drastically reduces genetic diversity — if the dominant genotype is susceptible to an emerging pathogen, the entire industry is at risk; welfare concerns regarding collection procedures; concentrates genetic control in large corporations; reduced diversity increases inbreeding depression risk over generations.",type:"HSC"}
   ]},
  {id:"m6.7",title:"Gene Cloning and Recombinant DNA Technology",tags:["Syllabus"],
   def:"<b>Gene cloning</b>: (1) Target gene is cut from donor DNA using restriction enzyme (produces sticky ends). (2) Same restriction enzyme cuts a bacterial plasmid (vector). (3) Target gene and cut plasmid are mixed → complementary sticky ends join (hydrogen bonds). (4) DNA ligase seals the phosphodiester bonds → recombinant plasmid formed. (5) Recombinant plasmid is transformed into host bacteria (heat shock or electroporation). (6) Bacteria grow; plasmid replicated with each cell division → gene cloned. (7) Transformed cells selected using marker genes (e.g. antibiotic resistance — colonies that grow on antibiotic medium contain the plasmid). (8) Target gene is expressed → desired protein produced. Applications: insulin (human insulin gene in E. coli), hepatitis B vaccine antigen, growth hormone, factor VIII (haemophilia treatment). <b>Transgenic organisms</b>: Bt cotton (Bacillus thuringiensis toxin gene → cotton with built-in insect resistance; reduces pesticide use but risks resistance development and gene flow to wild plants). Golden Rice (beta-carotene pathway genes → addresses vitamin A deficiency in developing countries; controversial). GloFish (fluorescent jellyfish gene in zebrafish).",
   eqn:"Restriction enzyme cuts donor DNA → sticky ends.\nSame enzyme cuts plasmid → sticky ends.\nMix → H-bonds form at complementary sticky ends.\nDNA ligase → covalent bonds → recombinant plasmid.\nTransform → select → express.",
   tip:"Sticky ends are crucial — they allow complementary fragments from different organisms to join. If the same restriction enzyme is used on both donor DNA and plasmid, the sticky ends will be complementary and will anneal. If different enzymes are used, blunt-end ligation (less efficient) may be used. Antibiotic resistance marker genes allow scientists to identify which bacterial colonies have taken up the plasmid.",
   trap:"Gene cloning is NOT the same as organism cloning (SCNT). Gene cloning = making copies of a specific gene using bacterial vectors. Organism cloning = producing a whole genetically identical animal (e.g. Dolly the sheep). Restriction enzymes cut at SPECIFIC recognition sequences — they are not random. Blunt ends and sticky ends: sticky ends are preferred because they enhance efficiency of ligation.",
   questions:[
    {q:"Outline the steps involved in producing human insulin using recombinant DNA technology.",a:"(1) The human insulin gene is isolated and cut from human DNA using restriction enzymes that produce sticky ends. (2) A bacterial plasmid is cut with the same restriction enzyme, producing complementary sticky ends. (3) The insulin gene and linearised plasmid are mixed — complementary sticky ends anneal by hydrogen bonding, and DNA ligase seals the joints forming a recombinant plasmid. (4) The recombinant plasmid is introduced into E. coli bacteria via transformation (heat shock). (5) Bacteria are cultured on selective antibiotic medium to identify those that have taken up the plasmid. (6) Transformed bacteria replicate, cloning the insulin gene. (7) The bacteria express the insulin gene, producing human insulin protein, which is extracted, purified and used to treat Type 1 diabetes.",type:"HSC"}
   ]},
  {id:"m6.8",title:"Whole Organism Cloning, CRISPR and Ethics of Biotechnology",tags:["Syllabus"],
   def:"<b>Whole organism cloning (SCNT)</b>: (1) Egg cell is enucleated (nucleus removed). (2) Nucleus from donor somatic cell is inserted into enucleated egg. (3) Cell is stimulated (electric pulse or chemical) to begin division. (4) Embryo develops; implanted into surrogate mother. (5) Clone born — genetically identical to nuclear donor. Effectiveness: very low (~<1% success). Dolly the sheep: 1 success from 277 attempts. Cloned animals often age prematurely, have immune dysfunction, epigenetic abnormalities. <b>CRISPR-Cas9</b>: guide RNA (gRNA) directs Cas9 enzyme to cut both strands at a specific DNA sequence. The cell's repair mechanisms can then delete, replace or insert sequences. More precise, cheaper and faster than previous gene editing tools. Applications: correcting genetic diseases (sickle cell, cystic fibrosis), disease-resistant crops, gene drives for pest control. Concerns: off-target cuts, heritable changes if used in germline, 'designer babies', ecological risks from gene drives. <b>Ethics framework</b>: Benefit/non-harm (does it help? do advantages outweigh risks?); Autonomy (informed consent, freedom of choice); Privacy (genetic information security); Equity (equal access, no discrimination).",
   tip:"For SCNT evaluation: low efficiency + epigenetic problems = not yet reliable for widespread use. For CRISPR evaluation: more precise than older tools but off-target effects remain a concern; germline editing is permanently heritable — ethical implications are profound. Always structure ethics answers around the four principles.",
   trap:"SCNT clones are NOT 100% identical to the donor — mitochondrial DNA comes from the egg cell, not the nucleus donor. Epigenetic marks may also differ. CRISPR does not always work with 100% efficiency — 'off-target' edits at similar (but not identical) sequences are a genuine concern.",
   questions:[
    {q:"Evaluate the effectiveness of whole organism cloning (SCNT) as a reproductive technology.",a:"SCNT involves inserting a somatic cell nucleus into an enucleated egg and stimulating development, producing a clone genetically identical to the nucleus donor. Effectiveness limitations: extremely low success rate (Dolly: 1 success/277 attempts, <1%); cloned animals frequently show premature ageing, immune deficiencies and organ abnormalities — likely due to incomplete reprogramming of epigenetic marks. Potential benefits: preservation of genetics from endangered or extinct species; production of transgenic animals with desirable traits; medical research into disease mechanisms. Conclusion: SCNT is currently too inefficient and produces too many abnormalities for broad application, though it remains a valuable research tool and has limited applications in conservation genetics.",type:"HSC"},
    {q:"Assess the social, economic and cultural influences on the development and use of a named biotechnology.",a:"Technology: GMO crops (e.g. Bt cotton). Social: public distrust of 'unnatural' genetic modification; media sensationalism; concerns about long-term health effects despite scientific consensus on safety; some religious communities reject genetic modification of life. Economic: multinational corporations (Monsanto/Bayer) hold patents on GM seed — farmers must repurchase seed annually, creating economic dependency; yields and reduced pesticide costs can increase farm profitability in the short term; developing nations may benefit from increased food security but face corporate control risks. Cultural: Indigenous communities may object to commercialisation of biological resources without consent; some cultures view genetic modification of food as ethically problematic. Overall: adoption is shaped more by trust, access and economic power than by scientific evidence alone.",type:"HSC"}
   ]}
 ]}

 terms:[
  {topic:"Pathogens & Transmission",items:[["Pathogen","Organism or agent that causes disease"],["Bacteria","Prokaryotic pathogens; cause disease via toxins or direct invasion; treated with antibiotics"],["Virus","Non-cellular pathogen; protein coat + nucleic acid; replicates inside host cells; treated with antivirals"],["Fungi","Eukaryotic pathogens (e.g. Tinea, Candida); treated with antifungals"],["Prion","Misfolded protein; causes chain-reaction misfolding; no nucleic acid (e.g. BSE, CJD)"],["Protist/parasite","Eukaryotic pathogens (e.g. Plasmodium → malaria; Giardia)"],["Direct contact","Transmission via physical contact, sexual contact, droplets, or blood-to-blood"],["Indirect contact","Transmission via contaminated surfaces (fomites) or food/water"],["Vector","Living organism (usually arthropod) that carries pathogen between hosts (e.g. Anopheles mosquito → malaria)"],["Epidemic","Rapid spread of disease affecting many people in a region at the same time"],["Pandemic","Epidemic that spreads globally"]]},
  {topic:"Koch & Pasteur",items:[["Koch's postulates","Four criteria for establishing that a specific microorganism causes a specific disease"],["Pure culture","Growth of a single species of microorganism in isolation from others"],["Pasteurisation","Heat treatment to kill microorganisms in food/drink without full sterilisation"],["Attenuation","Weakening of a pathogen so it can be used as a vaccine without causing disease"]]},
  {topic:"Immune Response",items:[["Antigen","Foreign molecule (usually on pathogen surface) that triggers an immune response"],["Antibody","Y-shaped protein (immunoglobulin) produced by plasma cells; binds specific antigens"],["B lymphocyte","White blood cell responsible for humoral immunity; produces antibodies"],["T lymphocyte","White blood cell responsible for cell-mediated immunity"],["Plasma cell","Differentiated B cell that secretes large quantities of antibody"],["Memory cell","Long-lived lymphocyte formed during primary response; enables faster secondary response"],["Phagocyte","Cell that engulfs and destroys pathogens (e.g. macrophages, neutrophils)"],["Macrophage","Large phagocyte; also acts as an antigen-presenting cell (APC)"],["T-helper cell","CD4+ T cell that activates both B cells and cytotoxic T cells via cytokines"],["Cytotoxic T cell","CD8+ T cell that directly kills infected cells or cancer cells displaying foreign antigens"],["Clonal selection","Process by which a lymphocyte with a complementary receptor is selected and multiplies"],["Humoral immunity","Immunity involving antibodies in the blood; B cell mediated"],["Cell-mediated immunity","Immunity involving direct cell attack; T cell mediated"],["Innate immunity","Non-specific, immediate immune defences (physical barriers + phagocytosis + inflammation)"],["Adaptive immunity","Specific, slower immune response with memory; involves B and T lymphocytes"],["Active immunity","Immune protection from own antibody production (from infection or vaccination)"],["Passive immunity","Immune protection from transferred antibodies (no memory cells formed)"]]},
  {topic:"Prevention & Treatment",items:[["Vaccine","Preparation containing antigen (dead/attenuated/subunit) to stimulate primary immune response + memory"],["Antibiotic","Drug that kills or inhibits bacteria; ineffective against viruses"],["Antiviral","Drug that inhibits virus-specific processes (e.g. Tamiflu inhibits neuraminidase)"],["Quarantine","Isolation of exposed or infected individuals to prevent disease spread"],["Herd immunity","Indirect protection of unvaccinated individuals when most of the population is immune"]]}
 ],
 keyDefs:[
  {term:"Koch's postulates",def:"(1) Microorganism present in all diseased, absent in healthy. (2) Isolated and grown in pure culture. (3) Cultured microorganism causes disease in healthy host. (4) Re-isolated from new host and shown identical to original."},
  {term:"Innate vs adaptive immunity",def:"Innate: non-specific, immediate (physical barriers, phagocytosis, inflammation, fever). Adaptive: specific, slower, has memory; involves B cells (humoral/antibody) and T cells (cell-mediated)."},
  {term:"Primary vs secondary immune response",def:"Primary: first exposure; slow (1–2 weeks to peak); lower antibody titre; creates memory cells. Secondary: re-exposure to same antigen; fast (days); high antibody titre; memory cells enable rapid response."},
  {term:"Active vs passive immunity",def:"Active: own immune system produces antibodies + memory cells (infection or vaccine); slow onset, long-lasting. Passive: pre-formed antibodies transferred (e.g. antivenom, maternal IgG); immediate but short-lived, no memory."}
 ],
 topics:[
  {id:"m7.1",title:"Types of Pathogens",tags:["Syllabus"],
   def:"<b>Bacteria</b>: prokaryotes; cause disease by producing toxins (exotoxins/endotoxins) or directly invading tissues. E.g. Salmonella (food poisoning), Staphylococcus aureus (skin infections). Treated with antibiotics. <b>Viruses</b>: non-cellular (protein coat + nucleic acid); CANNOT reproduce independently — hijack host cell machinery. E.g. influenza, HIV, SARS-CoV-2. Treated with antivirals. <b>Fungi</b>: eukaryotes; mostly cause superficial infections (e.g. Tinea pedis — athlete's foot; Candida albicans — thrush). Treated with antifungals. <b>Prions</b>: misfolded proteins with no nucleic acid; induce misfolding of normal proteins in a chain reaction. E.g. BSE (bovine spongiform encephalopathy/'mad cow disease'), CJD (Creutzfeldt-Jakob disease). No treatment. <b>Protists/Parasites</b>: eukaryotic; complex life cycles; e.g. Plasmodium (malaria — transmitted by Anopheles mosquito), Giardia (contaminated water). Macroparasites: tapeworms, lice.",
   tip:"Viruses are NON-CELLULAR — they are not 'alive' by standard criteria (cannot reproduce or metabolise independently). This is why antibiotics have NO effect on viruses — antibiotics target bacterial structures (cell wall, bacterial ribosomes) that viruses don't have. Prions are unique — no DNA or RNA, just protein.",
   trap:"Don't say antibiotics 'kill viruses' — this is a common exam error. Antibiotics kill bacteria by targeting prokaryote-specific structures. Antivirals target virus-specific enzymes. Fungi are eukaryotes (closer to human cells) — antifungals must target fungal-specific structures to avoid harming the host.",
   questions:[
    {q:"Explain why antibiotics are ineffective against viral infections.",a:"Antibiotics target structures or processes specific to bacterial (prokaryotic) cells — such as the bacterial cell wall (e.g. penicillin inhibits peptidoglycan synthesis), bacterial ribosomes (70S, not 80S), or bacterial DNA replication enzymes. Viruses are non-cellular and lack these structures entirely. They use the host cell's own ribosomes and metabolic machinery to replicate, so antibiotics have no target to act on. Treating a viral infection with antibiotics is ineffective and contributes to antibiotic resistance in bacterial populations.",type:"HSC"}
   ]},
  {id:"m7.2",title:"Disease Transmission",tags:["Syllabus"],
   def:"<b>Direct contact</b>: requires physical contact between infected and susceptible host. Types: skin-to-skin contact (impetigo, ringworm); droplet transmission (<1m; influenza, COVID-19); sexual contact (HIV, chlamydia); blood-to-blood (HIV, hepatitis B via shared needles). <b>Indirect contact</b>: transmission via intermediate. Fomites — contaminated surfaces (norovirus on door handles). Contaminated food/water — Salmonella (undercooked chicken), cholera (contaminated water), E. coli (contaminated produce). <b>Vector transmission</b>: a living organism carries pathogen from one host to another. Biological vector — pathogen completes part of life cycle in vector (e.g. Anopheles mosquito: Plasmodium undergoes sexual reproduction inside mosquito before being transmitted). Mechanical vector — pathogen transported on vector body without development (e.g. housefly carrying Salmonella on legs). Agricultural diseases: Phytophthora cinnamomi (dieback in Australian native plants), citrus canker (Xanthomonas bacteria), Newcastle disease (poultry).",
   tip:"For the exam, know at least two examples per transmission type. Vector-borne diseases require specific control strategies (insecticides, bed nets, eliminating breeding sites) different from direct-contact diseases (hygiene, quarantine, PPE).",
   trap:"Vectors are not necessarily infected by the disease they carry. The Anopheles mosquito is not harmed by Plasmodium. Don't confuse the vector with the reservoir (a host that maintains the pathogen long-term without being harmed).",
   questions:[
    {q:"Distinguish between direct contact, indirect contact and vector transmission of infectious disease with a named example of each.",a:"Direct contact: transmission requires physical contact between infected and susceptible host. Example: influenza transmitted by respiratory droplets when an infected person coughs or sneezes within ~1m of another person. Indirect contact: transmission via a contaminated intermediate object or substance without direct host-to-host contact. Example: Salmonella infection from consuming undercooked chicken contaminated with the bacteria. Vector transmission: a living organism (vector) carries the pathogen from an infected to a susceptible host. Example: malaria — Anopheles mosquito carries Plasmodium, which undergoes part of its life cycle in the mosquito before being injected into a human host during a blood meal.",type:"Syllabus"}
   ]},
  {id:"m7.3",title:"Koch's Postulates and Pasteur's Experiments",tags:["Syllabus"],
   def:"<b>Koch's Postulates</b> (1884): criteria to establish that a specific microorganism causes a specific disease. (1) The microorganism must be found in all diseased organisms but absent in healthy ones. (2) The microorganism must be isolated from the diseased organism and grown in pure culture. (3) The cultured microorganism must cause disease when introduced into a healthy organism. (4) The microorganism must be re-isolated from the newly infected organism and shown to be the same as the original. <b>Limitations</b>: cannot be applied when: pathogen cannot be cultured (e.g. Mycobacterium leprae); ethical constraints prevent deliberate human infection; some pathogens are present asymptomatically; prions have no nucleic acid to identify. <b>Pasteur's contributions</b>: swan-neck flask experiment (1859) disproved spontaneous generation; showed microorganisms cause food spoilage. Developed pasteurisation (heat treatment to kill microbes). Developed early vaccines using attenuated pathogens (chicken cholera, anthrax, rabies) — weakened by repeated culture so they trigger immunity without causing disease.",
   tip:"Koch's postulates are foundational to infectious disease causation — know all 4 steps AND at least 2 limitations. The exam often asks 'evaluate' the postulates, which requires both the contribution and limitations. Pasteur link: his attenuated vaccines directly underpin modern vaccination principles.",
   trap:"Koch used bacterial diseases — his postulates don't work well for viruses (require living host cells to replicate; can't be grown in simple agar cultures). Limitation: some individuals carry and shed pathogens (e.g. typhoid carriers) without showing disease — violates postulate 1 strictly.",
   questions:[
    {q:"Outline Koch's four postulates and evaluate their limitations in modern infectious disease research.",a:"Postulates: (1) The suspected pathogen must be found in all diseased individuals and absent in healthy ones. (2) It must be isolated and grown in pure culture. (3) Introducing the pure culture into a healthy host must cause the same disease. (4) The same microorganism must be re-isolated from the newly diseased host and shown identical to the original. Limitations: cannot apply to pathogens that cannot be cultured outside a living host (e.g. viruses, Mycobacterium leprae); ethical constraints prevent deliberate infection of humans; some pathogens (e.g. Vibrio cholerae) are found in healthy carriers (violating postulate 1); prions contain no nucleic acid, making identification problematic; molecular techniques (PCR, sequencing) now allow identification without culturing, making some postulates unnecessary.",type:"HSC"}
   ]},
  {id:"m7.4",title:"Plant Responses to Pathogens",tags:["Syllabus"],
   def:"Plants lack an adaptive immune system but have layered defences. <b>Passive/structural defences</b>: thick waxy cuticle (prevents entry); bark; stomatal closure (reduces entry of airborne pathogens); cell wall (cellulose barrier). <b>Active chemical responses</b>: when infection is detected, plants produce antimicrobial compounds called <b>phytoalexins</b> (e.g. resveratrol in grapes); pathogenesis-related (PR) proteins (e.g. chitinases that degrade fungal cell walls). <b>Hypersensitive response (HR)</b>: rapid, localised cell death at the infection site — cells deliberately die to isolate the pathogen and deprive it of nutrients. Creates a necrotic lesion. <b>Systemic acquired resistance (SAR)</b>: signalling molecules (salicylic acid) spread through the plant, priming uninfected tissues for faster defence if the pathogen spreads. Named Australian example: Jarrah (Eucalyptus marginata) and Phytophthora cinnamomi — the oomycete water mould causes root rot and dieback; plants produce phytoalexins and HR but susceptible species are overwhelmed, leading to ecosystem-level destruction in south-west Australia.",
   tip:"For HSC extended responses on plant pathogen defences: structure your answer as (1) passive/physical barriers, (2) chemical responses (phytoalexins, PR proteins), (3) HR, (4) SAR. Always name the plant and pathogen if asked for a specific example.",
   trap:"Plant responses are NOT antibody-based — plants do not produce immunoglobulins. Don't describe plant immunity using animal immune system terminology (no B cells, T cells, or lymphocytes). Plant defences are slower and less specific than adaptive mammalian immunity.",
   questions:[
    {q:"Describe the response of a named Australian plant to a named pathogen.",a:"Plant: Jarrah (Eucalyptus marginata). Pathogen: Phytophthora cinnamomi (an oomycete water mould). Response: (1) Physical barriers — bark and root cell walls provide initial resistance to pathogen entry. (2) Chemical response — infected cells produce phytoalexins (antimicrobial compounds) and pathogenesis-related proteins (e.g. chitinases) to inhibit pathogen growth. (3) Hypersensitive response — cells at the infection site undergo rapid programmed cell death, creating a necrotic lesion that limits pathogen spread by depriving it of living tissue. (4) Systemic acquired resistance — salicylic acid signals spread to uninfected tissues, upregulating defence genes. However, in susceptible jarrah populations on poorly drained soils, these defences are overwhelmed, leading to root rot and dieback, with significant ecological consequences for south-west Australian ecosystems.",type:"Syllabus"}
   ]},
  {id:"m7.5",title:"Non-specific (Innate) Immunity",tags:["Syllabus"],
   def:"The innate immune system provides immediate, non-specific defence — it does not distinguish between specific pathogens. <b>First line (external barriers)</b>: intact skin (physical barrier; acidic secretions inhibit growth); mucous membranes (trap pathogens in respiratory/digestive tracts); cilia (sweep mucus and trapped particles up and out of airways); stomach acid (pH 1.5–3.5 kills most ingested pathogens); lysozyme in tears, saliva, mucus (breaks down bacterial cell walls); normal microflora (compete with pathogens for resources). <b>Second line (internal non-specific)</b>: <b>Inflammation</b> — damaged cells release histamine → vasodilation + increased capillary permeability → redness, heat, swelling; more phagocytes recruited. <b>Phagocytosis</b> — neutrophils and macrophages engulf and digest pathogens. <b>Fever</b> — elevated body temperature inhibits pathogen growth, speeds immune cell activity; triggered by pyrogens released by macrophages. <b>Natural killer (NK) cells</b> — lymphocytes that destroy infected cells and tumour cells without antigen specificity. <b>Complement system</b> — plasma proteins activated in a cascade; lyse pathogen membranes, opsonise pathogens (mark them for phagocytosis), and trigger inflammation.",
   tip:"Know both lines of innate defence and at least 3 examples per line. Inflammation is both a defence AND a symptom — it's the tissue's response to damage/infection. Macrophages play a DUAL role: (1) phagocytosis (innate) and (2) antigen presentation to T cells (bridge to adaptive).",
   trap:"Fever is part of the INNATE response — it is non-specific. It is NOT part of the adaptive response. Phagocytes (macrophages, neutrophils) are innate immune cells. Lymphocytes (B and T cells) are adaptive immune cells. Don't confuse them.",
   questions:[
    {q:"Describe two first-line and two second-line defences of the innate immune system.",a:"First-line defences (external barriers): (1) Intact skin — forms a physical barrier preventing pathogen entry; slightly acidic secretions (pH ~5) inhibit microbial growth. (2) Cilia and mucus in the respiratory tract — goblet cells secrete mucus that traps inhaled pathogens; ciliated cells beat rhythmically to sweep mucus toward the throat for expulsion or swallowing. Second-line defences (internal non-specific): (1) Phagocytosis — macrophages and neutrophils engulf and digest pathogens at infection sites via formation of phagosomes; pathogen is destroyed by lysosomal enzymes. (2) Inflammation — damaged cells release histamine, causing vasodilation and increased capillary permeability; this allows more phagocytes, proteins and fluid to enter infected tissue, causing redness, heat, swelling and pain, while recruiting immune cells to the site.",type:"HSC"}
   ]},
  {id:"m7.6",title:"Specific (Adaptive) Immunity — B Cells, T Cells and Clonal Selection",tags:["Syllabus"],
   def:"The adaptive immune system is specific, slower, and has memory. Activated by antigens presented on MHC molecules by antigen-presenting cells (APCs — mainly macrophages). <b>Humoral immunity (B cells)</b>: B lymphocyte with complementary receptor binds antigen → T-helper cell provides co-stimulation → B cell undergoes <b>clonal selection and expansion</b> → differentiates into: (a) Plasma cells (secrete antibodies = immunoglobulins) and (b) Memory B cells. Antibodies are Y-shaped proteins with variable antigen-binding sites; function: neutralise pathogens/toxins, agglutinate pathogens (clumping for phagocytosis), activate complement, opsonise (tag) pathogens. <b>Cell-mediated immunity (T cells)</b>: T-helper cells (CD4+) activated by APCs → release cytokines → activate B cells and cytotoxic T cells. Cytotoxic T cells (CD8+) destroy cells displaying foreign antigens on MHC-I (infected cells, cancer cells) by inducing apoptosis. Both B and T cells produce memory cells for rapid secondary responses.",
   eqn:"Pathogen → antigen presented by APC → T-helper activation → B cell clonal selection → plasma cells + memory B cells → antibodies.\nT-helper → cytotoxic T cell activation → infected cell destruction.",
   tip:"Humoral = antibodies in the blood/fluids (B cells make antibodies — 'B for Bullets'). Cell-mediated = T cells directly attacking infected cells ('T for Troops'). T-helper cells are essential for BOTH branches — loss of T-helpers (as in HIV/AIDS) collapses the entire adaptive immune response.",
   trap:"Antibodies do NOT directly kill pathogens — they mark them for destruction (by phagocytes or complement) or neutralise them. T cells don't produce antibodies. Clonal selection means only the lymphocyte with the matching receptor is selected — NOT that all lymphocytes respond. Memory cells persist for years; plasma cells are short-lived.",
   mnem:"B cells = Bullets (antibodies); T cells = Troops (direct attack). Helper T = the general coordinating both.",
   questions:[
    {q:"Distinguish between humoral and cell-mediated immunity, including the cells and mechanisms involved.",a:"Humoral immunity: mediated by B lymphocytes. When an antigen is presented by an APC and T-helper cells provide co-stimulation, B cells with complementary surface receptors undergo clonal selection and differentiate into plasma cells (which secrete antigen-specific antibodies) and memory B cells. Antibodies circulate in blood and lymph, binding antigens to neutralise, agglutinate or opsonise pathogens for phagocytosis. Cell-mediated immunity: mediated by T lymphocytes. Cytotoxic T cells (CD8+), activated by T-helper cytokines, directly kill cells displaying foreign antigens on their surface (infected cells, tumour cells) by inducing apoptosis. T-helper cells (CD4+) coordinate both branches by releasing cytokines. Both arms produce long-lived memory cells for faster secondary responses.",type:"HSC"}
   ]},
  {id:"m7.7",title:"Primary vs Secondary Immune Response and Vaccination",tags:["Syllabus"],
   def:"<b>Primary response</b>: occurs on first exposure to an antigen. Slow onset (1–2 weeks to peak antibody level); lower antibody titre; mostly IgM class initially. Clonal selection and expansion takes time. Creates memory B and T cells. <b>Secondary response</b>: re-exposure to same antigen. Fast (2–3 days to peak); much higher antibody titre; memory cells rapidly proliferate and differentiate without needing to go through initial activation steps again; longer duration; mostly IgG class. The secondary response typically eliminates the pathogen before symptoms develop. <b>Vaccination</b>: introduces safe antigen (dead/attenuated pathogen, protein subunit, mRNA encoding antigen) → stimulates PRIMARY response and memory cells → if real pathogen encountered, SECONDARY response activates rapidly. Types: live attenuated (MMR, yellow fever), inactivated (flu shot, polio IPV), subunit (hepatitis B, HPV), mRNA (COVID-19 mRNA vaccines — mRNA codes for spike protein antigen).",
   eqn:"Primary: slow (~14 days to peak), low titre, IgM dominant.\nSecondary: fast (~3–5 days), high titre (×10–100 greater), IgG dominant, long duration.",
   tip:"Graph interpretation: know the shape of primary vs secondary response curves — secondary is faster, higher, longer. Vaccination mimics natural primary response without disease. Herd immunity: when enough of a population is immune, chains of transmission break — protecting unvaccinated individuals.",
   trap:"Passive immunity (antivenom, maternal antibodies) provides NO memory — transferred antibodies are degraded over weeks to months. Active immunity (natural infection or vaccine) creates memory. Vaccines may not be 100% effective — they reduce severity and transmission even when breakthrough infections occur.",
   questions:[
    {q:"Explain how vaccination provides long-term protection against infectious disease.",a:"A vaccine introduces a safe form of a pathogen's antigen (dead/attenuated pathogen, isolated protein subunit, or mRNA encoding the antigen) into the body, triggering a primary immune response. B cells undergo clonal selection, differentiating into plasma cells (which produce antibodies) and, crucially, long-lived memory B and T cells specific to that antigen. Because the vaccine form cannot cause disease, no illness results. If the person later encounters the real pathogen, their memory cells mount a rapid, amplified secondary immune response — producing high antibody titres within days before significant infection can establish. The pathogen is eliminated or disease severity is greatly reduced.",type:"HSC"},
    {q:"Compare active and passive immunity in terms of mechanism, speed and duration.",a:"Active immunity: the individual's own immune system produces antibodies and memory cells in response to antigen exposure — either through natural infection or vaccination. Onset is slower (days to weeks) but protection is long-lasting (years to life) due to memory cells. Passive immunity: pre-formed antibodies are transferred to the individual, e.g. maternal IgG via placenta/breast milk, or injected antivenom/immunoglobulin. Protection is immediate but short-lived (weeks to months) because transferred antibodies are degraded and no memory cells are formed.",type:"Syllabus"}
   ]},
  {id:"m7.8",title:"Prevention, Treatment and Control of Infectious Disease",tags:["Syllabus"],
   def:"<b>Hygiene</b>: handwashing, surface disinfection, safe food handling — reduces fomite and direct transmission. <b>Quarantine</b>: isolation of exposed/infected individuals prevents transmission chains; used for highly contagious diseases (COVID-19, Ebola). <b>Vaccination</b>: see m7.7. <b>Public health campaigns</b>: behaviour change at population level (e.g. 'slip, slop, slap' for skin cancer — overlaps with Module 8; 'cover coughs' for respiratory disease). <b>Antibiotics</b>: target bacteria-specific structures (cell wall synthesis — penicillin; protein synthesis — erythromycin; DNA replication — quinolones). Effective only against bacteria. <b>Antibiotic resistance</b>: natural selection — random mutations in bacteria produce resistant variants; antibiotics eliminate susceptible bacteria, resistant variants survive and reproduce. Accelerated by overprescription, incomplete courses, agricultural use. <b>Antivirals</b>: target virus-specific processes. Tamiflu (oseltamivir) — inhibits neuraminidase (prevents viral release from cells). HIV antiretrovirals — inhibit reverse transcriptase (NRTIs), protease (PIs), or integrase. <b>Genetic engineering</b>: recombinant vaccines (hepatitis B surface antigen produced in yeast). <b>Pesticides</b>: targeting vector populations (insecticides for mosquito control in malaria-endemic regions). Aboriginal protocols: recognition of bush medicine practices (e.g. smoke bush in WA — Conospermum species compounds active against HIV; developed with consent and cultural IP protection).",
   tip:"For evaluate questions on disease control strategies, always address: effectiveness, limitations, ethical issues. Antibiotic resistance is a major global concern — link the mechanism (natural selection) back to Module 3/6. Government/WHO epidemiological monitoring is needed to track resistance and restrict antibiotic use.",
   trap:"Antibiotics have NO effect on viruses — prescribing them for viral infections (colds, flu) drives resistance without benefit. Passive immunity (immunoglobulin injection) is a treatment, not a prevention strategy. Quarantine is most effective when the incubation period is known and the disease is detectable before symptoms develop.",
   questions:[
    {q:"Evaluate antibiotics as a treatment strategy for infectious disease, including the problem of resistance.",a:"Antibiotics are highly effective against bacterial infections — they target prokaryote-specific structures (e.g. cell walls, 70S ribosomes) not present in eukaryotic host cells, making them selective. They have dramatically reduced mortality from once-deadly bacterial diseases (pneumonia, tuberculosis). Limitations: completely ineffective against viruses, fungi and prions — misuse in viral infections provides no benefit. Antibiotic resistance is a growing global crisis: mutations conferring resistance arise randomly in bacterial populations; antibiotic use eliminates susceptible bacteria while resistant strains survive and proliferate (natural selection). Overprescription, incomplete treatment courses and agricultural prophylactic use have accelerated resistance. Multi-drug resistant strains (e.g. MRSA, drug-resistant TB) now threaten post-antibiotic era. Effectiveness is thus declining for some pathogens, requiring new drug development and strict prescription controls.",type:"HSC"}
   ]}
 ]}
