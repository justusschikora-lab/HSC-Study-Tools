<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Instagram</title>
<style>
  :root {
    --bg: #000000;
    --panel: #121212;
    --pill: #262626;
    --text: #ffffff;
    --subtext: #a8a8a8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px 6px;
    font-size: 15px;
    font-weight: 600;
    background: var(--bg);
  }
  #status-bar .right { display: flex; align-items: center; gap: 5px; }
  #status-bar svg { display: block; }

  #scroller {
    height: calc(100% - 50px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  #pull-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 0;
    overflow: hidden;
    transition: height 0.15s ease-out;
  }
  #pull-indicator svg {
    width: 22px;
    height: 22px;
    animation: spin 0.7s linear infinite;
    opacity: 0;
    transition: opacity 0.1s;
  }
  #pull-indicator.show svg { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 14px;
  }
  header.topbar .left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header.topbar .username {
    font-size: 19px;
    font-weight: 700;
  }
  header.topbar .icons {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .profile-row {
    display: flex;
    align-items: center;
    padding: 4px 16px 18px;
    gap: 22px;
  }
  .avatar {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    object-fit: cover;
    background: #333 center/cover no-repeat;
    flex-shrink: 0;
  }
  .stats {
    display: flex;
    flex: 1;
    justify-content: space-between;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .stat .label { font-size: 14px; color: var(--text); }

  .name-row {
    padding: 0 16px 14px;
    font-size: 15px;
    font-weight: 700;
  }

  .followed-by {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 16px;
  }
  .followed-by .avatars { display: flex; }
  .followed-by .avatars img {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    margin-left: -10px;
    object-fit: cover;
    background: #333;
  }
  .followed-by .avatars img:first-child { margin-left: 0; }
  .followed-by .text {
    font-size: 13.5px;
    color: var(--subtext);
    line-height: 1.3;
  }
  .followed-by .text b { color: var(--text); font-weight: 600; }

  .action-row {
    display: flex;
    gap: 8px;
    padding: 0 16px 18px;
  }
  .btn {
    flex: 1;
    background: var(--pill);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 9px 0;
    font-size: 14.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn.icon-only {
    flex: 0 0 44px;
  }

  .tab-row {
    display: flex;
    border-top: 1px solid #262626;
  }
  .tab {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 12px 0;
    border-bottom: 2px solid transparent;
  }
  .tab.active { border-bottom: 2px solid var(--text); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 90px;
    gap: 18px;
  }
  .empty-state .camera-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2px solid var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .empty-state .label {
    font-size: 21px;
    font-weight: 700;
  }
</style>
</head>
<body>

<div id="status-bar">
  <span id="clock">9:41</span>
  <div class="right">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="0.5" fill="white"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="white"/><rect x="9" y="3" width="3" height="9" rx="0.5" fill="white"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white"/></svg>
    <span style="font-size:13px;">5G</span>
    <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="white" opacity="0.4"/><rect x="2" y="2" width="14" height="8" rx="1.5" fill="white"/><rect x="22.5" y="4" width="1.5" height="4" rx="1" fill="white" opacity="0.4"/></svg>
  </div>
</div>

<div id="scroller">
  <div id="pull-indicator">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 100"/></svg>

      <span class="username">christian.lorenzo1</span>
    </div>
    <div class="icons">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="white"/></svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.6" fill="white"/><circle cx="12" cy="12" r="1.6" fill="white"/><circle cx="19" cy="12" r="1.6" fill="white"/></svg>
    </div>
  </header>

  <div class="profile-row">
    <div class="avatar" id="avatar" style="background-image:url('avatar.jpg')"></div>
    <div class="stats">
      <div class="stat"><div class="num">0</div><div class="label">posts</div></div>
      <div class="stat"><div class="num">227</div><div class="label">followers</div></div>
      <div class="stat"><div class="num">243</div><div class="label">following</div></div>

  </div>

  <div class="name-row">Christian Lorenzo</div>

  <div class="followed-by">
    <div class="avatars">
      <img src="https://i.pravatar.cc/40?img=12">
      <img src="https://i.pravatar.cc/40?img=33">

    </div>
    <div class="text">Followed by <b>aidan._.bell</b>, <b>aidan_bell2.0</b> and 50 others</div>
  </div>

  <div class="action-row">
    <button class="btn">Edit profile <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="margin-left:2px"><path d="M6 9l6 6 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

  </div>

  <div class="tab-row">
    <div class="tab active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="9.5" y="3" width="6" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="16" y="3" width="5" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="3" y="9.5" width="6" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="9.5" y="9.5" width="6" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="16" y="9.5" width="5" height="6" rx="1" stroke="white" stroke-width="1.6"/><rect x="3" y="16" width="6" height="5" rx="1" stroke="white" stroke-width="1.6"/><rect x="9.5" y="16" width="6" height="5" rx="1" stroke="white" stroke-width="1.6"/><rect x="16" y="16" width="5" height="5" rx="1" stroke="white" stroke-width="1.6"/></svg></div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4l1.5 4.5L18 10l-4.5 1.5L12 16l-1.5-4.5L6 10l4.5-1.5L12 4z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="3" stroke="white" stroke-width="1.6"/></svg></div>

      <svg width="38" height="38" viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 012-2h2l1-1.5h6L16 6h2a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V8z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.5" stroke="white" stroke-width="1.6"/></svg>
    </div>

  </div>
</div>

<script>
  // live clock so the status bar always looks current
  function tick() {
    const d = new Date();
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  tick();
  setInterval(tick, 10000);

  // pull-to-refresh: drag down from the top of the scroller, release past
  // threshold to trigger a spinner then a real reload (like real Instagram)
  const scroller = document.getElementById('scroller');
  const indicator = document.getElementById('pull-indicator');
  const THRESHOLD = 70;
  let startY = null;
  let pulling = false;

  scroller.addEventListener('touchstart', (e) => {
    if (scroller.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  scroller.addEventListener('touchmove', (e) => {
    if (!pulling || startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const dist = Math.min(dy * 0.5, 90);
      indicator.style.height = dist + 'px';
      indicator.classList.toggle('show', dist > 20);
    }
  }, { passive: true });

  scroller.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const dist = parseFloat(indicator.style.height) || 0;
    if (dist > THRESHOLD * 0.5) {
      indicator.style.height = '50px';
      indicator.classList.add('show');
      setTimeout(() => { window.location.reload(); }, 700);
    } else {
      indicator.style.height = '0px';
      indicator.classList.remove('show');
    }
    startY = null;
  });
</script>

</body>
</html>
