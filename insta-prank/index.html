<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Instagram</title>
<style>
  :root {
    --bg: #000000;
    --panel: #121212;
    --pill: #262626;
    --text: #ffffff;
    --subtext: #a8a8a8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #scroller {
    height: calc(100% - 54px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  .highlights-row {
    display: flex;
    gap: 18px;
    padding: 4px 16px 20px;
  }
  .highlight {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .highlight .circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px dashed #555;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .highlight .name {
    font-size: 12px;
    color: var(--text);
  }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-top: 1px solid #262626;
    background: var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav .nav-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #333 center/cover no-repeat;
    border: 1.5px solid var(--text);
  }

  #pull-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 0;
    overflow: hidden;
    transition: height 0.15s ease-out;
  }
  #pull-indicator svg {
    width: 22px;
    height: 22px;
    animation: spin 0.7s linear infinite;
    opacity: 0;
    transition: opacity 0.1s;
  }
  #pull-indicator.show svg { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 14px;
  }
  header.topbar .left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header.topbar .username {
    font-size: 19px;
    font-weight: 700;
  }
  header.topbar .icons {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .profile-row {
    display: flex;
    align-items: center;
    padding: 4px 16px 18px;
    gap: 22px;
  }
  .avatar {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    object-fit: cover;
    background: #333 center/cover no-repeat;
    flex-shrink: 0;
  }
  .stats {
    display: flex;
    flex: 1;
    justify-content: space-between;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .stat .label { font-size: 14px; color: var(--text); }

  .name-row {
    padding: 0 16px 14px;
    font-size: 15px;
    font-weight: 700;
  }

  .followed-by {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 16px;
  }
  .followed-by .avatars { display: flex; }
  .followed-by .avatars img {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    margin-left: -10px;
    object-fit: cover;
    background: #333;
  }
  .followed-by .avatars img:first-child { margin-left: 0; }
  .followed-by .text {
    font-size: 13.5px;
    color: var(--subtext);
    line-height: 1.3;
  }
  .followed-by .text b { color: var(--text); font-weight: 600; }

  .action-row {
    display: flex;
    gap: 8px;
    padding: 0 16px 18px;
  }
  .btn {
    flex: 1;
    background: var(--pill);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 9px 0;
    font-size: 14.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn.icon-only {
    flex: 0 0 44px;
  }

  .tab-row {
    display: flex;
    border-top: 1px solid #262626;
  }
  .tab {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 12px 0;
    border-bottom: 2px solid transparent;
  }
  .tab.active { border-bottom: 2px solid var(--text); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 90px;
    gap: 18px;
  }
  .empty-state .camera-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2px solid var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .empty-state .label {
    font-size: 21px;
    font-weight: 700;
  }
  .empty-state .sublabel {
    font-size: 14px;
    color: var(--subtext);
    margin-top: -10px;
  }
  .empty-state .create-btn {
    background: #0095f6;
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 14.5px;
    font-weight: 600;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="scroller">
  <div id="pull-indicator">

  </div>

      <span class="username">christian.lorenzo1</span>
    </div>
    <div class="icons">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="white"/></svg>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.6" fill="white"/><circle cx="12" cy="12" r="1.6" fill="white"/><circle cx="19" cy="12" r="1.6" fill="white"/></svg>
    </div>
  </header>

  <div class="profile-row">
    <div class="avatar" id="avatar" style="background-image:url('avatar.jpg')"></div>
    <div class="stats">
      <div class="stat"><div class="num">0</div><div class="label">posts</div></div>
      <div class="stat"><div class="num">227</div><div class="label">followers</div></div>
      <div class="stat"><div class="num">243</div><div class="label">following</div></div>
    </div>
  </div>

  <div class="name-row">Christian Lorenzo</div>

  <div class="followed-by">
    <div class="avatars">
      <img src="https://i.pravatar.cc/40?img=12">
      <img src="https://i.pravatar.cc/40?img=33">

    </div>
    <div class="text">Followed by <b>aidan._.bell</b>, <b>zach.pawley</b> and 50 others</div>
  </div>

  <div class="action-row">
    <button class="btn">Edit profile <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="margin-left:2px"><path d="M6 9l6 6 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="btn">Share profile</button>
    <button class="btn icon-only"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" stroke="white" stroke-width="2"/><path d="M20 8v6M17 11h6" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></button>
  </div>

  <div class="highlights-row">
    <div class="highlight">
      <div class="circle"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></div>

    <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M8 4l9 8-9 8V4z" stroke="white" stroke-width="1.6" stroke-linejoin="round" fill="white"/></svg></div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M17 1l4 4-4 4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="white" stroke-width="1.6" stroke-linecap="round"/><path d="M7 23l-4-4 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4l1.5 4.5L18 10l-4.5 1.5L12 16l-1.5-4.5L6 10l4.5-1.5L12 4z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="3" stroke="white" stroke-width="1.6"/></svg></div>

<div class="bottom-nav">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-8 9 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v10h14V10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="white" stroke-width="1.8"/><path d="M9 9l6 3-6 3V9z" fill="white"/></svg>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21 3L11 13M21 3l-7 18-4-8-8-4 19-6z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="white" stroke-width="1.8"/><path d="M21 21l-4.3-4.3" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
  <div class="nav-avatar" style="background-image:url('avatar.jpg')"></div>
</div>

<script>
  // pull-to-refresh: drag down from the top of the scroller, release past
  // threshold to trigger a spinner then a real reload (like real Instagram)
  const scroller = document.getElementById('scroller');
  const indicator = document.getElementById('pull-indicator');
  const THRESHOLD = 70;
  let startY = null;
  let pulling = false;

  scroller.addEventListener('touchstart', (e) => {
    if (scroller.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  scroller.addEventListener('touchmove', (e) => {
    if (!pulling || startY === null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      const dist = Math.min(dy * 0.5, 90);
      indicator.style.height = dist + 'px';
      indicator.classList.toggle('show', dist > 20);
    }
  }, { passive: true });

  scroller.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const dist = parseFloat(indicator.style.height) || 0;
    if (dist > THRESHOLD * 0.5) {
      indicator.style.height = '50px';
      indicator.classList.add('show');
      setTimeout(() => { window.location.reload(); }, 700);
    } else {
      indicator.style.height = '0px';
      indicator.classList.remove('show');
    }
    startY = null;
  });
</script>

</body>
</html>
