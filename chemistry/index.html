<title>HSC Chemistry Y12 — Study Tool</title>
<style>

a{color:var(--accent)}

.box.tip{background:var(--amberb);border-color:var(--amber)} .box.tip .bx-l{color:#fcd34d}
.box.trap{background:var(--redb);border-color:var(--red)} .box.trap .bx-l{color:#fca5a5}

/* flashcard back layouts */
.fc-vs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0}
.fc-vs-col{background:var(--surface2);border-radius:9px;padding:10px 12px;text-align:left}
.fc-vs-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:4px}

textarea.notes{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;resize:vertical;min-height:58px;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#042;border:none;border-radius:9px;padding:9px 15px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}

select,input[type=number],input[type=text]{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:13px}

.chips{display:flex;gap:7px;flex-wrap:wrap}

.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.muted{color:var(--muted)} .accent{color:var(--accent)} .small{font-size:12.5px}

<script>
/* =====================================================================
   HSC CHEMISTRY Y12 STUDY TOOL — vanilla JS, zero dependencies, offline
   Progress + in-app content edits persist to localStorage as an overlay,
   so you can refine in-app and just refresh after the file is updated.
   ===================================================================== */
const LS_KEY="hscchem_progress";
const DEFAULT_STATE={check:{},conf:{},notes:{},examDate:"2026-10-30",quizLog:[],theme:"dark",streak:[],
  edits:{},addedDots:{},addedQ:{},editMode:false,
  quizStats:{},srs:{},history:[],bookmarks:{}};
const TODAY=()=>new Date().toISOString().slice(0,10);
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const addDays=(iso,n)=>{const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)return Object.assign({},JSON.parse(JSON.stringify(DEFAULT_STATE)),s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE));}
let saveT;function save(){state.totalTopics=totalDots();clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(LS_KEY,JSON.stringify(state)),350);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function streakToday(){const d=new Date().toISOString().slice(0,10);if(!state.streak.includes(d)){state.streak.push(d);save();}}

/* ============================ CONTENT ============================ */
/* Each topic: id,title,tags[],def,eqn,tip,trap,mnem,calc,diagram,questions[{q,a,type}] */
const MODULES=[
{id:"m5",num:5,title:"Equilibrium & Acid Reactions",sub:"Static/dynamic equilibrium · Le Chatelier · Keq · solubility",full:true,topics:[
  {id:"m5.1",title:"Static vs Dynamic Equilibrium (incl. the tennis-ball model)",tags:["Syllabus"],
   def:"A <b>reversible reaction</b> can proceed in both forward and reverse directions. <b>Dynamic equilibrium</b> is reached in a CLOSED system when the forward and reverse reactions occur at EQUAL rates, so macroscopic properties (concentration, colour, pressure) stay CONSTANT while change continues at the molecular level. Contrast with <b>static equilibrium</b> (no movement at all, e.g. a book on a table).",
   eqn:"N₂O₄(g) ⇌ 2NO₂(g)   (colourless ⇌ brown)\nrate(forward) = rate(reverse) ,  rate > 0",
   tip:"Tennis-ball model: 5 students each with 5 balls and a ~10 m² zone throw balls IN while collecting and throwing thrown balls back OUT at an equal, constant rate. The NUMBER of balls in the zone stays constant (equilibrium) even though individual balls constantly enter & leave (dynamic). Speed/number per throw doesn't matter as long as in-rate = out-rate. No balls may be lost to the room → models a CLOSED system.",
   trap:"\"Equal rates\" does NOT mean \"equal concentrations\". Reactant and product concentrations are constant at equilibrium but are usually NOT equal. Also: equilibrium requires a CLOSED system — if it's open (gas escapes), equilibrium can't be established.",
   mnem:"<b>C-R-E-C-C</b>: Closed system · Reversible · Equal rates · Constant macroscopic conditions · Continuous molecular change.",
   diagram:"equilibrium",
   questions:[
     {q:"Outline a procedure to model dynamic equilibrium and state the conditions it demonstrates.",a:"Use the tennis-ball model: a group of ~5 students each hold 5 balls in a defined ~10 m² area. Each student continuously throws balls into the area while collecting and re-throwing balls out at an equal rate (in-rate = out-rate). The throw rate per student can differ but must stay constant. Result: the number of balls in the area stays constant (equilibrium reached) while balls continuously move in and out (dynamic). Demonstrates: closed system (no balls lost), reversible process, non-zero rate, constant conditions → dynamic equilibrium.",type:"Syllabus"},
     {q:"Explain why a sealed bottle of NO₂/N₂O₄ reaches a constant brown colour but an open beaker does not.",a:"In a sealed (closed) bottle no gas escapes, so forward and reverse rates can equalise and [NO₂] becomes constant → constant colour (dynamic equilibrium). In an open beaker NO₂ escapes, the reverse reaction is starved of NO₂, the system never reaches equal rates, so no equilibrium is established.",type:"HSC"}
   ]},
  {id:"m5.2",title:"Collision theory, enthalpy & entropy in equilibrium systems",tags:["Syllabus"],
   def:"For a reaction, particles must collide with sufficient energy (≥ activation energy, Eₐ) and correct orientation. <b>Enthalpy (ΔH)</b> is heat change: exothermic ΔH<0 (releases heat), endothermic ΔH>0 (absorbs heat). <b>Entropy (ΔS)</b> is the degree of disorder; systems tend toward higher entropy. Equilibrium position reflects the balance between minimising enthalpy and maximising entropy.",
   eqn:"Exothermic: reactants → products + heat  (ΔH < 0)\nEndothermic: reactants + heat → products  (ΔH > 0)\nΔS > 0 = increased disorder (e.g. fewer→more gas moles, solid→gas)",
   tip:"Treat heat as a 'reagent': for an exothermic forward reaction, write heat on the product side. This makes Le Chatelier temperature predictions easy.",
   trap:"A catalyst lowers Eₐ for BOTH directions equally — it speeds attainment of equilibrium but does NOT change the equilibrium position or Keq.",
   mnem:"ENDO = ENergy enters; EXO = EXits.",
   diagram:"energy",
   questions:[
     {q:"State the effect of a catalyst on the position of equilibrium and on Keq.",a:"None. A catalyst lowers the activation energy of the forward and reverse reactions equally, so it increases the rate at which equilibrium is reached but does not shift the position or change the value of Keq.",type:"Syllabus"}
   ]},
  {id:"m5.3",title:"Le Chatelier's Principle — factors affecting equilibrium",tags:["Syllabus"],
   def:"<b>Le Chatelier's Principle:</b> if a system at equilibrium is disturbed, the system shifts to partially counteract (oppose) the change and restore equilibrium. Factors: concentration, temperature, pressure/volume (gases), and addition of inert gas (no effect at constant volume).",
   eqn:"↑[reactant] → shift RIGHT (toward products)\n↑Temperature → shifts in ENDOthermic direction\n↑Pressure (↓volume) → shifts toward side with FEWER gas moles",
   tip:"Make a table: write the equation, mark ΔH sign, count gas moles each side, then apply each stress. Only TEMPERATURE changes the value of Keq.",
   trap:"Adding an inert gas at CONSTANT VOLUME does nothing (partial pressures unchanged). Changing pressure only matters when the two sides have DIFFERENT numbers of gas moles. Catalysts never shift position.",
   mnem:"\"<b>System opposes the stress</b>\" — add it, it's removed; remove it, it's replaced; heat it, it absorbs heat.",
   questions:[
     {q:"For N₂(g)+3H₂(g) ⇌ 2NH₃(g), ΔH = −92 kJ/mol, predict and explain the effect of (i) increasing pressure (ii) increasing temperature on NH₃ yield.",a:"(i) ↑Pressure shifts toward the side with fewer gas moles (4 mol → 2 mol), i.e. RIGHT, increasing NH₃ yield. (ii) The forward reaction is exothermic, so ↑temperature shifts the system in the endothermic (reverse) direction, decreasing NH₃ yield and decreasing Keq. (This is the yield/temperature trade-off Mr Ford emphasises in the Haber process.)",type:"HSC"},
     {q:"Why does adding argon (inert) to a fixed-volume equilibrium mixture not shift the position?",a:"At constant volume the partial pressures and concentrations of the reacting gases are unchanged, so the reaction quotient Q is unchanged and the system stays at equilibrium — no shift.",type:"Syllabus"}
   ]},
  {id:"m5.4",title:"The equilibrium constant Keq and reaction quotient Q",tags:["Syllabus"],
   def:"For aA+bB ⇌ cC+dD, the <b>equilibrium constant</b> Keq = [C]ᶜ[D]ᵈ / [A]ᵃ[B]ᵇ (products over reactants, each raised to its coefficient). Pure solids and liquids are EXCLUDED. The <b>reaction quotient Q</b> uses the same expression with non-equilibrium concentrations.",
   eqn:"Keq = [C]^c [D]^d / [A]^a [B]^b\nQ < K → shifts right ; Q > K → shifts left ; Q = K → at equilibrium\nKeq depends ONLY on temperature.",
   tip:"Use an ICE table (Initial, Change, Equilibrium). Large Keq (>10³) ⇒ products favoured; small Keq (<10⁻³) ⇒ reactants favoured.",
   trap:"Do NOT include solids or pure liquids (e.g. H₂O(l)) in the expression. Coefficients become POWERS, not multipliers. Keq is unitless at HSC level.",
   calc:"WORKED TEMPLATE — Keq from equilibrium concentrations\nGiven: H₂ + I₂ ⇌ 2HI ; at eqm [H₂]=0.20, [I₂]=0.20, [HI]=1.6 M\nKeq = [HI]² / ([H₂][I₂])\n    = (1.6)² / (0.20 × 0.20)\n    = 2.56 / 0.040\n    = 64  (no units; products strongly favoured)",
   questions:[
     {q:"Write the Keq expression for: 2SO₂(g)+O₂(g) ⇌ 2SO₃(g).",a:"Keq = [SO₃]² / ([SO₂]² [O₂])",type:"Syllabus"},
     {q:"At equilibrium [SO₃]=0.80, [SO₂]=0.20, [O₂]=0.10 M. Calculate Keq.",a:"Keq = (0.80)² / ((0.20)²×0.10) = 0.64 / (0.04×0.10) = 0.64/0.004 = 160.",type:"HSC"}
   ]},
  {id:"m5.5",title:"Solubility equilibria and the solubility product Ksp",tags:["Syllabus"],
   def:"A saturated solution of a sparingly soluble salt is in equilibrium with its undissolved solid. The <b>solubility product Ksp</b> is the equilibrium constant for dissolution. A larger Ksp generally means greater solubility (for salts of the same ion ratio).",
   eqn:"AgCl(s) ⇌ Ag⁺(aq)+Cl⁻(aq) ,  Ksp = [Ag⁺][Cl⁻]\nPbI₂(s) ⇌ Pb²⁺ + 2I⁻ ,  Ksp = [Pb²⁺][I⁻]²\nPredict precipitation: if ionic product Q > Ksp → precipitate forms.",
   tip:"The <b>common ion effect</b>: adding an ion already in the equilibrium (e.g. adding NaCl to AgCl solution) shifts left and DECREASES solubility.",
   trap:"Watch the stoichiometry power: for PbI₂, if solubility = s, then [Pb²⁺]=s and [I⁻]=2s, so Ksp = s(2s)² = 4s³ — not s². Forgetting the '2' and the cube is the classic error.",
   calc:"WORKED TEMPLATE — Ksp → molar solubility\nFor PbI₂, Ksp = 7.1×10⁻⁹. Find molar solubility s.\nLet [Pb²⁺]=s, [I⁻]=2s\nKsp = [Pb²⁺][I⁻]² = s(2s)² = 4s³\n4s³ = 7.1×10⁻⁹\ns³ = 1.775×10⁻⁹\ns = (1.775×10⁻⁹)^(1/3) = 1.21×10⁻³ mol L⁻¹",
   questions:[
     {q:"Will a precipitate form when equal volumes of 0.002 M AgNO₃ and 0.002 M NaCl are mixed? (Ksp AgCl = 1.8×10⁻¹⁰)",a:"On mixing equal volumes each ion is halved: [Ag⁺]=[Cl⁻]=0.001 M. Q = (0.001)(0.001)=1×10⁻⁶. Since Q (1×10⁻⁶) > Ksp (1.8×10⁻¹⁰), a precipitate of AgCl forms.",type:"HSC"}
   ]}
]},
{id:"m6",num:6,title:"Acid/Base Reactions",sub:"Acid-base theories · pH & Kw · titration · standard solutions · buffers",full:true,topics:[
  {id:"m6.1",title:"Properties of acids & bases; types of acids (mono/di/amphiprotic)",tags:["Syllabus"],
   def:"Acids taste sour, conduct electricity, turn litmus red, react with metals/carbonates/bases. Bases feel slippery, turn litmus blue, neutralise acids. <b>Monoprotic acid</b>: donates only ONE proton (H⁺) per molecule (e.g. HCl). <b>Diprotic acid</b>: donates TWO protons per molecule (e.g. H₂SO₄). <b>Amphiprotic substance</b>: can both donate AND accept a proton, acting as Brønsted–Lowry acid OR base depending on environment (e.g. HCO₃⁻, H₂O).",
   eqn:"Acid + base → salt + water:   HCl + NaOH → NaCl + H₂O\nAcid + carbonate → salt + water + CO₂\nAcid + active metal → salt + H₂",
   tip:"Diprotic doesn't mean 'twice as strong' — it means twice as many donatable protons per mole, so neutralisation needs twice the moles of base.",
   trap:"Concentration ≠ strength. A concentrated weak acid can have a higher pH than a dilute strong acid. 'Strong' = degree of ionisation; 'concentrated' = mol per litre.",
   mnem:"AMPHI = 'both' (Greek) → both donates and accepts.",
   questions:[
     {q:"Define monoprotic, diprotic and amphiprotic and give an example of each.",a:"Monoprotic: donates one H⁺ per molecule (HCl). Diprotic: donates two H⁺ per molecule (H₂SO₄). Amphiprotic: can both donate and accept a proton, acting as a Brønsted–Lowry acid or base depending on its environment (HCO₃⁻ or H₂O).",type:"Syllabus"}
   ]},
  {id:"m6.2",title:"Brønsted–Lowry theory & conjugate acid–base pairs",tags:["Syllabus"],
   def:"<b>Brønsted–Lowry:</b> an acid is a proton (H⁺) DONOR; a base is a proton ACCEPTOR. Reactions form <b>conjugate pairs</b> differing by one H⁺. The species history: Arrhenius (H⁺/OH⁻ in water) → Brønsted–Lowry (proton transfer) extended the model to non-aqueous systems.",
   eqn:"HA + B ⇌ A⁻ + HB⁺\nacid  base  conj.base  conj.acid\nExample: NH₃ + H₂O ⇌ NH₄⁺ + OH⁻  (H₂O acts as acid here)",
   tip:"A strong acid has a weak conjugate base, and vice versa. Identify pairs by spotting which species differs by exactly one proton.",
   trap:"Water is amphiprotic — it can be the acid OR the base in different reactions. Don't assume H₂O is always the base.",
   mnem:"<b>BAAD</b>: Base Accepts, Acid Donates.",
   questions:[
     {q:"In HCO₃⁻ + H₂O ⇌ H₂CO₃ + OH⁻, identify each acid, base and conjugate.",a:"HCO₃⁻ accepts a proton → it is the base; H₂O donates a proton → it is the acid. H₂CO₃ is the conjugate acid of HCO₃⁻; OH⁻ is the conjugate base of H₂O.",type:"HSC"}
   ]},
  {id:"m6.3",title:"pH, Kw, and strong vs weak acids",tags:["Syllabus"],
   def:"pH measures hydrogen-ion concentration: pH = −log₁₀[H⁺]. Water self-ionises: Kw = [H⁺][OH⁻] = 1.0×10⁻¹⁴ at 25 °C. A <b>strong</b> acid ionises completely; a <b>weak</b> acid ionises only partially (equilibrium). The acid dissociation constant Ka measures weak-acid strength.",
   eqn:"pH = −log₁₀[H⁺]      [H⁺] = 10^(−pH)\npOH = −log₁₀[OH⁻]    pH + pOH = 14 (at 25 °C)\nKw = [H⁺][OH⁻] = 1.0×10⁻¹⁴",
   tip:"Each whole pH unit = a 10× change in [H⁺]. pH 3 has 100× the [H⁺] of pH 5. Strong vs weak can be distinguished by conductivity, rate of reaction with metals, and pH at equal concentration.",
   trap:"For bases you usually find [OH⁻] first, then use Kw or pOH — don't plug [OH⁻] straight into the pH formula. Also: diluting an acid by 10× changes pH by ~1 unit only for strong acids.",
   calc:"WORKED TEMPLATE — pH of a strong base\nFind pH of 0.010 mol L⁻¹ NaOH.\n[OH⁻] = 0.010 M (strong, fully dissociated)\n[H⁺] = Kw/[OH⁻] = 1.0×10⁻¹⁴ / 0.010 = 1.0×10⁻¹²\npH = −log(1.0×10⁻¹²) = 12.0\n(or: pOH = −log0.010 = 2, pH = 14−2 = 12)",
   diagram:"ph",
   questions:[
     {q:"Calculate the pH of 0.005 mol L⁻¹ HCl.",a:"HCl is a strong monoprotic acid → [H⁺] = 0.005 M. pH = −log(0.005) = 2.30.",type:"Syllabus"},
     {q:"Two acids have the same concentration but acid X has pH 1 and acid Y has pH 3. Explain.",a:"Acid X has a much higher [H⁺] (100× that of Y) at the same concentration, so X ionises to a far greater extent → X is a strong acid and Y is a weak acid (only partially ionised, sitting at equilibrium).",type:"HSC"}
   ]},
  {id:"m6.4",title:"Titration, standard solutions & the 2016 HSC Q28 worked example",tags:["Syllabus"],
   def:"A <b>standard solution</b> has accurately known concentration, prepared from a primary standard (pure, stable, known molar mass — e.g. anhydrous Na₂CO₃) in a <b>volumetric flask</b>. <b>Titration</b> finds an unknown concentration by reacting it with a standard to the <b>equivalence point</b>, signalled by an indicator's <b>end point</b>.",
   eqn:"n = c × V       c(unknown) = n(unknown) / V(unknown)\nNa₂CO₃(aq) + 2HCl(aq) → 2NaCl(aq) + CO₂(g) + H₂O(l)\nTitre = final burette reading − initial reading",
   tip:"Equipment: volumetric flask (standard solution), pipette + pipette filler (aliquot), burette (titrant), conical flask, retort stand & clamp. Rinse pipette/burette with the solution they'll hold; rinse the conical flask with distilled water only. Average only CONCORDANT titres (within 0.10 mL).",
   trap:"Choose the indicator to match the equivalence-point pH: strong acid–strong base → any (bromothymol blue); weak base/strong acid (Na₂CO₃ vs HCl) → equivalence pH is acidic, use methyl orange, NOT phenolphthalein. Don't rinse the conical flask with the solution (changes moles).",
   calc:"WORKED EXAMPLE — 2016 HSC Q28 (8 marks): concentration of unknown HCl\nSTEP A — Make 500 mL of 0.100 mol L⁻¹ Na₂CO₃ standard solution.\n  n = c×V = 0.100 × 0.500 = 0.0500 mol\n  m = n×M = 0.0500 × 105.99 = 5.30 g\n  Weigh 5.30 g dried Na₂CO₃ on a tared balance, dissolve in deionised water in a beaker with a stirring rod, transfer via funnel into a 500 mL volumetric flask (rinse beaker/rod into flask), fill to the calibration mark at eye level using the bottom of the meniscus, stopper and invert to mix.\nSTEP B — Titration.\n  Pipette 25.0 mL of standard Na₂CO₃ into a conical flask; add 2–3 drops methyl orange. Fill a rinsed burette with the unknown HCl to the zero mark (meniscus at eye level). Titrate, slowing to drops near the end point, swirling and rinsing the flask walls, until a permanent colour change. Repeat for concordant titres; average titre = 21.4 mL.\nSTEP C — Calculation.\n  n(Na₂CO₃) = 0.100 × 0.0250 = 2.50×10⁻³ mol\n  mole ratio Na₂CO₃ : HCl = 1 : 2 → n(HCl) = 2 × 2.50×10⁻³ = 5.00×10⁻³ mol\n  c(HCl) = n/V = 5.00×10⁻³ / 0.0214 = 0.234 mol L⁻¹",
   diagram:"titration",
   questions:[
     {q:"Why is the average titre based on repeated trials, and which titres are averaged?",a:"Repeating improves reliability and reduces random error. Only concordant titres (typically within 0.10 mL of each other) are averaged; the rough/trial titre and any outliers are discarded.",type:"HSC"},
     {q:"Why is methyl orange (not phenolphthalein) chosen for titrating Na₂CO₃ against HCl?",a:"The equivalence point of a strong acid with the weak-base carbonate solution is acidic (~pH 4). Methyl orange changes colour in the acidic range (3.1–4.4) so its end point matches the equivalence point; phenolphthalein (8.3–10) would change far too early.",type:"HSC"},
     {q:"Calculate c(HCl) if 25.0 mL of 0.100 M Na₂CO₃ needs an average titre of 21.4 mL HCl.",a:"n(Na₂CO₃)=0.100×0.0250=2.50×10⁻³ mol; ratio 1:2 → n(HCl)=5.00×10⁻³ mol; c=5.00×10⁻³/0.0214=0.234 mol L⁻¹.",type:"HSC"}
   ]},
  {id:"m6.5",title:"Neutralisation enthalpy & buffers",tags:["Syllabus"],
   def:"Neutralisation is exothermic; the molar enthalpy of neutralisation can be found by calorimetry (q=mcΔT). A <b>buffer</b> resists pH change on adding small amounts of acid/base; it contains a weak acid and its conjugate base (or weak base + conjugate acid) in comparable amounts.",
   eqn:"q = mcΔT      ΔH = −q / n   (kJ mol⁻¹)\nBuffer: CH₃COOH ⇌ CH₃COO⁻ + H⁺  (added H⁺ mopped up by CH₃COO⁻; added OH⁻ neutralised by CH₃COOH)",
   tip:"For neutralisation calorimetry, m is the mass of the combined solution (assume density ≈ 1 g mL⁻¹, c ≈ 4.18 J g⁻¹ K⁻¹). ΔH is negative (heat released).",
   trap:"Buffers don't keep pH perfectly constant and have limited capacity — once one component is used up the pH changes sharply. A strong acid + its salt is NOT a buffer.",
   questions:[
     {q:"50.0 mL of 1.0 M HCl is neutralised by 50.0 mL of 1.0 M NaOH; temperature rises 6.8 °C. Calculate ΔH of neutralisation.",a:"q=mcΔT=(100 g)(4.18)(6.8)=2842 J=2.84 kJ. n(H₂O)=n(HCl)=0.0500 mol. ΔH=−q/n=−2.84/0.0500=−56.8 kJ mol⁻¹ (exothermic).",type:"HSC"}
   ]}
]},
{id:"m7",num:7,title:"Organic Chemistry",sub:"Nomenclature · hydrocarbons · IMFs · alcohols · esters/soaps · polymers",full:true,topics:[
  {id:"m7.1",title:"IUPAC nomenclature, the priority list & isomers",tags:["Syllabus"],
   def:"Organic names = (substituent prefixes) + (longest-chain root: meth/eth/prop/but…) + (suffix for the main functional group). Number the chain from the end giving the LOWEST locant to the highest-priority group. <b>Isomers</b> share a molecular formula but differ in arrangement.",
   eqn:"Roots: meth(1) eth(2) prop(3) but(4) pent(5) hex(6)\nSaturation suffix: -ane (single) / -ene (C=C) / -yne (C≡C)\nExamples: propan-2-ol, but-1-ene, 2-chlorobutane",
   tip:"Priority list (highest = main suffix): 1 Alkane → 2 Alkene → 3 Alkyne → 4 Halogens (ALWAYS prefixes: fluoro/chloro/bromo/iodo) → 5 Alcohol / Amine → 6 Carboxylic acid / Amide. The longest chain must contain ALL functional groups. When an –OH is NOT the highest priority it becomes a 'hydroxy' prefix; a lower-priority amine becomes an 'amino' prefix (with locant). 'Iso' goes in front of a branched group's name (isopropyl).",
   trap:"Halogens are named as prefixes but they do NOT outrank alcohols/acids for numbering the suffix. Carboxylic acids/aldehydes sit on chain ENDS (so they get position 1). Aldehyde suffix = -anal. Number to give the suffix the lowest locant, not the prefix.",
   mnem:"Numbering: 'lowest locant to the suffix (main group) wins.'",
   questions:[
     {q:"Give the IUPAC priority order for choosing the principal functional group and state which groups are always prefixes.",a:"Alkane < Alkene < Alkyne < Halogen < Alcohol/Amine < Carboxylic acid/Amide (later = higher priority for the suffix). Halogens are always named as prefixes (chloro-, bromo- etc) regardless of position.",type:"Syllabus"},
     {q:"Name and classify the three structural isomer types, with an example formula.",a:"Chain isomers — same formula, different carbon-chain branching (e.g. C₄H₁₀: butane vs 2-methylpropane). Positional isomers — same functional group in a different position (e.g. C₅H₁₂O: pentan-1-ol vs pentan-2-ol). Functional-group isomers — same formula, different functional group (e.g. C₄H₈O: an aldehyde vs a ketone).",type:"HSC"}
   ]},
  {id:"m7.2",title:"Hydrocarbons: alkanes, alkenes, alkynes & their sources",tags:["Syllabus"],
   def:"<b>Hydrocarbons</b> contain only C and H. Alkanes (saturated, CₙH₂ₙ₊₂) are relatively unreactive (combustion, substitution). Alkenes/alkynes (unsaturated) undergo addition. Sourced from coal (mining) and crude oil (drilling), separated by fractional distillation.",
   eqn:"Alkane CₙH₂ₙ₊₂ · Alkene CₙH₂ₙ · Alkyne CₙH₂ₙ₋₂\nComplete combustion: CₓHᵧ + O₂ → CO₂ + H₂O\nAddition (test): C₂H₄ + Br₂ → C₂H₄Br₂ (decolourises bromine water)",
   tip:"Bromine water test distinguishes saturated from unsaturated: alkenes/alkynes rapidly DECOLOURISE orange bromine water (addition); alkanes do not (only slow substitution in UV).",
   trap:"Environmental/economic/sociocultural implications: combustion → CO₂ (enhanced greenhouse effect), incomplete combustion → CO + soot; oil spills; but hydrocarbons are also cheap feedstock and energy-dense. A balanced answer needs all three dimensions.",
   questions:[
     {q:"Describe a chemical test to distinguish hexane from hex-1-ene.",a:"Add bromine water to each. Hex-1-ene (unsaturated) rapidly decolourises the orange bromine water via an addition reaction; hexane (saturated) does not decolourise it (no reaction in the dark).",type:"Syllabus"},
     {q:"Examine one environmental and one economic implication of using hydrocarbons from the Earth.",a:"Environmental: combustion of fossil hydrocarbons releases CO₂, intensifying the greenhouse effect and contributing to climate change; extraction risks oil spills/habitat damage. Economic: hydrocarbons are an energy-dense, relatively cheap fuel and a feedstock for plastics/chemicals, but reserves are finite and price-volatile, and clean-up/health costs are externalised.",type:"HSC"}
   ]},
  {id:"m7.3",title:"Functional groups, intermolecular forces & physical properties",tags:["Syllabus"],
   def:"Functional groups determine reactivity and the intermolecular forces (IMFs) present, which set boiling point and solubility. IMF strength order: <b>dispersion (DF) < dipole–dipole (DD) < hydrogen bonding (HB)</b> (ion–dipole is strong and case-dependent). Stronger IMFs → higher boiling point and (for polar/H-bonding groups) greater water solubility.",
   eqn:"Boiling point ↑ with: stronger IMFs and larger molecular size (more surface area → more DF).",
   tip:"IMF by functional group (with itself): Alkane/ene/yne → DF only. Halogenated → DD + DF. Alcohols → HB (+DD,DF). Amines → DF + HB. Ketones → DD + DF. Aldehydes → DD + DF. Carboxylic acids → HB + DD + DF. Amides → HB + DD + DF (+ID). HB needs H bonded to N, O or F attracted to a lone pair on N/O/F of another molecule.",
   trap:"Compare boiling points only at similar molar mass — otherwise dispersion forces (size) can outweigh a stronger but smaller IMF. Carboxylic acids H-bond as DIMERS, giving unusually high boiling points.",
   mnem:"IMF ladder (weak→strong): DF → DD → HB; ion–dipole is the wildcard.",
   questions:[
     {q:"Explain why ethanol (C₂H₅OH) has a much higher boiling point than ethane (C₂H₆) of similar size.",a:"Ethane has only weak dispersion forces. Ethanol's –OH group allows hydrogen bonding (H bonded to O attracted to O lone pair on neighbouring molecules), a much stronger IMF, so far more energy is needed to separate the molecules → higher boiling point.",type:"HSC"},
     {q:"List the intermolecular forces present in a pure sample of (i) butanal (ii) butanoic acid.",a:"(i) Butanal (aldehyde): dipole–dipole and dispersion forces. (ii) Butanoic acid (carboxylic acid): hydrogen bonding, dipole–dipole and dispersion forces.",type:"Syllabus"}
   ]},
  {id:"m7.4",title:"Alcohols: production, combustion & reactions",tags:["Syllabus"],
   def:"Alcohols (–OH) are produced by fermentation of sugars or hydration of alkenes. They undergo complete/incomplete combustion (used as fuels), dehydration to alkenes, substitution, and oxidation (primary → aldehyde → carboxylic acid; secondary → ketone).",
   eqn:"Fermentation: C₆H₁₂O₆ →(yeast) 2C₂H₅OH + 2CO₂\nHydration: C₂H₄ + H₂O →(H₃PO₄ cat.) C₂H₅OH\nCombustion: C₂H₅OH + 3O₂ → 2CO₂ + 3H₂O\nOxidation: primary alcohol → aldehyde → carboxylic acid (acidified K₂Cr₂O₇, orange→green)",
   tip:"Heat of combustion measured by calorimetry (spirit burner heating water): q=mcΔT, ΔH=−q/n. Longer-chain alcohols release more energy per mole.",
   trap:"Major sources of error in alcohol combustion practicals: heat loss to surroundings, incomplete combustion (soot), evaporation of alcohol — all make the EXPERIMENTAL ΔH less exothermic (lower magnitude) than the data value.",
   diagram:null,
   questions:[
     {q:"Write the equation for the complete combustion of methanol and outline how its molar heat of combustion is measured.",a:"2CH₃OH + 3O₂ → 2CO₂ + 4H₂O. Method: burn a measured mass of methanol in a spirit burner under a metal can holding a known mass of water; measure ΔT; q=mcΔT (water); ΔH=−q/n(methanol burnt, from mass loss). Compare to the data-book value and account for heat loss.",type:"HSC"}
   ]},
  {id:"m7.5",title:"Esters, esterification & soaps (saponification)",tags:["Syllabus"],

   eqn:"Esterification: RCOOH + R'OH ⇌ RCOOR' + H₂O\nSaponification: fat + 3NaOH → 3 soap (RCOO⁻Na⁺) + glycerol",

   questions:[

  {id:"m7.6",title:"Polymers: addition & condensation",tags:["Syllabus"],
   def:"<b>Addition polymers</b> form from unsaturated monomers (C=C) adding together with no by-product (e.g. polyethylene from ethene). <b>Condensation polymers</b> form by joining monomers with two functional groups, eliminating a small molecule (usually water) each link (e.g. polyesters, nylon).",

/* ============================ GLOSSARY (41) ============================ */
const GLOSSARY=[
 ["Dynamic equilibrium","A state in a closed system where forward and reverse reactions occur at equal, non-zero rates, so macroscopic properties stay constant."],
 ["Reversible reaction","A reaction that can proceed in both forward and reverse directions."],
 ["Closed system","A system that can exchange energy but not matter with its surroundings — required for equilibrium."],
 ["Le Chatelier's Principle","If a system at equilibrium is disturbed, it shifts to partially counteract the change."],
 ["Equilibrium constant (Keq)","Ratio of product to reactant concentrations (each to its coefficient power) at equilibrium; depends only on temperature."],
 ["Reaction quotient (Q)","The Keq expression evaluated at non-equilibrium concentrations; compared to K to predict the shift."],
 ["Solubility product (Ksp)","The equilibrium constant for the dissolution of a sparingly soluble salt."],
 ["Common ion effect","A decrease in solubility caused by adding an ion already present in the solubility equilibrium."],
 ["Enthalpy (ΔH)","The heat change of a reaction at constant pressure; negative = exothermic."],
 ["Entropy (ΔS)","A measure of disorder; systems tend toward higher entropy."],
 ["Activation energy (Eₐ)","The minimum energy colliding particles need to react."],
 ["Catalyst","A substance that lowers activation energy, speeding a reaction without being consumed or changing equilibrium position."],
 ["Exothermic","A reaction that releases heat to the surroundings (ΔH < 0)."],
 ["Endothermic","A reaction that absorbs heat from the surroundings (ΔH > 0)."],
 ["Acid (Brønsted–Lowry)","A proton (H⁺) donor."],
 ["Base (Brønsted–Lowry)","A proton (H⁺) acceptor."],
 ["Conjugate acid–base pair","Two species differing by a single proton (H⁺)."],
 ["Monoprotic acid","An acid that donates only one proton per molecule (e.g. HCl)."],
 ["Diprotic acid","An acid that donates two protons per molecule (e.g. H₂SO₄)."],
 ["Amphiprotic","A species that can both donate and accept a proton (e.g. HCO₃⁻, H₂O)."],
 ["Strong acid","An acid that ionises completely in water."],
 ["Weak acid","An acid that only partially ionises in water (an equilibrium)."],
 ["pH","A measure of acidity: pH = −log₁₀[H⁺]."],
 ["Kw","The self-ionisation constant of water: [H⁺][OH⁻] = 1.0×10⁻¹⁴ at 25 °C."],
 ["Neutralisation","Reaction of an acid with a base to form salt and water; exothermic."],
 ["Standard solution","A solution of accurately known concentration, prepared in a volumetric flask from a primary standard."],
 ["Primary standard","A pure, stable substance of known molar mass used to make a standard solution (e.g. anhydrous Na₂CO₃)."],
 ["Titration","A volumetric technique to find an unknown concentration by reacting it with a standard solution."],
 ["Equivalence point","The point where reactants are present in exact stoichiometric amounts."],
 ["End point","The point where the indicator changes colour, used to estimate the equivalence point."],
 ["Concordant titres","Titres agreeing within ~0.10 mL, which are averaged for reliability."],
 ["Buffer","A solution that resists pH change; a weak acid and its conjugate base (or vice versa)."],
 ["Hydrocarbon","A compound containing only carbon and hydrogen."],
 ["Functional group","An atom or group of atoms that gives a molecule its characteristic chemical properties."],
 ["Isomer","Molecules with the same molecular formula but different structural arrangement."],
 ["Intermolecular force","An attractive force between molecules (dispersion, dipole–dipole, hydrogen bonding, ion–dipole)."],
 ["Hydrogen bonding","A strong dipole attraction when H bonded to N, O or F is attracted to a lone pair on N, O or F."],
 ["Esterification","Condensation of a carboxylic acid and alcohol (acid catalyst) to form an ester and water."],
 ["Saponification","Base hydrolysis of fats/oils to produce soap and glycerol."],
 ["Micelle","A spherical aggregate of soap ions with hydrophobic tails inward and hydrophilic heads outward."],
 ["Addition polymer","A polymer formed from unsaturated monomers with no by-product."],
 ["Condensation polymer","A polymer formed with elimination of a small molecule (usually water) at each linkage."]
];

/* ============================ DRILL GENERATORS (7) ============================ */
const rnd=(a,b,dp=0)=>{const v=a+Math.random()*(b-a);return dp?+v.toFixed(dp):Math.round(v);};
const DRILLS=[
 {id:"ph_from_h",name:"pH from [H⁺]",gen:()=>{const m=rnd(1.1,9.5,2),e=rnd(2,6);const H=m*Math.pow(10,-e);const pH=(-Math.log10(H)).toFixed(2);
   return{prob:`A solution has [H⁺] = ${m}×10⁻${e} mol L⁻¹. Calculate the pH.`,
   sol:`pH = −log₁₀[H⁺]\n   = −log₁₀(${m}×10⁻${e})\n   = ${pH}`};}},
 {id:"h_from_ph",name:"[H⁺] from pH",gen:()=>{const pH=rnd(1.2,12.8,2);const H=Math.pow(10,-pH);
   return{prob:`A solution has pH = ${pH}. Calculate [H⁺] in mol L⁻¹.`,
   sol:`[H⁺] = 10^(−pH)\n     = 10^(−${pH})\n     = ${H.toExponential(2)} mol L⁻¹`};}},
 {id:"dilution",name:"Dilution (c₁V₁=c₂V₂)",gen:()=>{const c1=rnd(0.5,2.5,2),v2=rnd(100,500),c2=rnd(0.05,0.3,3);const v1=(c2*v2/c1);
   return{prob:`What volume of ${c1} mol L⁻¹ stock is needed to make ${v2} mL of ${c2} mol L⁻¹ solution?`,
   sol:`c₁V₁ = c₂V₂\nV₁ = c₂V₂/c₁ = (${c2}×${v2})/${c1}\nV₁ = ${v1.toFixed(1)} mL (then make up to ${v2} mL)`};}},
 {id:"ksp",name:"Ksp → solubility",gen:()=>{const types=[{n:"AgCl",p:1,exp:"s²",solve:k=>Math.sqrt(k)},{n:"PbI₂",p:2,exp:"4s³",solve:k=>Math.cbrt(k/4)}];const t=types[rnd(0,types.length-1)];const m=rnd(1.1,9,1),e=rnd(8,11);const k=m*Math.pow(10,-e);const s=t.solve(k);
   return{prob:`${t.n} has Ksp = ${m}×10⁻${e}. Calculate its molar solubility (mol L⁻¹).`,
   sol:`${t.n} ⇌ ions ; Ksp = ${t.exp}\n${t.exp} = ${m}×10⁻${e}\ns = ${s.toExponential(2)} mol L⁻¹`};}},
 {id:"titration",name:"Titration concentration",gen:()=>{const cs=rnd(0.05,0.25,3),va=rnd(20,25),vt=rnd(15,28,1),ratio=[1,2][rnd(0,1)];const nStd=cs*va/1000;const nUnk=nStd*ratio;const cUnk=nUnk/(vt/1000);
   return{prob:`${va}.0 mL of ${cs} mol L⁻¹ standard reacts with the unknown in a ${ratio===1?'1:1':'1:2 (standard:unknown)'} ratio. Average titre = ${vt} mL. Find the unknown's concentration.`,
   sol:`n(std) = c×V = ${cs}×${(va/1000).toFixed(4)} = ${nStd.toExponential(3)} mol\nn(unknown) = ${ratio}×n(std) = ${nUnk.toExponential(3)} mol\nc = n/V = ${nUnk.toExponential(3)} / ${(vt/1000).toFixed(4)}\nc = ${cUnk.toFixed(3)} mol L⁻¹`};}},
 {id:"calorimetry",name:"Calorimetry (q=mcΔT)",gen:()=>{const m=rnd(50,200),dT=rnd(3,30,1),n=rnd(0.02,0.2,3);const q=m*4.18*dT;const dH=-(q/1000)/n;
   return{prob:`${m} g of water rises ${dT} °C when ${n} mol of fuel/acid reacts. Find q and the molar enthalpy ΔH.`,
   sol:`q = mcΔT = ${m}×4.18×${dT} = ${q.toFixed(0)} J = ${(q/1000).toFixed(2)} kJ\nΔH = −q/n = −${(q/1000).toFixed(2)}/${n}\nΔH = ${dH.toFixed(1)} kJ mol⁻¹`};}},
 {id:"keq",name:"Equilibrium constant Keq",gen:()=>{const A=rnd(0.1,1,2),B=rnd(0.1,1,2),C=rnd(0.2,2,2);const K=(C*C)/(A*B);
   return{prob:`For A + B ⇌ 2C at equilibrium: [A]=${A}, [B]=${B}, [C]=${C} mol L⁻¹. Calculate Keq.`,
   sol:`Keq = [C]² / ([A][B])\n    = (${C})² / (${A}×${B})\n    = ${(C*C).toFixed(3)} / ${(A*B).toFixed(3)}\n    = ${K.toFixed(2)}`};}}
];

/* ============================ CONTENT MERGE HELPERS ============================ */
function moduleById(id){return MODULES.find(m=>m.id===id);}
function addedDotsFor(modId){return (state.addedDots[modId]||[]);}
function allTopics(mod){return mod.topics.concat(addedDotsFor(mod.id));}
function topicById(tid){for(const m of MODULES){const t=allTopics(m).find(x=>x.id===tid);if(t)return{topic:t,mod:m};}return null;}
function field(tid,name,base){const k=tid+":"+name;return (k in state.edits)?state.edits[k]:(base||"");}
function qCount(tid,baseLen){return baseLen+(state.addedQ[tid]||0);}
function allDots(){const out=[];MODULES.forEach(m=>allTopics(m).forEach(t=>out.push({t,m})));return out;}
function totalDots(){return allDots().length;}
function checkedCount(){return allDots().filter(({t})=>state.check[t.id]).length;}
function modProgress(m){const ts=allTopics(m);if(!ts.length)return 0;return Math.round(ts.filter(t=>state.check[t.id]).length/ts.length*100);}
function confOf(tid){return state.conf[tid]||"";}

/* auto weak-spots from quiz accuracy */
function quizAccuracyOf(tid){const s=state.quizStats[tid];if(!s||(s.r+s.w)===0)return null;return s.r/(s.r+s.w);}
function isAutoWeak(tid){const a=quizAccuracyOf(tid);return a!=null&&a<0.5;}     // <50% correct in quizzes
/* effective confidence used for sorting/weak-spots: manual rating wins; else quiz signal */
function effConf(tid){const c=confOf(tid);if(c)return c;if(isAutoWeak(tid))return 'weak';const a=quizAccuracyOf(tid);if(a!=null&&a<0.75)return 'shaky';return '';}

/* readiness score 0-100: blends completion, confidence, quiz accuracy */
function readiness(){const dots=allDots();if(!dots.length)return 0;
  let comp=0,conf=0;dots.forEach(({t})=>{if(state.check[t.id])comp++;const c=effConf(t.id);conf+=(c==='good'||(!c&&state.check[t.id]))?1:c==='shaky'?0.5:c==='weak'?0:0;});
  comp/=dots.length;conf/=dots.length;
  const ql=state.quizLog;const acc=ql.length?ql.reduce((s,q)=>s+q.score/q.total,0)/ql.length:0;
  const qWeight=ql.length?0.25:0;const cWeight=0.35,compWeight=0.40+(ql.length?0:0.25);
  return Math.round((comp*compWeight+conf*cWeight+acc*qWeight)*100);}

/* daily history snapshot (one per day) for progress chart */
function snapshotHistory(){const d=TODAY();const comp=totalDots()?Math.round(checkedCount()/totalDots()*100):0;
  const ql=state.quizLog;const acc=ql.length?Math.round(ql.reduce((s,q)=>s+q.score/q.total,0)/ql.length*100):0;
  const rec={date:d,completion:comp,quiz:acc,readiness:readiness()};
  const last=state.history[state.history.length-1];
  if(last&&last.date===d)state.history[state.history.length-1]=rec;else state.history.push(rec);
  save();}

/* ---- SRS (spaced repetition) ---- */
function srsCards(){const cards=[];allDots().forEach(({t,m})=>{
  const title=stripTags(field(t.id,'title',t.title));
  const defv=stripTags(field(t.id,'def',t.def));
  if(defv)cards.push({id:t.id+'#def',tid:t.id,mod:m.num,front:title,back:defv,kind:'Concept'});
  const base=t.questions||[];const n=qCount(t.id,base.length);
  for(let i=0;i<n;i++){const q=stripTags(field(t.id,'q'+i,base[i]?base[i].q:''));const a=stripTags(field(t.id,'a'+i,base[i]?base[i].a:''));if(q&&a)cards.push({id:t.id+'#q'+i,tid:t.id,mod:m.num,front:q,back:a,kind:'Question'});}
});return cards;}
function srsDue(card){const r=state.srs[card.id];if(!r)return true;return r.due<=TODAY();}
function srsRate(cardId,grade){ // grade: again|hard|good|easy
  const r=state.srs[cardId]||{interval:0,reps:0};let iv;
  if(grade==='again')iv=0; else if(grade==='hard')iv=Math.max(1,Math.round((r.interval||1)*1.2));
  else if(grade==='good')iv=r.interval?Math.round(r.interval*2.3):1; else iv=r.interval?Math.round(r.interval*3.5):3;
  state.srs[cardId]={interval:iv,reps:(r.reps||0)+1,due:addDays(TODAY(),iv),last:TODAY()};save();}
function dueCount(){return srsCards().filter(srsDue).length;}

  const shaky=allDots().filter(({t})=>effConf(t.id)==="shaky");
  const ready=readiness();const due=dueCount();
  const ql=state.quizLog;const lastQ=ql[ql.length-1];
  const avg=ql.length?Math.round(ql.reduce((s,q)=>s+q.score/q.total,0)/ql.length*100):0;
  const days=examDays();
  const modCards=MODULES.map(m=>`<div class="card"><div class="row" style="justify-content:space-between"><b>Module ${m.num}</b><span class="pill">${modProgress(m)}%</span></div>
     <div class="muted small" style="margin:4px 0 8px">${esc(m.title)}</div><div class="bar"><i style="width:${modProgress(m)}%"></i></div></div>`).join('');

function progressChart(){
  const h=state.history.slice(-30);
  if(!h.length)return `<div class="card muted small" style="text-align:center;padding:24px">📈 Progress chart appears after your first study session.</div>`;
  if(h.length<2){const c=h[0];return `<div class="card"><h3 style="margin:0 0 12px">Today's snapshot</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">${[['Readiness',c.readiness],['Completion',c.completion],['Quiz avg',c.quiz]].map(([l,v])=>`<div><div style="font-size:28px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;color:var(--accent)">${v}%</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px">${l}</div></div>`).join('')}</div><div class="muted small" style="margin-top:12px;text-align:center">Progress chart builds after 2+ study days.</div></div>`;}
  const W=720,H=180,pad=34;const n=h.length;const xs=i=>pad+(i/(n-1))*(W-pad-10);const ys=v=>H-pad-(v/100)*(H-pad-14);
  const line=(key,col)=>{let d='';h.forEach((r,i)=>{d+=(i?'L':'M')+xs(i).toFixed(1)+','+ys(r[key]).toFixed(1)+' ';});return `<path d="${d}" fill="none" stroke="${col}" stroke-width="2.5"/>`;};
  const grid=[0,25,50,75,100].map(v=>`<line class="gl" x1="${pad}" y1="${ys(v)}" x2="${W-10}" y2="${ys(v)}"/><text x="6" y="${ys(v)+4}" font-size="10" class="muted">${v}</text>`).join('');
  return `<div class="card"><div class="row" style="justify-content:space-between"><h3 style="margin:0">Progress over time</h3>

}

/* --- pretty-format box content --- */
function prettyBox(raw,cls){
  if(!raw)return'';
  const ROW=(label,content)=>`<div class="prow"><span class="plbl">${label}</span><span class="pval">${content}</span></div>`;
  const BULLET=t=>`<div class="pbul"><span class="pbul-dot">▸</span><span>${t}</span></div>`;
  if(cls==='calc'){
    const lines=raw.split('\n').filter(l=>l.trim());
    if(lines.length<2)return`<div class="pval" style="white-space:pre-wrap">${esc(raw)}</div>`;
    return`<div class="psteps">`+lines.map((l,i)=>`<div class="pstep"><span class="pstep-n">${i+1}</span><span>${esc(l)}</span></div>`).join('')+`</div>`;}
  if(cls==='eqn'){
    const lines=raw.split('\n').filter(l=>l.trim());
    if(lines.length<2)return`<div class="pval">${raw}</div>`;
    return lines.map(l=>{const m=l.match(/^([^:]+):\s+(.+)/);return m?ROW(m[1],m[2]):BULLET(l);}).join('');}
  let segments=raw.includes('\n')?raw.split('\n').filter(l=>l.trim()):[raw];
  segments=segments.flatMap(seg=>seg.split(/\.\s+(?=<b>)/).filter(s=>s.trim()));
  return segments.map(seg=>{
    const lm=seg.match(/^<b>([^<]{1,50})<\/b>\s*[:—–\-]?\s*([\s\S]+)/);
    if(lm)return ROW(lm[1],lm[2]);
    const clean=seg.replace(/^\.\s*/,'').trim();
    if(!clean)return'';
    return BULLET(clean);
  }).join('');}

function box(tid,cls,label,name,base,editable){

    body=`<div>${prettyBox(txt,cls)}</div>`;}
  return `<div class="box ${cls}${editable?' editing':''}"><span class="bx-l">${label}</span>${body}</div>`;
}

function noOx(t){return t.replace(/,\s+(and|or)(\s)/gi,' $1$2');}
function stripEg(t){return t.replace(/\s*\([^)]{1,80}\)/g,'').replace(/[\s,]+(e\.g\.|for example|such as|including|like)[^;.,]*/gi,'').trim().replace(/[,;]\s*$/,'');}
function shortCrit(t){let s=stripEg(t);const w=s.split(' ');if(w.length>22)s=w.slice(0,22).join(' ')+'…';return noOx(s);}
function sampleAns(t){const sents=t.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>5);const out=sents.slice(0,3).join('. ');return noOx(out.endsWith('.')?out:out+'.');}
function parseCriteria(ans,marks){
  const numbered=ans.split(/\s*\(\d+\)\s+/).filter(s=>s.trim().length>8);
  if(numbered.length>=marks)return numbered.slice(0,marks).map(t=>t.replace(/\.$/,'').trim());
  const semis=ans.split(/;\s+/).filter(s=>s.trim().length>8);
  if(semis.length>=marks)return semis.slice(0,marks).map(t=>t.replace(/\.$/,'').trim());
  const sents=ans.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>8);
  if(sents.length>=marks)return sents.slice(0,marks).map(t=>t.trim());
  const words=ans.split(' ');const chunk=Math.ceil(words.length/marks);
  return Array.from({length:marks},(_,i)=>words.slice(i*chunk,(i+1)*chunk).join(' ')).filter(Boolean);}
function gatherQuestions(modIds){
  const out=[];
  MODULES.filter(m=>modIds.includes(m.id)).forEach(m=>{allTopics(m).forEach(t=>{const base=t.questions||[];const n=qCount(t.id,base.length);for(let i=0;i<n;i++){const bq=base[i];const q=field(t.id,'q'+i,bq?bq.q:'');const a=field(t.id,'a'+i,bq?bq.a:'');if(q&&a)out.push({q,a,type:bq?bq.type:'Custom',mod:m.num,tid:t.id,marks:bq&&bq.marks?bq.marks:1,qtype:bq&&bq.qtype?bq.qtype:'short',part:bq&&bq.part?bq.part:'',choices:bq?bq.choices||null:null,correct:bq&&bq.correct!=null?bq.correct:null});}});});
  MC_BANK.filter(q=>modIds.some(id=>{const m=moduleById(id);return m&&m.num===q.mod;})).forEach(q=>out.push(q));
  return out;
}

/* ---------- FLASHCARD FORMATTER ---------- */
function fcFormat(card){
  const raw=(card.back||'').trim();
  const front=(card.front||'');
  const fl=front.toLowerCase();
  const be=s=>{const t=(s||'').replace(/^[•▸\-–\s]+/,'').trim();return t?`<div class="fc-bul"><span class="fc-bd">▸</span><span>${esc(t)}</span></div>`:''};
  const buls=arr=>arr.filter(s=>(s||'').trim().length>3).map(be).join('');
  const sideItems=t=>{
    const c=t.replace(/^[A-Z][a-zA-Z\s\-]+:\s+/,'');
    const dotIdx=c.search(/\.\s+[A-Z]/);
    const first=dotIdx>0?c.slice(0,dotIdx):c;
    return first.split(/;\s+/).map(s=>s.replace(/\.$/,'').trim()).filter(s=>s.length>3).slice(0,3);
  };
  // 1. VS comparison (front has exactly one " vs ")
  const vi=fl.indexOf(' vs ');
  if(vi>=0&&!fl.slice(vi+4).includes(' vs ')){
    const lblA=front.slice(0,vi).trim(), lblB=front.slice(vi+4).trim();
    const keyB=lblB.split(/[\s(]/)[0].replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const sm=raw.match(new RegExp('\\.\\s+(?='+keyB+'[a-z]*[\\s:,])','i'));
    if(sm){
      const idx=raw.indexOf(sm[0]);
      const tA=raw.slice(0,idx),tB=raw.slice(idx+sm[0].length);
      const sA=sideItems(tA),sB=sideItems(tB);
      return `<div class="fc-vs"><div class="fc-vs-col"><div class="fc-vs-hd">${esc(lblA)}</div>${buls(sA)}</div><div class="fc-vs-col"><div class="fc-vs-hd">${esc(lblB)}</div>${buls(sB)}</div></div>`;
    }
  }
  // 2. Labeled types: "Label: text. Label2: text2." — ≥3 parts
  const typeParts=raw.split(/\.\s+(?=[A-Z][a-zA-Z \/\-]{1,30}: )/);
  if(typeParts.length>=3){
    const rows=typeParts.filter(p=>p.trim().length>3).map(p=>{
      const m=p.match(/^([A-Z][a-zA-Z \/\-\(\)]{0,35}?):\s+([\s\S]+)/);
      return m?`<div class="fc-row"><span class="fc-rl">${esc(m[1].trim())}</span><span class="fc-rv">${esc(m[2].replace(/\.$/,'').trim())}</span></div>`:be(p);
    }).join('');
    if(rows)return rows;
  }
  // 3. Numbered: (1) ... (2) ...
  if(/\(1\)/.test(raw)){
    const nParts=raw.split(/\([1-9]\)\s*/).filter(p=>p.trim().length>3);
    if(nParts.length>=2)return nParts.map((p,i)=>`<div class="fc-step"><span class="fc-sn">${i+1}</span><span>${esc(p.replace(/\.$/,'').trim())}</span></div>`).join('');
  }
  // 4. Semicolons ≥3
  const semParts=raw.split(/;\s+/);
  if(semParts.length>=3)return buls(semParts);
  // 5. Sentence bullets ≥3
  const sentParts=raw.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>8);
  if(sentParts.length>=3)return buls(sentParts.slice(0,5));
  // 6. Default
  return `<div class="fc-def">${esc(raw)}</div>`;
}

let fc={deck:null,i:0,flipped:false,scope:"due",mod:"all"};

  if(fc.scope==="due")cards=cards.filter(srsDue);
  // due/new first, then by soonest due
  cards.sort((a,b)=>{const ra=state.srs[a.id],rb=state.srs[b.id];const da=ra?ra.due:'0000',db=rb?rb.due:'0000';return da<db?-1:da>db?1:0;});
  return cards;}

  else if(el.dataset.ptmode){ptMode=(ptMode===el.dataset.ptmode?null:el.dataset.ptmode);render();drawPeriodic();}
  // periodic element
  else if(el.dataset.z){const z=+el.dataset.z;const r=PTABLE.find(p=>p[0]===z);if(r&&r[6]){const d=r[6];const info=document.getElementById('ptInfo');if(info){let h=`<b class="accent" style="font-size:15px">${r[1]} — ${esc(r[2])}</b><br/><div class="small muted" style="margin:6px 0 10px"><span class="pill">Z=${r[0]}</span><span class="pill">A=${r[3]}</span><span class="pill">Group ${r[4]}</span><span class="pill">Period ${r[5]}</span></div>`;h+=`<div class="kv"><span>Electronegativity (Pauling)</span><span class="accent">${d.en!=null?d.en.toFixed(2):'N/A'}</span></div>`;h+=`<div class="kv"><span>Electron configuration</span><span class="small">${esc(d.config)}</span></div>`;h+=`<div class="kv"><span>State (room temp)</span><span>${esc(d.state)}</span></div>`;h+=`<div class="kv"><span>Common oxidation states</span><span>${esc(d.ox)}</span></div>`;h+=`<div class="kv"><span>1st ionisation energy</span><span>${IE_DATA[z]!=null?IE_DATA[z]+' kJ mol⁻¹':'N/A'}</span></div>`;h+=`<div class="kv"><span>Electrical conductivity</span><span>${COND_DATA[z]!=null?COND_LABEL[COND_DATA[z]]:'Unknown'}</span></div>`;info.innerHTML=h;}}}
});

function startQuiz(){
  let all=gatherQuestions(quiz.sel);
  if(quiz.qtype&&quiz.qtype!=='all')all=all.filter(q=>(q.qtype||'short')===quiz.qtype);
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  quiz.items=all.slice(0,Math.min(quiz.len,all.length));
  quiz.i=0;quiz.marksEarned=0;quiz.marksAvail=quiz.items.reduce((s,q)=>s+(q.marks||1),0);
  quiz.answered=0;quiz.revealed=false;quiz.userAnswer='';quiz.mcSelected=null;
  quiz.active=true;quiz.done=false;streakToday();render();}
function finishQuiz(){quiz.active=false;quiz.done=true;state.quizLog.push({date:new Date().toISOString().slice(0,10),score:quiz.marksEarned,total:quiz.marksAvail,mods:quiz.sel.map(m=>moduleById(m).num).join(',')});save();}

/* ============================ INPUT EVENTS ============================ */
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.note!=null){state.notes[t.dataset.note]=t.value;save();}
  else if(t.id==='quizAnswer'){if(quiz)quiz.userAnswer=t.value;}
  else if(t.id==='quizLen'){if(!quiz)quiz={sel:MODULES.map(m=>m.id),len:10,qtype:'all'};quiz.len=+t.value;}
  else if(t.id==='drillType'){drill.type=t.value;drill.current=DRILLS.find(d=>d.id===drill.type).gen();drill.revealed=false;render();}
  else if(t.id==='glossSearch'){glossFilter=t.value.toLowerCase();filterGloss();}
  else if(t.id==='examDate'){state.examDate=t.value;save();refreshCountdown();render();}
  else if(t.id==='globalSearch'){doSearch(t.value);}
});
document.addEventListener('change',e=>{const t=e.target;if(t.dataset.check!=null){state.check[t.dataset.check]=t.checked;save();streakToday();buildNav();}});
// save contenteditable edits on blur
document.addEventListener('focusout',e=>{const el=e.target;if(el.dataset&&el.dataset.ek){const key=el.dataset.ek;const name=key.split(':').slice(1).join(':');const useHTML=['def','eqn','tip','trap','mnem'].includes(name);let val=useHTML?el.innerHTML.trim():el.innerText.trim();val=val.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/\son\w+="[^"]*"/gi,'');if(val==='(empty — click to add)'||val==='(question)'||val==='(answer)')val='';state.edits[key]=val;save();SEARCH_IDX=null;buildNav();}});
/* undo: store original value on focus, restore on Escape */
document.addEventListener('focusin',e=>{const el=e.target;if(el.isContentEditable&&el.dataset&&el.dataset.ek)el.dataset.origVal=el.innerHTML;});
document.addEventListener('keydown',e=>{
  /* Escape = revert contenteditable edit */
  if(e.key==='Escape'&&e.target.isContentEditable&&e.target.dataset&&e.target.dataset.ek){e.target.innerHTML=e.target.dataset.origVal||'';e.target.blur();e.preventDefault();return;}
  /* Flashcard keyboard shortcuts */
  if(CURRENT!=='flashcards')return;
  if(e.target.isContentEditable||['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if((e.key===' '||e.key==='Enter')&&fc.deck&&fc.deck.length){e.preventDefault();if(!fc.flipped){fc.flipped=true;render();}return;}
  if(fc.flipped&&fc.deck&&fc.deck.length){const grades={1:'again',2:'hard',3:'good',4:'easy'};const grade=grades[+e.key];if(grade){const c=fc.deck[Math.min(fc.i,fc.deck.length-1)];srsRate(c.id,grade);streakToday();if(grade==='again')fc.deck.push(c);fc.i++;fc.flipped=false;if(fc.i>=fc.deck.length){fc.deck=buildDeck();fc.i=0;}buildNav();render();}}
});

document.getElementById('themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';save();applyTheme();};
document.getElementById('ioBtn').onclick=openIO;
document.addEventListener('click',e=>{if(!e.target.closest('.search')){document.getElementById('searchRes').classList.add('hidden');}});

/* ============================ INIT ============================ */
/* sync theme from dashboard (white→light, everything else→dark) */
(function syncThemeDash(){try{const d=JSON.parse(localStorage.getItem('hsc_dash_v2'));if(d&&d.theme){const t=d.theme==='white'?'light':'dark';if(t!==state.theme){state.theme=t;save();}}}catch(e){}}());
applyTheme();refreshCountdown();buildNav();render();streakToday();snapshotHistory();
</script>
<div id="ft" style="position:fixed;bottom:18px;right:18px;z-index:9999;background:rgba(10,10,20,.92);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.4);cursor:pointer" onclick="window.location='../index.html'" title="Back to Dashboard">
  <div id="ft-dot" style="width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0;transition:background .3s"></div>
  <div style="display:flex;flex-direction:column;gap:2px">
    <div id="ft-time" style="font-size:15px;font-weight:700;font-family:'Bricolage Grotesque',system-ui,sans-serif;color:#f0f0ff;letter-spacing:-.02em;line-height:1">00:00:00</div>
    <div id="ft-sub" style="font-size:10px;color:rgba(240,240,255,.4);line-height:1">← Dashboard</div>
  </div>
</div>
<script>
(function(){
  const TK='hsc_timer_v2';
  const COLORS={eng:'#a855f7',math:'#3b82f6',bio:'#22c55e',chem:'#f59e0b',ger:'#e8a020'};
  const NAMES={eng:'English',math:'Maths',bio:'Biology',chem:'Chemistry',ger:'German'};
  function fmt(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');}
  function tick(){
    let ts;try{ts=JSON.parse(localStorage.getItem(TK));}catch(e){return;}
    if(!ts)return;
    const dot=document.getElementById('ft-dot');
    const timeEl=document.getElementById('ft-time');
    const subEl=document.getElementById('ft-sub');
    if(!timeEl)return;
    const c=COLORS[ts.subject]||'#f59e0b';
    dot.style.background=c;
    if(ts.running){
      dot.style.boxShadow='0 0 7px '+c;
      const sec=ts.elapsed+Math.floor((Date.now()-ts.startedAt)/1000);
      timeEl.style.color=c;
      timeEl.textContent=fmt(sec);
      subEl.textContent=(NAMES[ts.subject]||'Timer')+' running ← Dashboard';
    } else if(ts.elapsed>0){
      dot.style.boxShadow='none';
      timeEl.style.color='rgba(240,240,255,.55)';
      timeEl.textContent=fmt(ts.elapsed);
      subEl.textContent=(NAMES[ts.subject]||'Timer')+' paused ← Dashboard';
    } else {
      dot.style.boxShadow='none';
      timeEl.style.color='rgba(240,240,255,.3)';
      timeEl.textContent='00:00:00';
      subEl.textContent='← Dashboard';
    }
  }
  tick();setInterval(tick,1000);
})();
</script>
