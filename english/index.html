<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HSC English Advanced Y12 — Study Tool</title>
<style>
:root{
  --bg:#09080f;--surface:#120f1a;--surface2:#1a1626;--accent:#a855f7;--accent2:#9333ea;
  --text:#ede8f5;--muted:#8a7a9e;--line:#251d35;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --blueb:#0e1836;--greenb:#0e2a14;--amberb:#2c2210;--redb:#2c1414;--purpleb:#1e1131;
}
html[data-theme="light"]{
  --bg:#f5f0ff;--surface:#ffffff;--surface2:#ede8f7;--accent:#9333ea;--accent2:#7c3aed;
  --text:#1a0f2e;--muted:#5a4a7a;--line:#d8cef0;
  --blueb:#e6f0fb;--greenb:#e7f7ec;--amberb:#fdf3e1;--redb:#fbe9e9;--purpleb:#f0e8fb;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.55}
h1,h2,h3,h4,.brand{font-family:"Bricolage Grotesque","IBM Plex Sans",system-ui,sans-serif;font-weight:700;letter-spacing:-.01em}
a{color:var(--accent)}
.app{display:flex;min-height:100vh}
.sidebar{width:252px;background:var(--surface);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow-y:auto;flex-shrink:0}
.brand{font-size:18px;display:flex;align-items:center;gap:8px}
.brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:0}
.search input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px}
.search input:focus{outline:none;border-color:var(--accent)}
.navlist{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.navbtn{display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--muted);text-align:left;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit;width:100%;transition:.12s}
.navbtn .ic{width:18px;text-align:center;font-size:12px;flex-shrink:0}
.navbtn:hover{background:var(--surface2);color:var(--text)}
.navbtn.active{background:linear-gradient(90deg,rgba(168,85,247,.15),transparent);color:var(--accent);font-weight:600}
.navbtn.sub{padding-left:28px;font-size:12px}
.nav-sep{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 11px 2px;opacity:.6}
.exampill{margin-top:auto;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px}
.exampill label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.exampill .cd{font-size:22px;font-weight:700;color:var(--accent);font-family:"Bricolage Grotesque",sans-serif}
.exampill input{width:100%;margin-top:7px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:5px 7px;font-size:12px}
.sb-foot{display:flex;gap:6px;flex-wrap:wrap}
.sb-foot button{flex:1;font-size:11px;padding:6px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer;min-width:60px}
.sb-foot button:hover{color:var(--text);border-color:var(--accent)}
.main{flex:1;min-width:0;padding:26px 32px 90px;max-width:1100px}
.page-head{margin-bottom:18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.page-head h1{font-size:27px;margin:0 0 4px}.page-head p{color:var(--muted);margin:0;font-size:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.stat{display:flex;flex-direction:column;gap:6px}
.stat .big{font-size:30px;font-weight:700;font-family:"Bricolage Grotesque",sans-serif}
.stat .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.bar{height:9px;background:var(--surface2);border-radius:20px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px;transition:width .4s}
/* tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab{font-size:13px;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:inherit}
.tab.on{background:rgba(168,85,247,.15);color:var(--accent);border-color:var(--accent)}
/* note blocks */
.block{border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13.5px;border-left:3px solid}
.block .bl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;display:block;margin-bottom:5px;opacity:.9}
.block.intro{background:var(--purpleb);border-color:var(--purple)}.block.intro .bl{color:#d8b4fe}
.block.body1{background:var(--blueb);border-color:var(--blue)}.block.body1 .bl{color:#93c5fd}
.block.body2{background:var(--greenb);border-color:var(--green)}.block.body2 .bl{color:#86efac}
.block.body3{background:var(--amberb);border-color:var(--amber)}.block.body3 .bl{color:#fcd34d}
.block.conc{background:var(--redb);border-color:var(--red)}.block.conc .bl{color:#fca5a5}
.block.tip{background:var(--amberb);border-color:var(--amber)}.block.tip .bl{color:#fcd34d}
.block.note{background:var(--surface2);border-color:var(--muted)}
/* quote */
.quote{font-style:italic;background:var(--surface2);border-left:3px solid var(--accent);padding:8px 13px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13.5px;color:var(--text)}
/* dot cards */
.dot{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin:0 0 10px;overflow:hidden}
.dot-h{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer}
.dot-h:hover{background:var(--surface2)}
.dot-h .ttl{flex:1;font-weight:600;font-size:14.5px}
.dot-h .chev{color:var(--muted);transition:.2s;font-size:12px;padding-top:3px}
.dot.open .chev{transform:rotate(90deg)}
.dot-body{padding:0 15px 15px;display:none}.dot.open .dot-body{display:block}
/* Q&A */
.qa{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:9px 0;background:var(--surface2)}
.qa .qq{font-size:14px;margin-bottom:7px;font-weight:500}
.qa .ans{display:none;border-top:1px dashed var(--line);margin-top:9px;padding-top:9px;font-size:13.5px;color:#d8b4fe;white-space:pre-wrap}
.qa.show .ans{display:block}
.qa .reveal{font-size:12px;background:var(--surface);border:1px solid var(--line);color:var(--accent);padding:4px 11px;border-radius:7px;cursor:pointer}
/* quiz mode */
.quiz-card{background:var(--surface);border:2px solid var(--line);border-radius:18px;padding:28px;text-align:center;max-width:680px;margin:0 auto}
.quiz-card .qnum{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.quiz-card .qtext{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:22px}
.quiz-card .hint{font-size:13px;color:var(--muted);margin-bottom:20px;display:none;white-space:pre-wrap;text-align:left;background:var(--surface2);border-radius:10px;padding:13px;border:1px solid var(--line)}
.quiz-card .hint.show{display:block}
.quiz-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
.btn:hover{background:var(--accent2)}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:6px 12px;font-size:12.5px}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
.pill.purple{color:#d8b4fe;border-color:#5b2d8f;background:var(--purpleb)}
.pill.blue{color:#93c5fd;border-color:#1e4a63;background:var(--blueb)}
.pill.green{color:#86efac;border-color:#1a4a2a;background:var(--greenb)}
.muted{color:var(--muted)}.small{font-size:12.5px}
.divider{height:1px;background:var(--line);margin:16px 0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:11px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
textarea.notes{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;resize:vertical;min-height:80px;margin-top:6px}
textarea.notes:focus{outline:none;border-color:var(--accent)}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px}.kv:last-child{border:none}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <a href="/" style="text-decoration:none"><span class="logo" style="width:38px;height:44px;font-size:18px;flex-direction:column;gap:1px;display:flex;align-items:center;justify-content:center">⌂<span style="font-size:8px;font-weight:700;letter-spacing:.04em;opacity:.85">HOME</span></span></a>
      <div>HSC English Adv<small>Y12 · Modules CM A B C</small></div>
    </div>
    <div class="search"><input id="globalSearch" type="text" placeholder="🔍 Search…" autocomplete="off"/></div>
    <nav class="navlist" id="nav"></nav>
    <div class="exampill">
      <label>HSC Exam Countdown</label>
      <div class="cd" id="countdown">— days</div>

    </div>

<script>
const LS_KEY="hsceng_progress";
const DEFAULT_STATE={notes:{},examDate:"2026-10-21",theme:"dark",quizStats:{},history:[]};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)return Object.assign({},JSON.parse(JSON.stringify(DEFAULT_STATE)),s);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_STATE));}
let saveT;function save(){clearTimeout(saveT);saveT=setTimeout(()=>localStorage.setItem(LS_KEY,JSON.stringify(state)),350);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function wc(s){return s?s.trim().split(/\s+/).filter(Boolean).length:0;}
function wcpill(s){return `<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(168,85,247,.15);color:#d8b4fe;border:1px solid rgba(168,85,247,.3);margin-left:7px;font-weight:400;letter-spacing:0">${wc(s)} words</span>`;}

/* ==================== NAV DATA ==================== */
const NAV=[
  {id:"dash",label:"Dashboard",ic:"⊞"},
  {sep:"ESSAYS"},
  {id:"common",label:"Common Module — 1984",ic:"📖"},
  {id:"moda",label:"Module A — Textual Conversations",ic:"🎭"},
  {id:"moda_tempest",label:"The Tempest",ic:"↳",sub:true},
  {id:"moda_hagseed",label:"Hagseed",ic:"↳",sub:true},
  {id:"modb",label:"Module B — T.S. Eliot",ic:"✒️"},
  {sep:"WRITING"},
  {id:"modc",label:"Module C — Discursive",ic:"✍️"},
  {id:"reflections",label:"Reflection Questions",ic:"🪞"},
  {id:"homework",label:"In-Class / Homework",ic:"📝"},
  {sep:"PRACTICE"},
  {id:"quiz",label:"Quiz Mode",ic:"⚡"},
];

/* ==================== CONTENT DATA ==================== */

const COMMON_ESSAY = {
  title:"Common Module — 1984 (George Orwell)",
  text:"George Orwell, 1984 (1949)",
  module:"Texts and Human Experiences",
  intro:`Conventionally, [QUESTION FOCUS] the authenticity of the human experience is predicated upon [THESIS ANGLE] intellectual autonomy, emotional intimacy and genuine connections to others. The emergence of 20th century political extremes, however, refutes this notion through manufacturing states underpinned by totalitarianism and psychological oppression in the pursuit of sociopolitical control. George Orwell's novel '1984' explores [QUESTION FOCUS] the fundamental ideological conflict between humanity and the constraints of autocratic governance through constructing a society in which [ANALYSIS EMPHASIS] individuality and truth are subordinated to absolute power, [LINK TO QUESTION] warning society of how the corrosive effects of totalitarian regimes shape and limit the human experience.`,
  placeholders:[
    ["[QUESTION FOCUS]","Directly adapt to the wording of the question"],
    ["[THESIS ANGLE]","Adapt to your argument about human experiences"],
    ["[MODULE LINK]","Adapt to sound closer to the Common Module rubric"],
    ["[ANALYSIS EMPHASIS]","Shift depending on whether the question is about truth, identity, connection, suffering, rebellion, individuality, etc."],
    ["[LINK TO QUESTION]","Must be reshaped to directly answer the question"],
  ],
  bodies:[
    {label:"Body 1 — Totalitarianism & Surveillance",content:`[QUESTION FOCUS] Arising from contemporary concerns surrounding the emergence of ideological extremes in the wake of WWII, Orwell's novel posits a bleak dystopian landscape of oppressive totalitarian governance, where fear and coercion serve as insidious mechanisms of societal control which [LINK TO QUESTION] serve to curtail the human experience. Manufacturing an allusion to Stalinist Russia, Orwell's dire prognostication of a "glittering world of steel" where a "nation of warriors" all "march forward in perfect unity", posits an industrialised totalitarian state governed by an oppressive Eastern European militant power that instils collective conformity through the indoctrination of fear and dehumanisation. [ANALYSIS EMPHASIS → ADD CLAUSE]
Envisioning a landscape reminiscent of a Foucauldian preoccupation with asymmetrical surveillance, the ubiquitous Party slogan "Big Brother is Watching you" and the "telescreens"; an electric mode of panoptic observation, operate as a sophisticated form of internalised coercion, creating a consciousness of permanent visibility that enables totalitarian governments to restrict the anomalous behaviour fundamental to our [QUESTION FOCUS] physical freedoms. More poignantly, however, Orwell represents the Party's abuse of linguistic determinism as a threat to our [QUESTION FOCUS] emotional and philosophical freedoms. Satirising the dialectical materialism of Stalin's regime, the language of INGSOC, embodied in the paradoxical slogans "War is Peace, Freedom is Slavery, Ignorance is Strength" and the restrictive vocabulary of Newspeak, a semantic proliferation where words are "rubbed out and forgotten", allowing the party to ultimately "narrow the range of thought" and manipulate universal truth. Here, Orwell highlights the destruction of the literary nuances that imbue the human experience with depth and complexity, coalescing in the subordination of [QUESTION FOCUS] intellectual diversity to the Party imperative which ensures an adherence to their asinine beliefs. Thus, Orwell projects his cultural anxieties through constructing a repressive civilisation where totalitarian censorship [LINK TO QUESTION] diminishes our inherent humanity and inhibits rebellion.`},
    {label:"Body 2 — Winston's Rebellion & Human Connection",content:`In response to this enforced coercive oppression, [QUESTION FOCUS] we witness the emergence of subversive individuals who pursue an authentic human experience liberated from totalitarian ideology. [LINK TO QUESTION] By positioning his protagonist, Winston Smith, as the "guardian of the human spirit", Orwell promotes the importance of safeguarding [QUESTION FOCUS] the sanctity of individual thought and veracity of the past. Winston's subversive criticism of the party rhetoric, reflected in his maintenance of a personal diary in where he writes "DOWN WITH BIG BROTHER", evolves into a wider endeavour to carry on the metaphorical "human heritage" which has been erased by totalitarian regimes. Through representing this preliminary act of insurgence, Orwell's protagonist operates as a symbol of rebellion whose innate desire for [QUESTION FOCUS] expressive freedom precipitates the retention of [ANALYSIS EMPHASIS] intellectual diversity and the preservation of wider societal truth. Winston's fervent longing to articulate authentic truth coalesces in his illicit affair with Julia. Their initial sexual interaction, like the diary, represents merely a "political act" designed to metaphorically "tear the party to pieces", rather than an act of affinity, allowing Orwell to foreground how totalitarian regimes distort the conventional motives of human connection. [ANALYSIS EMPHASIS]
This view, however, is dismantled upon their subsequent sexual encounter, where Winston acknowledges through sensory imagery how the "feeling of her skin" had metaphorically "gotten inside of him" and galvanised a "deep tenderness he had not felt before", reflecting the capacity for human connection to temporarily circumvent Party indoctrination, allowing Winston to embrace [QUESTION FOCUS] emotional volatilities that underpin [THESIS ANGLE] the sanctity of the human experience.
Thus, Orwell promotes the importance of this [QUESTION FOCUS] intellectual and emotional expression as integral to the preservation of our [LINK TO QUESTION] innate humanity.`},
    {label:"Body 3 — Defeat, Room 101 & Denouement",content:`The protagonist's ultimate failure to transcend oppressive totalitarian ideology enables Orwell to signal [QUESTION FOCUS] the inevitable subordination of individual will to autocratic governance. O'Brien's ominous threat equating Winston's future to a "boot stamping on a human face forever" is actualised in the Party's physical and psychological torture. [ANALYSIS EMPHASIS]
Foreshadowing a surrendering to the dehumanising totalitarian ideals, Orwell employs polysyndeton, suggesting that Winston will no longer feel "love, or curiosity, or joy", rendering him simply "a mouth that uttered whatever was demanded of him", to articulate the Party's curtailing of anomalous expression fundamental to the human experience, envisioning the vacuity of his banal future bereft of [QUESTION FOCUS] autonomous will.
This dire prognostication resonates in the novel's tragic denouement, where we witness Winston relinquish the final remnants of his humanity. Under the duress of torture in Room 101, where the "impenetrable heart" is exposed by its greatest fear, Winston's fraught imperative "Do it to Julia! Tear her face off", signals the desecration of his emotions as he becomes subsumed within the oppressive constraints of autocratic regimes, corrupting his moral conscience and reflecting the incompatibility between [QUESTION FOCUS] genuine human connection and totalitarian governance. Stripped of this autonomy, Winston's ideological conversion and subsequent reintegration into society allows Orwell to posit the confronting destruction of the individual in the face of tyrannical oppression. Representing an acquiescence of paradoxical 'doublethink' axiom, Winston's tracing of "2+2+=5" within the dust on the table in the Chestnut tree cafe coalesces in Orwell's ominous claim that "he loved Big Brother", signifying the final surrender of [QUESTION FOCUS] inherent human freedom to the persecution of tyrannical domination, allowing Orwell to [LINK TO QUESTION] admonish humanity of the debilitating restraints of totalitarian regimes and their devastating implications on the individual human experience.`},
  ],
  conclusion:`Thus, Orwell cautions audiences to recognise how totalitarian regimes undermine [QUESTION FOCUS] the physical, emotional and intellectual volatilities that afford our existence meaning, ultimately [LINK TO QUESTION] signalling the desecration of the human experience.`,
  keyQuotes:[
    ["Big Brother is Watching you","Panoptic surveillance — internalised coercion"],
    ["War is Peace, Freedom is Slavery, Ignorance is Strength","Linguistic determinism — manipulation of truth via paradox"],
    ["Glittering world of steel / nation of warriors","Allusion to Stalinist industrialised totalitarian state"],
    ["Rubbed out and forgotten","Newspeak — erasure of thought through language restriction"],
    ["DOWN WITH BIG BROTHER","Diary as political act — subversive individuality"],
    ["Feeling of her skin / deep tenderness","Sensory imagery — human connection circumventing Party indoctrination"],
    ["Do it to Julia! Tear her face off!","Room 101 — desecration of human emotion under torture"],
    ["Boot stamping on a human face forever","O'Brien's threat — power as eternal domination"],
    ["He loved Big Brother","Denouement — total surrender of individual will"],
    ["2+2=5","Doublethink — forced capitulation to manufactured truth"],
  ],
};

const TEMPEST_ESSAY = {
  title:"Module A — The Tempest (Shakespeare)",
  text:"William Shakespeare, The Tempest (c. 1610–11, Jacobean era)",
  module:"Textual Conversations",
  intro:`Contemporary authors initiate textual conversation to trace/examine how similar thematic ideas resonate/translate/evolve across divergent/disparate contexts. William Shakespeares dramatic play "the Tempest" explores/exposes Jacobean anxieties/concerns surrounding the shifting hierarchical structures within a world of emerging humanist ideologies, whilst Margaret Atwood's modern prose fiction appropriation "Hagseed" personalises this exploration of power within a 21st century society Defined/underpinned by rampant individualism and moral relativism.
Devoid of compassion or forgiveness to foreground the moral obligations of people in authority.
Ultimately, whilst Shakespeare advocates for a mediation/equilibrium between power and compassion to reconcile the evolving sociopolitical tensions of his milieu, Atwood draws us into an awareness surrounding the absence of such traditional values in the 21st century, presenting power as a corruptive force that corrodes our humanity/morality.`,
  bodies:[
    {label:"BP1 — Loss of Hierarchy / Disruption of Power",content:`Set against the shifting philosophical and theological parameters of the late Renaissance Era, 'The Tempest' reflects Elizabethan concerns surrounding the disturbance of traditional religious, social and political hierarchies in Post-Medieval Europe. The opening stage directions describing a "tempestuous noise of thunder and lightning" operates as an allegorical disruption of traditional Jacobean orthodoxy and precipitates a hierarchical inversion that resonates in the Boatswain's scornful rhetorical question "what care these roarers in the name of the king?"

Here, Shakespeare manufactures a new world order liberated from past theological and socio-political frameworks and signals a symbolic shift away from the established status quo of a governance justified solely upon divine right by rendering it inert. Set against this upheaval, however, is the autocratic island of Prospero. Constructing a master-slave dialectic with Ariel and Caliban, who Prospero condemns, through pejorative adjectives, as "malignant thing" and "poisonous slave" Shakespeare proffers an asymmetrical system of governance characterised by the exercising of absolute power reminiscent of burgeoning Jacobean political structures, where the individual is subjected to a process of dehumanisation and moral exploitation.`},
    {label:"BP2 — Alternative Power Structures (Gonzalo / Antonio)",content:`Liberated from Jacobean hierarchy, Shakespeare uses the island as a stage upon which he explores alternative power structures. Infusing Gonzalo's dialogue with potent religious connotations, the allusion to the sacrament of baptism where he observes how their "garments" have been "stained with salt water" allows him to envision an egalitarian society that bears "no occupation" and "everybody equal". Here, Shakespeare presents a naive perspective of power devoid of hierarchical structure and reliant upon innate human goodness. The impracticality of such governance, however, is exposed in the Machiavellian tendencies of the island's antagonists. By representing Antonio's manipulation of Sebastian to usurp Alonso, stating his "strong imagination" sees a metaphorical "crown dropping upon thy head," Shakespeare undermines the pursuit of an idyllic socialist utopia, suggesting, rather, that humanity's ambition to acquire power is fundamentally driven by malice.`},
    {label:"BP3 — Forgiveness, Compassion & Denouement",content:`Cognisant of the barriers that undermine the attainment of a utopia, Shakespeare advocates for the necessity of a society which balances authority and individual freedom. Electing to exercise forgiveness in the play's denouement, Prospero — described through the stage directions as he "embraces Alonso" — relinquishes his authority by declaring that he will "break his staff" and metaphorically "drown his book" in a symbolic affirmation that a just society must balance power with individual freedom and compassion.

Ariel catalyses a shift to forgiveness through his declaration "That if you now beheld them, your affections would become tender…mine would, sir, were I human." Prospero then declares that "the rarer action is in virtue than in vengeance." Signals a shift from autocratic dictator to compassionate individual. Prospero's freeing of Ariel is the final relinquishment — his slavery has been the symbol of Prospero's authority throughout.

These ideas are developed in the meta-theatrical epilogue, where Prospero and, by extension, Shakespeare, asks the audience for forgiveness. Imploring the audience to metaphorically "release me from my bands" and "set me free", Shakespeare acknowledges the redemptive power of forgiveness and the fallibility of autocratic governance, ultimately reinforcing the necessity of a monarchical rule predicated upon benevolence and a commitment to the welfare of collective society.`},
  ],
  keyQuotes:[

s belief whilst positioning his speaker as the archetypal modern man who is spiritually crushed and subsumed within the inane patterns of modern life. This image of tenuous anxiety coalesces in the final vignette as Eliot articulates an awareness of something ethereal that exists beyond the bleak cityscape. Despite alluding to a fleeting catholicon of divinity, an "infinitely gentle, suffering thing", Eliot ultimately directs the audience to "laugh" at such a notion in a symbolic dismissal of Christ, accepting, through simile, that the world "revolves like ancient women gathering fuel in vacant lots". Here, Eliot recognises the fragility of religion amid modernism's repudiation of all past principles, replacing them with futility and despair to confirm the hollow and meaningless tragedy of the increasingly impersonal existence that humanity is ultimately unable to transcend.`,

s allusion, Prufrock's ultimate concession after hearing the "mermaids singing", stating "I do not think they will sing to me", as he is forced to "wake" from his imagination reverie and metaphorically "drown" within an existential void of perpetual despair, signalling the final surrender to his inescapable psychological condition as Eliot further condemns modern man's inability to forge meaning through affirmative action and leaves us with a similarly bleak representation of the modern world as evident in Preludes.`,

      analysis:`"Rhapsody" recalls Bergson's philosophy on the fractured nature of time and memory as it employs an irregular prose form to construct a bleak urban landscape bereft of past Romantic sensibilities and voice the inescapable ennui of Modernity. Embodying the Romantic archetype of the flaneur, whose solitary wanderings along a deserted street "held in lunar synthesis" precipitate an explanation of nihilistic isolation, the poem shifts between distorted reality and fractured memory as the persona is influenced by the streetlamps which beat, through simile, "like a fatalistic drum". Here, Eliot appears to subvert the idyllic symbolism associated with past Romantic sensibilities, manufacturing a tone of dire inevitability which foregrounds his personal disillusionment with modern life. This scathing critique is actualised through the confronting imagery of the "torn and stained dress" of a woman and a "cat devouring a morsel of rancid butter", exacerbating this bleak vision of modern decrepitude by offering these as symbols of decay to reflect the sordid physical corruption of contemporary life. These fraught observations subsequently instigate a litany of displaced memories as the persona searches for alleviation. Their recollection, voiced through accumulation, of the "twisted branch" upon a beach, "broken springs in factory yards" and eyes attempting to "peer through lighted shutters", allows Eliot to depict the speaker's initial failure to transcend their present nihilism, where their rumination serves merely as a reminder of an increasingly impersonal and isolating modern existence provoked by rampant industrialisation and degradation of the natural world. This initial failure compels the flaneur to seek respite through their appeal to Romantic traditions, realised in the moon. Revered by 19th Century idealists as a symbolic mirror of the human psyche, the persona's initial interaction with the personified moon which "smiles…winks…and smooths its hair", is undermined by their subsequent confrontation with its "washed-out smallpox cracked face", enabling Eliot to evoke the stagnant weariness of both past Romantic sensibilities and the spiritual condition of modern man, rendered impotent in his attempts to transcend the existential malaise concomitant with the advent of Modernity. The poem's ultimate tragedy, however, finds voice in the flaneur's inevitable return home as they are forced to confront the 'toothbrush on the wall' and 'shoes at the door'; quotidian symbols which represent the final "twist of the knife" in their futile search for catharsis, enabling Eliot to leave us with a poignant reminder of the diminution of Romantic spirit, employing these icons of domestic monotony to confirm the existential inadequacy of modernity which humanity is ultimately unable to transcend.`,

      analysis:`"Magi" operates as an allegory for Eliot's personal conversion to Catholicism and subverts the biblical grand narrative form to expose how the attainment of spirituality cannot alleviate the existential suffering concomitant with Modernist nihilism. Framed around the ruminations of the Magi who journey to witness the Birth of Christ, but are unsure of its significance, Eliot explores the consequences of the emergence of Christian faith within the Modern world. Subverting the optimism conventionally associated with nativity, the opening biblical allusion to the 'Three Wise Men' who undertake "a long journey" in the "dead of winter" is set against the narrator's representation of "the towns unfriendly" and "the villages dirty." Here, the poet establishes a hostile environment marked by decay and existential upheaval, where the Magi's pilgrimage operates as a symbol of Eliot's spiritual awakening as he attempts to mediate the void between religious certainty and the disorder of 20th Century Modernism. This vision is juxtaposed as the Magi enter the temperate valley. Eliot employs symbols of renewal, revealing through sensory imagery the "smell of vegetation" and "running stream" to signal a new creation concomitant with the birth of Christ. By littering the landscape with Christian symbolism; the allusion to Christ's crucifixion "three trees on the low sky" and the Book of Revelations, depicting an "old white horse," the Magus are positioned as the archetypical modern man, unaware of the message of salvation they carry, as their understanding of the Incarnation is deliberately limited to reflect modernity's rejection of two millennium of Christian theological belief. After witnessing the birth of Christ, the Magi find themselves suspended between doubt and certainty. By recalling it as a "satisfactory" event and rhetorically questioning whether they saw a "Birth or Death?" Eliot gives voice to the spiritual uncertainty that once plagued him; an uncertainty that leaves the Magus unable to reconcile the significance of such an experience. Subsequently liberated from this doubt, the poet suggests that spiritual enlightenment precipitates isolation. To elicit this, Eliot offers a poignant image of the Christian experience in a secular world, suggesting the Magi are no "longer at ease" amongst these "alien people clutching their gods" signalling a newfound disconnection, not underpinned by the existential uncertainty of his earlier poems, but one paradoxically manufactured by a transformative spiritual experience that has altered his perception of existence. Ultimately, "Magi" subverts any hope for salvation through spiritual belief by instead suggesting that such awakening serves as a mere exacerbation of the collective existential uncertainty of contemporary existence.`,

const MODC_DATA = {
  title:"Module C — The Craft of Writing",
  text:"Discursive Writing · Model: Adichie, '305 Marguerite Cartwright Avenue'",
  module:"The Craft of Writing",
  piece:{
    title:"11/11 Rellinger Strasse",
    form:"Discursive",
    wordcount:"~990 (full) / shortened version also available",
    centralIdea:"Place as an anchor for identity — how place grounds us socially and psychologically, and how belonging can be lifted, lost, and gradually rebuilt through time, repetition and connection.",
    extendedMetaphor:"The anchor: 'Place, however, is like an anchor. It grounds us both socially and psychologically.' → 'The anchor chain started to loosen — not all at once, but link by link.' → 'When one anchor lifts, you don't disappear. You learn how to drop another.'",
  },
  reflection:{
    fullText:`Throughout my study of Module C, I have come to recognise how discursive writing can be used to shape meaning through deliberate choices of language and structure, exploring the complex interplay between memory and place. Inspired by Adichie's '305 Marguerite Cartwright Avenue', my discursive piece '11/11 Rellinger Strasse' attempts to explore the way in which place functions as an anchor for identity, demonstrating that this sense of home can be lifted, lost and re-established through time, repetition and belonging, thus echoing Adichie's rejection of single narrative form through movement from childhood certainty in Hamburg to gradual re-anchoring in Sydney.

Through Adichie's piece, I recognised how informal language can connect with readers. I open my piece with an anecdote tracing back to my home in the "enchanting streets" of Germany, where I recall the "comfort" and "warm, familiar scent" that "can only be recreated in the antique home of a loving grandmother", in an attempt to evoke a sense of emotional depth to captivate the reader by sharing personal details, whilst simultaneously foregrounding the conceptual focus of my piece on the importance of Place as not just a tangible location, but a vessel of the people we once were.

In order to capture the unpredictable nature of change and the underappreciation of Place's importance, I shifted into a conscious reflection to further enhance my discussion and understanding of the discursive genre. My recognition, in hindsight, that "Back then, I thought place was permanent" coalesces in my anaphoric realisation that "home is an arrangement of certainties: the same steps, the same smells, the same light at the same hour". Here, I hoped to adopt Adichie's habit of directly addressing the audience to emphasise how Place is not simply a physical space, but an ideological construct shaped by memory, routine, and relationships. Subsequently, I disrupted this perspective of assumed stability in an attempt to develop my message. This shift, marked by my abrupt declaration, "Change, inevitable as death, always finds its way" culminates in my extended metaphor of the "anchor", which "started to loosen", allowing me to disrupt the previous sense of guaranteed security and suggest instead that belonging is not fixed, but something fragile that can be unsettled and gradually rebuilt.

Ultimately, I aim to leave my audience with a sense of optimism surrounding the influence of change in place on our identity. After recounting my migration to Australia, my reflection that "though this wasn't my home", it quickly taught me that "when one anchor lifts…you learn how to drop another" enables me to offer a final insight into the resilience of belonging, and the gradual process through which identity can be re-established in unfamiliar ground.`,
    metalanguage:["free indirect discourse","second person address","anaphora","extended metaphor","sensory imagery","temporal shift","tonal shift"],
  },
};

  {module:"Common Module (1984)",q:"'Texts represent both the fragility and resilience of human experience.' How does 1984 explore this?",starter:"Fragility: Room 101, Winston's capitulation, 'boot stamping on a human face forever'. Resilience: diary, affair with Julia, Winston as 'guardian of the human spirit'. Argue both sides — ultimately Orwell shows fragility dominates when totalitarianism is absolute."},
  {module:"Common Module (1984)",q:"To what extent does 1984 explore the paradox of control and freedom?",starter:"Intro: totalitarianism as paradox — War is Peace, Freedom is Slavery. Body 1: surveillance and Newspeak eliminate freedom. Body 2: Winston's rebellion as search for authentic freedom. Body 3: Room 101 — control is absolute; freedom is impossible."},
  {module:"Common Module (1984)",q:"How does Orwell represent the relationship between power and truth in 1984?",starter:"Ministry of Truth as ironic inversion. 'Who controls the past controls the future.' Doublethink as mechanism for accepting manufactured truth. Winston's '2+2=5' as ultimate capitulation."},
  {module:"Common Module (1984)",q:"'In Orwell's 1984, humanity is reduced to its most primitive state.' Discuss.",starter:"Dehumanisation: Caliban-like figures, Winston reduced to 'a mouth', loss of love/curiosity/joy via polysyndeton. Counter: Julia affair shows primitive human emotion (connection) survives until Room 101."},
  // Module A
  {module:"Module A (Tempest / Hagseed)",q:"How does the comparative study of The Tempest and Hagseed illuminate the nature of power?",starter:"Intro: both explore power through loss → revenge → (failed) resolution. Resonance: autocratic governance, master-slave dynamics. Dissonance: Shakespeare advocates compassion/equilibrium; Atwood exposes 21st century moral corruption."},
  {module:"Module A (Tempest / Hagseed)",q:"Compare how Shakespeare and Atwood explore the relationship between power and morality.",starter:"Shakespeare: power tempered by Catholic/Christian values — Prospero's forgiveness. Atwood: power in 21st century corrodes morality — Felix's Machiavellianism. Key dissonance: Miranda's absence severs moral tether."},
  {module:"Module A (Tempest / Hagseed)",q:"'Texts in conversation reveal how context shapes the exercise of authority.' Discuss with reference to both texts.",starter:"Jacobean context: divine right, hierarchical anxiety → Shakespeare advocates balanced monarchy. 21st century: individualism, secularism → Atwood presents power as personally corruptive. Context = source of dissonance."},
  {module:"Module A (Tempest / Hagseed)",q:"How does Atwood's Hagseed reimagine Shakespeare's The Tempest to offer new insights into forgiveness?",starter:"Prospero's forgiveness: genuine, catalysed by Ariel, 'rarer action is virtue than vengeance'. Felix's forgiveness: hollow, performative. Atwood subverts this to argue traditional Catholic values of forgiveness are absent in the 21st century."},
  {module:"Module A (Tempest / Hagseed)",q:"Compare how both composers use the figure of Miranda to explore power.",starter:"Miranda in Tempest: moral tether, symbol of innocence, catalyst for Prospero's humanity. Miranda in Hagseed: physically absent, lives in Felix's delusion, INVERTS hierarchy — holds power over Felix. Atwood: women don't abuse power, emerge as more morally sound → critique of patriarchy."},
  // Module B
  {module:"Module B (T.S. Eliot)",q:"How does Eliot's poetry explore the spiritual crisis of modernity?",starter:"Intro: modernism rejected religious conventions → spiritual vacuum. Preludes: soul 'stretched tight across the sky' — crushed under modernity. Prufrock: 'I am Lazarus' fantasy collapses. Magi: spiritual awakening paradoxically precipitates isolation."},
  {module:"Module B (T.S. Eliot)",q:"'Eliot's poetry condemns modern existence as futile and inescapable.' Do you agree?",starter:"Agree: Preludes — world 'revolves like ancient women gathering fuel'; Rhapsody — toothbrush and shoes as 'final twist of the knife'. Partially agree: Magi gestures toward salvation but finds it inadequate. Textual integrity argument: the very form (fragmented vignettes, irregular prose) enacts this futility."},
  {module:"Module B (T.S. Eliot)",q:"How does Eliot's use of form and structure reflect his modernist concerns?",starter:"Preludes: fractured vignettes — discontinuity of modern experience. Prufrock: dramatic monologue — internalised existential inquiry. Rhapsody: irregular prose form — Bergsonian fractured time. Magi: subverts biblical grand narrative form. Form IS the argument."},
  {module:"Module B (T.S. Eliot)",q:"Compare how Eliot represents the urban environment in Preludes and Rhapsody on a Windy Night.",starter:"Both: desolate urban landscapes, spiritual malaise, condescension toward industrialisation. Preludes: focus on collective conformity (muddy feet, coffee stands). Rhapsody: flaneur's individual fracture, failed search for catharsis through Romantic traditions."},
  {module:"Module B (T.S. Eliot)",q:"How does Eliot explore the relationship between memory and identity in his poetry?",starter:"Rhapsody: Bergsonian fractured time — memories as distorted remnants, unable to liberate from nihilism. Prufrock: time and memory = paralysis ('Do I dare?'). Magi: retrospective narration — memory of the Birth suspended between doubt and certainty."},
  // Module C
  {module:"Module C (Discursive)",q:"Write a discursive piece exploring the idea that belonging is something that can be lost and rebuilt.",starter:"Consider Adichie's structure: personal → reflective → universal. Extended metaphor. Move from specific (place, memory, routine) to abstract (identity, resilience). Open with sensory anecdote. End with earned optimism."},
  {module:"Module C (Discursive)",q:"'Place is not merely a location on a map, but an arrangement of certainties.' Compose a discursive piece responding to this idea.",starter:"Your '11/11 Rellinger Strasse' structure works perfectly here. Anchor metaphor. Hamburg anecdote → disruption of change → Sydney → re-anchoring. Anaphora for certainties."},
  {module:"Module C (Discursive)",q:"Write a short discursive piece exploring the idea of home.",starter:"Avoid clichés. Use Adichie's informal register. Start with ONE specific detail (smell, sound, texture). Build outward. Address 'comfort is easiest to recognise in its absence.'"},
];

/* ==================== STATE & ROUTING ==================== */
let currentPage = "dash";
let currentQuizIdx = 0;
let quizOrder = [];

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  NAV.forEach(item=>{
    if(item.sep){
      const s=document.createElement('div');
      s.className='nav-sep';s.textContent=item.sep;nav.appendChild(s);return;
    }
    const b=document.createElement('button');
    b.className='navbtn'+(item.sub?' sub':'')+(currentPage===item.id?' active':'');
    b.innerHTML=`<span class="ic">${item.ic}</span>${esc(item.label)}`;
    b.onclick=()=>goto(item.id);
    nav.appendChild(b);
  });
}

function goto(id){currentPage=id;buildNav();render();}

function render(){
  const m=document.getElementById('main');
  if(currentPage==='dash') return renderDash(m);
  if(currentPage==='common') return renderCommon(m);
  if(currentPage==='moda') return renderModA(m);
  if(currentPage==='moda_tempest') return renderTempest(m);
  if(currentPage==='moda_hagseed') return renderHagseed(m);
  if(currentPage==='modb') return renderEliot(m);
  if(currentPage==='modc') return renderModC(m);
  if(currentPage==='reflections') return renderReflections(m);
  if(currentPage==='homework') return renderHomework(m);
  if(currentPage==='quiz') return renderQuiz(m);
}

/* ==================== HOMEWORK ==================== */
function renderHomework(m){
  m.innerHTML=`
  <div class="page-head"><div><h1>📝 In-Class / Homework</h1><p>Organise your class notes, tasks and feedback here</p></div></div>
  <div class="card"><h3>Common Module — 1984</h3>
  <textarea class="notes" rows="8" placeholder="Class notes, marked essays, feedback…" onchange="saveNote('hw_common',this.value)">${esc(state.notes['hw_common']||'')}</textarea>
  </div>
  <div class="card"><h3>Module A — Tempest & Hagseed</h3>
  <textarea class="notes" rows="8" placeholder="Class notes, marked essays, feedback…" onchange="saveNote('hw_moda',this.value)">${esc(state.notes['hw_moda']||'')}</textarea>
  </div>
  <div class="card"><h3>Module B — T.S. Eliot</h3>
  <textarea class="notes" rows="8" placeholder="Class notes, marked essays, feedback…" onchange="saveNote('hw_modb',this.value)">${esc(state.notes['hw_modb']||'')}</textarea>
  </div>
  <div class="card"><h3>Module C — Craft of Writing</h3>
  <textarea class="notes" rows="8" placeholder="Class notes, marked pieces, reflections, feedback…" onchange="saveNote('hw_modc',this.value)">${esc(state.notes['hw_modc']||'')}</textarea>
  </div>`;
}

/* ==================== QUIZ MODE ==================== */
function renderQuiz(m){
  quizOrder=shuffleArray([...Array(QUIZ_QUESTIONS.length).keys()]);
  currentQuizIdx=0;
  renderQuizCard(m);
}

function renderQuizCard(m){
  const q=QUIZ_QUESTIONS[quizOrder[currentQuizIdx]];
  m.innerHTML=`
  <div class="page-head"><div><h1>⚡ Quiz Mode</h1><p>Essay questions — write an intro (essays) or dot-point plan (Module C). Then reveal the starter.</p></div></div>
  <div class="quiz-card">
    <div class="qnum"><span class="pill ${
      q.module.includes('Common')?'purple':q.module.includes('Module A')?'blue':q.module.includes('Module B')?'':'green'
    }">${esc(q.module)}</span> &nbsp; Question ${currentQuizIdx+1} of ${QUIZ_QUESTIONS.length}</div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="hint" id="qhint"><b>Starter / Key Points:</b><br><br>${esc(q.starter)}</div>
    <div class="quiz-btns">
      <button class="btn ghost" onclick="document.getElementById('qhint').classList.toggle('show');this.textContent=this.textContent==='Show Starter'?'Hide Starter':'Show Starter'">Show Starter</button>
      <button class="btn" onclick="nextQuizQ()">Next Question →</button>
    </div>
  </div>
  <div style="text-align:center;margin-top:24px">
    <button class="btn ghost sm" onclick="renderQuiz(document.getElementById('main'))">🔀 Reshuffle All</button>
    <select id="quizFilter" style="margin-left:10px;font-size:13px" onchange="filterQuiz(this.value)">
      <option value="all">All Modules</option>
      <option value="Common">Common Module</option>
      <option value="Module A">Module A</option>
      <option value="Module B">Module B</option>
      <option value="Module C">Module C</option>
    </select>
  </div>`;
}

function nextQuizQ(){
  currentQuizIdx=(currentQuizIdx+1)%quizOrder.length;
  renderQuizCard(document.getElementById('main'));
}

function filterQuiz(val){
  if(val==='all'){quizOrder=shuffleArray([...Array(QUIZ_QUESTIONS.length).keys()]);}
  else{quizOrder=shuffleArray(QUIZ_QUESTIONS.map((q,i)=>q.module.includes(val)?i:-1).filter(i=>i>=0));}
  currentQuizIdx=0;
  renderQuizCard(document.getElementById('main'));
}

function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ==================== HELPERS ==================== */
function showTab(prefix,id,btn){
  // hide all tabs for this prefix
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(el=>el.classList.add('hidden'));
  document.getElementById(`${prefix}-${id}`).classList.remove('hidden');
  // update tab buttons
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
}

function toggleDot(h){
  const dot=h.closest('.dot');
  dot.classList.toggle('open');
}

function toggleQA(id){
  const el=document.getElementById(id);
  el.classList.toggle('show');
  el.querySelector('.reveal').textContent=el.classList.contains('show')?'Hide':'Show dot-point plan';
}

function saveNote(key,val){state.notes[key]=val;save();}

/* ==================== COUNTDOWN ==================== */
function updateCountdown(){
  const d=document.getElementById('countdown');
  const ei=document.getElementById('examDate');
  if(!d||!ei) return;
  ei.value=state.examDate||'2026-10-21';
  const diff=Math.ceil((new Date(state.examDate)-new Date())/86400000);
  d.textContent=diff>0?diff+' days':diff===0?'Today!':'Past';
}
document.getElementById('examDate').addEventListener('change',function(){state.examDate=this.value;save();updateCountdown();});

/* ==================== THEME ==================== */
document.getElementById('themeBtn').onclick=function(){
  const h=document.documentElement;
  const t=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',t);state.theme=t;save();
  this.textContent=t==='dark'?'☀ Theme':'🌙 Theme';
};
if(state.theme==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='🌙 Theme';}

/* ==================== BACKUP ==================== */
document.getElementById('ioBtn').onclick=function(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(state));
  a.download='hsc-english-backup.json';a.click();
};

/* ==================== SEARCH ==================== */
document.getElementById('globalSearch').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q)return;
  const all=[
    {label:'Common Module — 1984',id:'common'},{label:'Module A — The Tempest',id:'moda_tempest'},
    {label:'Module A — Hagseed',id:'moda_hagseed'},{label:'Module B — T.S. Eliot',id:'modb'},
    {label:'Module C — Discursive',id:'modc'},{label:'Reflection Questions',id:'reflections'},
    {label:'Quiz Mode',id:'quiz'},{label:'In-Class / Homework',id:'homework'},
  ];
  const match=all.find(x=>x.label.toLowerCase().includes(q));
  if(match){goto(match.id);this.value='';}
});

/* ==================== INIT ==================== */
buildNav();
render();
updateCountdown();
</script>
</body>
</html>
